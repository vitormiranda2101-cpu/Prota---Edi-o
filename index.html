<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prota Games — Sistema de Gestão</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">

// ─────────────────────────────────────────────────────────────
// V19 OVERRIDES · operação sem pipeline, tags e times dinâmicos
// ─────────────────────────────────────────────────────────────
const DEFAULT_TEAMS_V19 = ['Falco','Phoenix','Astra'];
const DEFAULT_TEAM_COLORS_V19 = { Falco:'#ff9500', Phoenix:'#af52de', Astra:'#32ade6' };
const DEFAULT_TAGS_V19 = ['Longos','Shorts','Roblox','Minecraft','Treinamento','Teste'];

function ensureV19State() {
  if (!Array.isArray(state.teams)) {
    try { state.teams = JSON.parse(localStorage.getItem('prota_teams') || 'null') || DEFAULT_TEAMS_V19.slice(); }
    catch(e) { state.teams = DEFAULT_TEAMS_V19.slice(); }
  }
  DEFAULT_TEAMS_V19.forEach(t => { if (!state.teams.includes(t)) state.teams.push(t); });
  if (!Array.isArray(state.availableTags)) {
    try { state.availableTags = JSON.parse(localStorage.getItem('prota_available_tags') || 'null') || DEFAULT_TAGS_V19.slice(); }
    catch(e) { state.availableTags = DEFAULT_TAGS_V19.slice(); }
  }
}
ensureV19State();
function saveTeamsV19(){ ensureV19State(); localStorage.setItem('prota_teams', JSON.stringify(state.teams)); scheduleCloudSave(); }
function saveTagsV19(){ localStorage.setItem('prota_available_tags', JSON.stringify(state.availableTags || [])); scheduleCloudSave(); }
function getAllTeams(){ ensureV19State(); return state.teams.slice(); }
function getVisibleCanais(){ ensureV19State(); return state.currentUser && state.currentUser.role === 'admin' ? getAllTeams() : [state.currentUser.canal]; }
function canalCSS(canal) {
  ensureV19State();
  const color = state?.teamColors?.[canal] || DEFAULT_TEAM_COLORS_V19[canal] || '#0a84ff';
  return { color, bg: color.startsWith('#') ? hexToRgba(color, 0.16) : color + '20' };
}

function personTagsHTML(person, editable=false, type='editor') {
  const tags = Array.isArray(person.tags) ? person.tags : [];
  if (!tags.length && !editable) return '';
  return `<div class="tag-row">${tags.map(tag => `<span class="person-tag primary">${escapeHTML(tag)}${editable ? ` <button onclick="removePersonTag('${type}','${person.id}','${escapeAttr(tag)}')">×</button>` : ''}</span>`).join('')}</div>`;
}
function addPersonTag(type, id) {
  const input = document.getElementById(`tag-input-${type}-${id}`);
  const raw = input ? input.value.trim() : '';
  if (!raw) return;
  const list = type === 'decupador' ? (state.decupadores || []) : (state.editors || []);
  const person = list.find(p => p.id === id);
  if (!person) return;
  person.tags = Array.from(new Set([...(person.tags || []), raw]));
  if (!state.availableTags.includes(raw)) { state.availableTags.push(raw); saveTagsV19(); }
  type === 'decupador' ? saveDecupadores() : saveEditors();
  logChange('Tag adicionada', `${person.name} · ${raw}`);
  showSaved();
  setTimeout(() => type === 'decupador' ? openDecupadorManage(id) : openEditorManage(id), 0);
}
function quickAddPersonTag(type, id, tag) {
  const list = type === 'decupador' ? (state.decupadores || []) : (state.editors || []);
  const person = list.find(p => p.id === id);
  if (!person) return;
  person.tags = Array.from(new Set([...(person.tags || []), tag]));
  type === 'decupador' ? saveDecupadores() : saveEditors();
  logChange('Tag adicionada', `${person.name} · ${tag}`);
  showSaved();
  setTimeout(() => type === 'decupador' ? openDecupadorManage(id) : openEditorManage(id), 0);
}
function removePersonTag(type, id, tag) {
  const list = type === 'decupador' ? (state.decupadores || []) : (state.editors || []);
  const person = list.find(p => p.id === id);
  if (!person) return;
  person.tags = (person.tags || []).filter(t => t !== tag);
  type === 'decupador' ? saveDecupadores() : saveEditors();
  logChange('Tag removida', `${person.name} · ${tag}`);
  showSaved();
  setTimeout(() => type === 'decupador' ? openDecupadorManage(id) : openEditorManage(id), 0);
}
function tagManageHTML(type, person) {
  const suggestions = (state.availableTags || DEFAULT_TAGS_V19).filter(t => !(person.tags || []).includes(t));
  return `<div class="manage-section">
    <div class="manage-section-title">Tags</div>
    <div class="chart-card-sub">Use para separar formato/função: Longos, Shorts, Roblox, Minecraft etc.</div>
    ${personTagsHTML(person, true, type)}
    <div class="tag-editor-grid" style="margin-top:10px;">
      <input class="field" id="tag-input-${type}-${person.id}" list="tags-list-${type}-${person.id}" placeholder="Ex: Longos, Shorts, Blox Fruits" onkeydown="if(event.key==='Enter') addPersonTag('${type}','${person.id}')">
      <button class="btn-add" onclick="addPersonTag('${type}','${person.id}')">Adicionar</button>
      <datalist id="tags-list-${type}-${person.id}">${suggestions.map(t=>`<option value="${escapeAttr(t)}"></option>`).join('')}</datalist>
    </div>
    <div class="tag-row">${suggestions.slice(0,8).map(t=>`<button class="person-tag" onclick="quickAddPersonTag('${type}','${person.id}','${escapeAttr(t)}')">+ ${escapeHTML(t)}</button>`).join('')}</div>
  </div>`;
}

function getPersonAtraso(week, id, type) {
  const key = type === 'decupador' ? 'atrasou' : 'atrasouEditor';
  return state.notas[`${week}|${id}|${key}`] === 'sim';
}
function setPersonAtraso(week, id, type, val) {
  const key = type === 'decupador' ? 'atrasou' : 'atrasouEditor';
  const list = type === 'decupador' ? (state.decupadores || []) : (state.editors || []);
  const person = list.find(p => p.id === id);
  state.notas[`${week}|${id}|${key}`] = val ? 'sim' : 'nao';
  saveNotas();
  logChange(val ? 'Atraso marcado' : 'Atraso removido', `${person ? person.name : id} · ${type}`);
  renderTab(state.activeTab);
  showSaved();
}
function saveAtrasoReason(week, id, type, value) {
  const key = type === 'decupador' ? 'motivoAtrasoDecup' : 'motivoAtrasoEditor';
  saveTextField(week, id, key, value);
}

function renderOperacao(el) {
  const week = getCurrentWeek();
  const canais = getVisibleCanais();
  const peopleEditors = (state.editors || []).filter(e => canais.includes(e.canal));
  const peopleDecup = (state.decupadores || []).filter(d => canais.includes(d.canal));
  const atrasosEdit = peopleEditors.filter(e => getPersonAtraso(week, e.id, 'editor')).length;
  const atrasosDecup = peopleDecup.filter(d => getPersonAtraso(week, d.id, 'decupador')).length;
  let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">Operação</div><div class="section-sub">Marque manualmente se editor ou decupador atrasou na semana atual · ${weekLabelLong(week)}</div></div></div>
  <div class="ops-grid">
    <div class="ops-card"><div class="ops-kicker">Atrasos editores</div><div class="ops-number" style="color:${atrasosEdit?'var(--red)':'var(--green)'};">${atrasosEdit}</div><div class="ops-sub">marcados pelos supervisores</div></div>
    <div class="ops-card"><div class="ops-kicker">Atrasos decupadores</div><div class="ops-number" style="color:${atrasosDecup?'var(--red)':'var(--green)'};">${atrasosDecup}</div><div class="ops-sub">impactam fluxo de edição</div></div>
    <div class="ops-card"><div class="ops-kicker">Pessoas monitoradas</div><div class="ops-number">${peopleEditors.length + peopleDecup.length}</div><div class="ops-sub">editores + decupadores</div></div>
  </div>`;
  html += renderAtrasoSection('Editores', peopleEditors, 'editor', week);
  html += renderAtrasoSection('Decupadores', peopleDecup, 'decupador', week);
  el.innerHTML = html;
}
function renderAtrasoSection(title, list, type, week) {
  if (!list.length) return `<div class="card"><div class="empty-state">Nenhum ${title.toLowerCase()} cadastrado para os times visíveis.</div></div>`;
  return `<div class="canal-section-header"><div class="canal-section-title">${title}</div><div class="canal-section-count">${list.length}</div></div><div class="ops-person-grid">${list.map(p => renderAtrasoCard(p, type, week)).join('')}</div>`;
}
function renderAtrasoCard(p, type, week) {
  const cc = canalCSS(p.canal);
  const late = getPersonAtraso(week, p.id, type);
  const reasonKey = type === 'decupador' ? 'motivoAtrasoDecup' : 'motivoAtrasoEditor';
  const reason = state.notas[`${week}|${p.id}|${reasonKey}`] || '';
  const avatar = type === 'decupador' ? decupadorAvatarHTML(p, 42, 14) : editorAvatarHTML(p, p.canal, 42, 14);
  const avg = type === 'decupador' ? calcAvgDecupInQuarter(p.id, state.selectedQuarter || getCurrentQuarter()) : calcAvgInQuarter(p.id, state.selectedQuarter || getCurrentQuarter());
  return `<div class="ops-person-card ${late?'late':''}" style="--team-color:${cc.color};">
    <div class="ops-person-head">${avatar}<div style="min-width:0;flex:1;"><div class="ops-person-title">${escapeHTML(p.name)}</div><div class="ops-person-sub">${escapeHTML(p.canal)} · ${type === 'decupador' ? 'Decupador' : 'Editor'} · média ${avg!==null?avg.toFixed(1):'–'}</div>${personTagsHTML(p,false,type)}</div></div>
    <div class="ops-toggle"><button class="${!late?'active-ok':''}" onclick="setPersonAtraso('${week}','${p.id}','${type}',false)">No prazo</button><button class="${late?'active-late':''}" onclick="setPersonAtraso('${week}','${p.id}','${type}',true)">Atrasou ⚠️</button></div>
    <div class="ops-reason"><input class="field" placeholder="Motivo do atraso / bloqueio" value="${escapeAttr(reason)}" onchange="saveAtrasoReason('${week}','${p.id}','${type}',this.value)"></div>
  </div>`;
}
function renderOpsDashboardSummary(q) {
  const week = getCurrentWeek();
  const canais = state.currentUser && state.currentUser.role === 'supervisor' ? [state.currentUser.canal] : getAllTeams();
  const editors = (state.editors || []).filter(e => canais.includes(e.canal));
  const decups = (state.decupadores || []).filter(d => canais.includes(d.canal));
  const lateEditors = editors.filter(e => getPersonAtraso(week, e.id, 'editor')).length;
  const lateDecups = decups.filter(d => getPersonAtraso(week, d.id, 'decupador')).length;
  const critical = editors.filter(e => getPriorityForPerson(e.id, 'editor', q).level === 'critico').length + decups.filter(d => getPriorityForPerson(d.id, 'decupador', q).level === 'critico').length;
  return `<div class="ops-grid"><div class="ops-card"><div class="ops-kicker">Atrasos editores</div><div class="ops-number" style="color:${lateEditors?'var(--red)':'var(--green)'};">${lateEditors}</div><div class="ops-sub">semana atual</div></div><div class="ops-card"><div class="ops-kicker">Atrasos decupadores</div><div class="ops-number" style="color:${lateDecups?'var(--red)':'var(--green)'};">${lateDecups}</div><div class="ops-sub">semana atual</div></div><div class="ops-card"><div class="ops-kicker">Prioridade crítica</div><div class="ops-number" style="color:var(--orange);">${critical}</div><div class="ops-sub">pessoas que precisam de ação rápida</div></div></div>`;
}

function renderEditores(el, embedded = false) {
  const u = state.currentUser;
  const canaisVisiveis = getVisibleCanais();
  let html = embedded ? '' : `<div class="section-header"><div class="section-header-left"><div class="section-title">Editores</div><div class="section-sub">Cadastro e gestão por time</div></div></div>`;
  if (!embedded) { html += renderTeamColorSystem(); html += renderDatabaseSystem(); }
  canaisVisiveis.forEach(canal => {
    const c = canalCSS(canal); const editores = getEditoresByCanal(canal); const canManage = u.role === 'admin' || u.canal === canal;
    html += `<div class="canal-section-header"><div class="canal-dot" style="background:${c.color};"></div><div class="canal-section-title" style="color:${c.color};">Time ${escapeHTML(canal)}</div><div class="canal-section-count">${editores.length} editor${editores.length!==1?'es':''}</div></div><div class="card">`;
    if (canManage) html += `<div class="add-editor-row"><input class="field" type="text" id="new-editor-name-${canal}" placeholder="Nome do novo editor" onkeydown="if(event.key==='Enter') addEditor('${canal}')"><button class="btn-add" onclick="addEditor('${canal}')">+ Adicionar</button></div>`;
    if (!editores.length) html += `<div class="empty-state">Nenhum editor cadastrado.</div>`; else {
      html += `<div class="editor-grid editor-grid-clean">`;
      editores.forEach(ed => { const avg = calcAvgInQuarter(ed.id, state.selectedQuarter || getCurrentQuarter()); const m=getEditorMedals(ed.id); const cc=canalCSS(ed.canal); const canDelete = canManage;
        html += `<div class="editor-card editor-card-clean" style="--team-color:${cc.color};--team-bg:${cc.bg};"><div class="editor-clean-head">${editorAvatarHTML(ed, ed.canal, 44, 15)}<div class="editor-info"><div class="editor-name-row"><div class="editor-name">${escapeHTML(ed.name)}</div>${tierHTML(ed.id)}</div><div class="editor-meta">${escapeHTML(ed.canal)}</div><div class="editor-status-row">${editorMedalsHTML(ed.id)}</div>${personTagsHTML(ed,false,'editor')}</div></div><div class="editor-mini-metrics"><div class="editor-mini-metric"><div class="editor-mini-label">Média tri.</div><div class="editor-mini-value" style="color:${colorByScore(avg)};">${avg !== null ? avg.toFixed(1) : '–'}</div></div><div class="editor-mini-metric"><div class="editor-mini-label">Status</div><div class="editor-mini-value">⭐ ${m.stars || 0} · ☠️ ${m.skulls || 0}</div></div></div><div class="editor-card-actions ${canDelete ? 'three' : ''}"><button class="btn-card-action primary" onclick="openEditorManage('${ed.id}')">Gerenciar</button>${canManage ? `<label class="btn-card-action">Foto<input type="file" accept="image/*" style="display:none" onchange="setEditorPhoto('${ed.id}', this.files[0])"></label>` : `<button class="btn-card-action" disabled>Foto</button>`}${canDelete ? `<button class="btn-card-action btn-card-icon danger" onclick="openDeleteModal('${ed.id}')" title="Remover editor">✕</button>` : ''}</div></div>`;
      }); html += `</div>`;
    } html += `</div>`;
  }); el.innerHTML = html;
}
function renderDecupadores(el, embedded = false) {
  const u = state.currentUser; const canaisVisiveis = getVisibleCanais();
  let html = embedded ? '' : `<div class="section-header"><div class="section-header-left"><div class="section-title">Decupadores</div><div class="section-sub">Cadastro separado dos editores</div></div></div>`;
  canaisVisiveis.forEach(canal => { const c=canalCSS(canal); const decupadores=getDecupadoresByCanal(canal); const canManage = u.role === 'admin' || u.canal === canal;
    html += `<div class="canal-section-header"><div class="canal-dot" style="background:${c.color};"></div><div class="canal-section-title" style="color:${c.color};">Time ${escapeHTML(canal)}</div><div class="canal-section-count">${decupadores.length} decupador${decupadores.length!==1?'es':''}</div></div><div class="card">`;
    if (canManage) html += `<div class="add-editor-row"><input class="field" type="text" id="new-decupador-name-${canal}" placeholder="Nome do novo decupador" onkeydown="if(event.key==='Enter') addDecupador('${canal}')"><button class="btn-add" onclick="addDecupador('${canal}')">+ Adicionar</button></div>`;
    if (!decupadores.length) html += `<div class="empty-state">Nenhum decupador cadastrado nesse time.</div>`; else { html += `<div class="editor-grid editor-grid-clean">`;
      decupadores.forEach(dc => { const cc=canalCSS(dc.canal); const avg=calcAvgDecupInQuarter(dc.id, state.selectedQuarter || getCurrentQuarter());
        html += `<div class="editor-card editor-card-clean" style="--team-color:${cc.color};--team-bg:${cc.bg};"><div class="editor-clean-head">${decupadorAvatarHTML(dc,44,15)}<div class="editor-info"><div class="editor-name-row"><div class="editor-name">${escapeHTML(dc.name)}</div></div><div class="editor-meta">Decupador · ${escapeHTML(dc.canal)}</div>${personTagsHTML(dc,false,'decupador')}</div></div><div class="editor-mini-metrics"><div class="editor-mini-metric"><div class="editor-mini-label">Média tri.</div><div class="editor-mini-value" style="color:${colorByScore(avg)};">${avg!==null?avg.toFixed(1):'–'}</div></div><div class="editor-mini-metric"><div class="editor-mini-label">Time</div><div class="editor-mini-value" style="color:${cc.color};">${escapeHTML(dc.canal)}</div></div></div><div class="editor-card-actions three"><button class="btn-card-action primary" onclick="openDecupadorManage('${dc.id}')">Gerenciar</button>${canManage ? `<label class="btn-card-action">Foto<input type="file" accept="image/*" style="display:none" onchange="setDecupadorPhoto('${dc.id}', this.files[0])"></label>` : `<button class="btn-card-action" disabled>Foto</button>`}${canManage ? `<button class="btn-card-action btn-card-icon danger" onclick="deleteDecupador('${dc.id}')" title="Remover decupador">✕</button>` : ''}</div></div>`;
      }); html += `</div>`; } html += `</div>`;
  }); el.innerHTML = html;
}

function openEditorManage(editorId) {
  const ed = state.editors.find(e => e.id === editorId); if (!ed) return;
  state.manageEditorId = editorId; const cc=canalCSS(ed.canal); const avg=calcAvgInQuarter(ed.id, state.selectedQuarter || getCurrentQuarter()); const canManage=state.currentUser && (state.currentUser.role==='admin' || state.currentUser.canal===ed.canal);
  const html = `<div class="manage-modal-hero" style="--team-color:${cc.color};--team-bg:${cc.bg};">${editorAvatarHTML(ed, ed.canal, 58, 18)}<div><div class="manage-modal-title">${escapeHTML(ed.name)}</div><div class="manage-modal-sub">${escapeHTML(ed.canal)} · Média trimestre: ${avg!==null?avg.toFixed(1):'sem nota'} ${tierHTML(ed.id)}</div><div class="badge-row">${editorMedalsHTML(ed.id)}</div>${personTagsHTML(ed,false,'editor')}</div></div><div class="manage-modal-body">${canManage ? `<div class="manage-section"><div class="manage-section-title">Editar nome</div><div class="manage-name-row"><input class="field" id="manage-editor-name" value="${escapeAttr(ed.name)}" onkeydown="if(event.key==='Enter') saveEditorName('${ed.id}')"><button class="btn-add" onclick="saveEditorName('${ed.id}')">Salvar</button></div></div><div class="manage-section"><div class="manage-section-title">Foto do editor</div><div class="manage-photo-row"><label class="btn-card-action primary">Trocar foto<input type="file" accept="image/*" style="display:none" onchange="setEditorPhoto('${ed.id}', this.files[0]); closeEditorManage();"></label>${ed.photo ? `<button class="btn-card-action danger" onclick="removeEditorPhoto('${ed.id}'); closeEditorManage();">Remover foto</button>` : ''}</div></div>${tagManageHTML('editor', ed)}` : ''}${state.currentUser.role==='admin' ? `<div class="manage-section"><div class="manage-section-title">Destaque e problemas</div>${adminMedalControlsHTML(ed.id)}</div>` : ''}</div>`;
  document.getElementById('manage-modal-content').innerHTML = html; document.getElementById('modal-editor-manage').classList.add('open');
}
function openDecupadorManage(decupadorId) {
  const dc=(state.decupadores||[]).find(d=>d.id===decupadorId); if(!dc) return; const cc=canalCSS(dc.canal); const canManage=state.currentUser && (state.currentUser.role==='admin'||state.currentUser.canal===dc.canal);
  const html = `<div class="manage-modal-hero" style="--team-color:${cc.color};--team-bg:${cc.bg};">${decupadorAvatarHTML(dc,58,18)}<div><div class="manage-modal-title">${escapeHTML(dc.name)}</div><div class="manage-modal-sub">Decupador · ${escapeHTML(dc.canal)}</div>${personTagsHTML(dc,false,'decupador')}</div></div><div class="manage-modal-body">${canManage ? `<div class="manage-section"><div class="manage-section-title">Editar nome</div><div class="manage-name-row"><input class="field" id="manage-decupador-name" value="${escapeAttr(dc.name)}" onkeydown="if(event.key==='Enter') saveDecupadorName('${dc.id}')"><button class="btn-add" onclick="saveDecupadorName('${dc.id}')">Salvar</button></div></div><div class="manage-section"><div class="manage-section-title">Foto do decupador</div><div class="manage-photo-row"><label class="btn-card-action primary">Trocar foto<input type="file" accept="image/*" style="display:none" onchange="setDecupadorPhoto('${dc.id}', this.files[0]); closeEditorManage();"></label>${dc.photo ? `<button class="btn-card-action danger" onclick="removeDecupadorPhoto('${dc.id}'); closeEditorManage();">Remover foto</button>` : ''}</div></div>${tagManageHTML('decupador', dc)}` : `<div class="empty-state">Você só pode visualizar decupadores de outros times.</div>`}</div>`;
  document.getElementById('manage-modal-content').innerHTML=html; document.getElementById('modal-editor-manage').classList.add('open');
}

function renderLancarNotasEditores(el) {
  const u=state.currentUser; const isAdmin=u.role==='admin'; const canal=isAdmin ? state.adminSelectedCanal : u.canal; const c=canalCSS(canal); const editores=getEditoresByCanal(canal); const week=isAdmin ? (state.adminSelectedWeek || getCurrentWeek()) : getCurrentWeek(); const weeks=getAllWeeks();
  let html = `<div class="card subtle-card"><div style="font-weight:700;margin-bottom:4px;">Notas de Editores</div><div class="chart-card-sub">${isAdmin ? 'Modo Admin · pode alterar qualquer nota' : weekLabelLong(week)}</div></div>`;
  if (isAdmin) html += `<div class="admin-note-toolbar"><select class="week-select" onchange="state.adminSelectedCanal=this.value; renderTab(state.activeTab)">${getAllTeams().map(ch=>`<option value="${escapeAttr(ch)}" ${ch===canal?'selected':''}>${escapeHTML(ch)}</option>`).join('')}</select><select class="week-select" onchange="state.adminSelectedWeek=this.value; renderTab(state.activeTab)">${weeks.map(w=>`<option value="${w}" ${w===week?'selected':''}>${weekLabelLong(w)}</option>`).join('')}</select></div>`;
  if(!editores.length){ el.innerHTML=html+`<div class="card"><div class="empty-state">Cadastre editores em "Cadastro > Editores" primeiro.</div></div>`; return; }
  html += `<div class="card"><div class="table-wrap"><table class="notas-table"><thead><tr><th>Editor</th>${CRITERIOS.map(cr=>`<th>${cr.label}</th>`).join('')}<th>Views médias/sem</th><th>Watchtime</th><th>Atrasou?</th><th>Observação</th></tr></thead><tbody>`;
  editores.forEach(ed=>{ const views=state.notas[`${week}|${ed.id}|views24`]||''; const wt=state.notas[`${week}|${ed.id}|watchtime`]||''; const obs=state.notas[`${week}|${ed.id}|obs`]||''; const atrasou=getPersonAtraso(week, ed.id, 'editor'); const motivo=state.notas[`${week}|${ed.id}|motivoAtrasoEditor`]||'';
    html += `<tr><td><div style="display:flex;align-items:center;gap:10px;">${editorAvatarHTML(ed, canal, 30, 12)}<div><div style="font-weight:600;">${escapeHTML(ed.name)}</div>${personTagsHTML(ed,false,'editor')}${editorMedalsHTML(ed.id)}</div></div></td>${CRITERIOS.map(cr=>`<td>${renderStepper(week,ed.id,cr.key)}</td>`).join('')}<td><input class="perf-input" type="text" placeholder="116.000" value="${views}" onchange="saveViews('${week}','${ed.id}',this.value)"></td><td><input class="perf-input wt" type="text" placeholder="00:06:55" value="${wt}" onchange="saveWatchtime('${week}','${ed.id}',this.value)"></td><td><button class="filter-tab ${atrasou?'active':''}" onclick="toggleEditorAtraso('${week}','${ed.id}')">${atrasou?'Sim ⚠️':'Não'}</button><input class="field" style="margin-top:6px;min-width:160px;" placeholder="motivo" value="${escapeAttr(motivo)}" onchange="saveAtrasoReason('${week}','${ed.id}','editor',this.value)"></td><td><input class="obs-input" type="text" placeholder="opcional" value="${escapeAttr(obs)}" onchange="saveTextField('${week}','${ed.id}','obs',this.value)"></td></tr>`;

function renderLancarNotasDecupadores(el) {

function renderTeamColorSystem() {
  if (state.currentUser.role !== 'admin') return '';
  ensureV19State();
  let html = `<div class="card"><div class="chart-card-title">Times e cores</div><div class="chart-card-sub">Adicione novos times e configure as cores que aparecem no sistema.</div><div class="team-manage-grid">`;
  getAllTeams().forEach(canal=>{ const value=state.teamColors[canal] || DEFAULT_TEAM_COLORS_V19[canal] || '#0a84ff'; const isDefault=DEFAULT_TEAMS_V19.includes(canal);
    html += `<div class="team-manage-card"><div class="team-manage-head"><div class="team-dot-large" style="background:${value};"></div><div style="font-weight:900;flex:1;">${escapeHTML(canal)}</div><input class="team-color-input" type="color" value="${value}" onchange="setTeamColor('${escapeAttr(canal)}', this.value)"></div>${!isDefault ? `<button class="btn-card-action danger" onclick="removeTeamV19('${escapeAttr(canal)}')">Remover time</button>` : `<div class="chart-card-sub">Time padrão do sistema</div>`}</div>`;
  });
  html += `</div><div class="team-create-row"><input class="field" id="new-team-name" placeholder="Nome do novo time"><input class="team-color-input" id="new-team-color" type="color" value="#0a84ff"><button class="btn-add" onclick="addTeamV19()">+ Adicionar time</button></div><button class="btn-cancel" style="max-width:180px;margin-top:12px;" onclick="resetTeamColors()">Restaurar cores</button></div>`;

function addTeamV19(){ const name=(document.getElementById('new-team-name')?.value||'').trim(); const color=document.getElementById('new-team-color')?.value || '#0a84ff'; if(!name) return; ensureV19State(); if(state.teams.includes(name)){ alert('Esse time já existe.'); return; } state.teams.push(name); state.teamColors[name]=color; saveTeamsV19(); saveTeamColors(); logChange('Time adicionado', `${name} · ${color}`); renderTab(state.activeTab); showSaved(); }
function removeTeamV19(canal){ ensureV19State(); if(DEFAULT_TEAMS_V19.includes(canal)) return; const used=(state.editors||[]).some(e=>e.canal===canal)||(state.decupadores||[]).some(d=>d.canal===canal); if(used){ alert('Esse time ainda tem editores/decupadores cadastrados. Remova ou mova as pessoas antes.'); return; } if(!confirm(`Remover time ${canal}?`)) return; state.teams=state.teams.filter(t=>t!==canal); delete state.teamColors[canal]; saveTeamsV19(); saveTeamColors(); logChange('Time removido', canal); renderTab(state.activeTab); showSaved(); }

function addAvailableTagV19(){ const v=(document.getElementById('new-global-tag')?.value||'').trim(); if(!v) return; ensureV19State(); if(!state.availableTags.includes(v)) state.availableTags.push(v); saveTagsV19(); logChange('Tag padrão adicionada', v); renderTab(state.activeTab); showSaved(); }

.person-row:hover { background:var(--separator-soft); }
.history-chart-wrap { height:260px; position:relative; }
.metric-strip { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin:12px 0; }
.metric-mini { background:var(--bg-grouped2); border-radius:12px; padding:10px; }
.metric-mini-label { color:var(--text-secondary); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.35px; }
.metric-mini-value { font-size:20px; font-weight:900; margin-top:3px; }



/* ─── V19: atraso simples, tags e times dinâmicos ─── */
.tag-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
.person-tag { display:inline-flex; align-items:center; gap:5px; padding:4px 9px; border-radius:999px; background:var(--bg-grouped2); color:var(--text-secondary); border:1px solid var(--separator-soft); font-size:11px; font-weight:800; }
.person-tag.primary { background:var(--blue)18; color:var(--blue); border-color:var(--blue)35; }
.person-tag button { border:none; background:transparent; color:inherit; cursor:pointer; font-size:12px; padding:0; opacity:.8; }
.tag-editor-grid { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
.ops-person-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }
.ops-person-card { background:var(--bg-elevated); border:1px solid var(--separator-soft); border-radius:18px; padding:16px; box-shadow:var(--shadow-sm); position:relative; overflow:hidden; }
.ops-person-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--team-color); }
.ops-person-card.late { box-shadow:0 0 0 1px var(--red)35, 0 12px 30px var(--red)14; }
.ops-person-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.ops-person-title { font-weight:900; font-size:15px; }
.ops-person-sub { color:var(--text-secondary); font-size:12px; margin-top:2px; }
.ops-toggle { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.ops-toggle button { border:none; border-radius:12px; padding:10px; font-family:inherit; font-weight:900; cursor:pointer; background:var(--bg-grouped2); color:var(--text-secondary); }
.ops-toggle button.active-ok { background:var(--green)18; color:var(--green); box-shadow:inset 0 0 0 1px var(--green)45; }
.ops-toggle button.active-late { background:var(--red)18; color:var(--red); box-shadow:inset 0 0 0 1px var(--red)45; }
.ops-reason { margin-top:10px; display:grid; grid-template-columns:1fr; gap:8px; }
.team-manage-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:10px; }
.team-manage-card { background:var(--bg-grouped2); border:1px solid var(--separator-soft); border-radius:14px; padding:12px; }
.team-manage-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.team-dot-large { width:14px; height:14px; border-radius:50%; flex-shrink:0; }
.team-create-row { display:grid; grid-template-columns:1fr 80px auto; gap:8px; margin-top:12px; }
@media(max-width:700px){ .team-create-row { grid-template-columns:1fr; } .ops-person-grid{ grid-template-columns:1fr; } }



/* V20 FIX — contraste visual Dashboard e Operação */
.main-content {
  background:
    radial-gradient(circle at 12% 0%, var(--blue)12, transparent 28%),
    radial-gradient(circle at 88% 10%, var(--phoenix)10, transparent 24%),
    var(--bg);
}
.section-header {
  background: linear-gradient(135deg, var(--bg-elevated), var(--bg-grouped2));
  border: 1px solid var(--separator-soft);
  border-radius: 22px;
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.chart-card,
.card,
.ops-card,
.ops-person-card {
  background: linear-gradient(180deg, color-mix(in srgb, var(--bg-elevated) 88%, white 12%), var(--bg-elevated)) !important;
  border: 1px solid color-mix(in srgb, var(--separator-soft) 55%, white 18%) !important;
  box-shadow: 0 10px 28px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04) !important;
}
[data-theme="light"] .chart-card,
[data-theme="light"] .card,
[data-theme="light"] .ops-card,
[data-theme="light"] .ops-person-card {
  background: linear-gradient(180deg, #ffffff, #f7f7fb) !important;
  border-color: rgba(0,0,0,.08) !important;
  box-shadow: 0 8px 22px rgba(0,0,0,.08) !important;
}
.ops-grid {
  gap: 16px !important;
  margin: 18px 0 24px !important;
}
.ops-card {
  min-height: 132px;
  padding: 20px !important;
}
.ops-card::before {
  height: 5px !important;
  background: linear-gradient(90deg, var(--blue), var(--teal)) !important;
}
.ops-kicker,
.stat-label,
.chart-card-sub,
.ops-sub {
  color: var(--text-secondary) !important;
}
.ops-number {
  color: var(--text) !important;
  font-size: 38px !important;
  font-weight: 900 !important;
  letter-spacing: -1px;
}
.ops-person-grid {
  gap: 16px !important;
  margin-bottom: 24px;
}
.ops-person-card {
  padding: 18px !important;
}
.ops-person-card::before {
  width: 6px !important;
  background: var(--team-color, var(--blue)) !important;
}
.ops-person-card.late {
  border-color: color-mix(in srgb, var(--red) 50%, transparent) !important;
  box-shadow: 0 0 0 1px var(--red)35, 0 16px 36px var(--red)18 !important;
}
.ops-toggle {
  background: var(--bg-grouped2);
  padding: 5px;
  border-radius: 14px;
  border: 1px solid var(--separator-soft);
}
.ops-toggle button {
  border-radius: 10px !important;
  min-height: 34px;
}
.ops-toggle .active-ok {
  background: var(--green) !important;
  color: #fff !important;
}
.ops-toggle .active-late {
  background: var(--red) !important;
  color: #fff !important;
}
.canal-section-header {
  background: color-mix(in srgb, var(--bg-elevated) 80%, transparent);
  border: 1px solid var(--separator-soft);
  border-radius: 14px;
  padding: 12px 14px !important;
}
</style>

<script>
const USERS = {
  'admin':   { pass: 'prota2024', role: 'admin',     name: 'Chefe de Edição',   canal: null },
  'falco':   { pass: 'falco123',  role: 'supervisor', name: 'Sup. Falco',       canal: 'Falco' },
  'phoenix': { pass: 'phoenix123',role: 'supervisor', name: 'Sup. Phoenix',     canal: 'Phoenix' },
  'astra':   { pass: 'astra123',  role: 'supervisor', name: 'Sup. Astra',       canal: 'Astra' },
};

function hexToRgba(hex, alpha = 0.16) {
  if (!hex || !hex.startsWith('#')) return hex + '20';
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function canalCSS(canal) {
  const fallback = {
    Falco:   'var(--falco)',
    Phoenix: 'var(--phoenix)',
    Astra:   'var(--astra)',
  }[canal];
  const color = state?.teamColors?.[canal] || fallback;
  return { color, bg: color.startsWith('#') ? hexToRgba(color, 0.16) : color + '20' };
}

function saveTeamColors() { localStorage.setItem('prota_team_colors', JSON.stringify(state.teamColors)); scheduleCloudSave(); }
function setTeamColor(canal, value) {
  const old = state.teamColors[canal] || '';
  state.teamColors[canal] = value;
  saveTeamColors();
  logChange('Cor do time alterada', `${canal}: ${old || 'padrão'} → ${value}`);
  renderTab(state.activeTab);
  showSaved();
}
function resetTeamColors() {
  state.teamColors = {};
  saveTeamColors();
  logChange('Cores dos times restauradas', 'Voltou para o padrão do sistema');
  renderTab(state.activeTab);
  showSaved();
}

function renderTeamColorSystem() {
  if (state.currentUser.role !== 'admin') return '';
  const defaults = { Falco: '#ff9500', Phoenix: '#af52de', Astra: '#32ade6' };
  let html = `<div class="card">
    <div class="chart-card-title">Cores dos times</div>
    <div class="chart-card-sub">Altere as cores dos canais em todo o sistema.</div>
    <div class="team-color-grid">`;
  ['Falco','Phoenix','Astra'].forEach(canal => {
    const value = state.teamColors[canal] || defaults[canal];
    html += `<div class="team-color-card">
      <div class="team-color-left">
        <div class="team-color-dot" style="background:${value};"></div>
        <div class="team-color-name">${canal}</div>
      </div>
      <input class="team-color-input" type="color" value="${value}" onchange="setTeamColor('${canal}', this.value)">
    </div>`;
  });
  html += `</div><button class="btn-cancel" style="max-width:180px;" onclick="resetTeamColors()">Restaurar cores</button></div>`;
  return html;
}


function renderDatabaseSystem() {
  if (!state.currentUser || state.currentUser.role !== 'admin') return '';
  const cfg = state.dbConfig || { enabled:false, url:'', anonKey:'' };
  const statusClass = cfg.enabled ? 'on' : '';
  const statusText = cfg.enabled ? 'DB Supabase ativado' : 'LocalStorage apenas';
  return `<div class="card database-card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div>
        <div class="chart-card-title">Database / Multiusuário</div>
        <div class="chart-card-sub">Use Supabase para todos verem os mesmos dados em tempo real básico.</div>
      </div>
      <div class="db-status ${statusClass}">● ${statusText}</div>

// ─── WEEK & QUARTER ───────────────────────────────────────────

function getCurrentWeek() {
  const now = new Date();
  const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function weekLabel(w) {
  if (!w) return '';
  const [year, week] = w.split('-W');
  const d = new Date(year, 0, 1 + (parseInt(week) - 1) * 7);
  d.setDate(d.getDate() - d.getDay() + 1);
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const fmt = d2 => d2.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
  return `Sem ${week} · ${fmt(d)}–${fmt(end)}`;
}

function weekLabelLong(w) {
  if (!w) return '';
  const [year, week] = w.split('-W');
  const d = new Date(year, 0, 1 + (parseInt(week) - 1) * 7);
  d.setDate(d.getDate() - d.getDay() + 1);
  const end = new Date(d); end.setDate(end.getDate() + 6);
  const fmt = d2 => d2.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
  return `Semana ${week} · ${fmt(d)} a ${fmt(end)}`;
}

function getCurrentQuarter() {
  const now = new Date();
  const month = now.getMonth();
  return { year: now.getFullYear(), quarter: Math.floor(month / 3) + 1 };
}

function quarterLabel(q) {
  const months = {
    1: 'Jan – Mar',
    2: 'Abr – Jun',
    3: 'Jul – Set',
    4: 'Out – Dez',
  };
  return `Q${q.quarter} ${q.year} · ${months[q.quarter]}`;
}

function quarterLabelShort(q) {
  return `Q${q.quarter} ${q.year}`;
}

// week pertence ao quarter?
function weekInQuarter(weekStr, q) {
  const [year, week] = weekStr.split('-W').map(Number);
  if (year !== q.year) return false;
  const d = new Date(year, 0, 1 + (week - 1) * 7);
  d.setDate(d.getDate() - d.getDay() + 1);
  // get the thursday of that week (representative day per ISO)
  const thurs = new Date(d); thurs.setDate(d.getDate() + 3);
  const month = thurs.getMonth();
  const wq = Math.floor(month / 3) + 1;
  return wq === q.quarter;
}

function getWeeksInQuarter(q) {
  // build 13 weeks (max) for the quarter, return ISO week strings
  const startMonth = (q.quarter - 1) * 3;
  const start = new Date(q.year, startMonth, 1);
  const endMonth = startMonth + 3;
  const end = new Date(q.year, endMonth, 0); // last day of last month
  const weeks = new Set();
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const dd = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    dd.setUTCDate(dd.getUTCDate() + 4 - (dd.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(dd.getUTCFullYear(), 0, 1));
    const weekNo = Math.ceil((((dd - yearStart) / 86400000) + 1) / 7);
    const key = `${dd.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`;
    if (weekInQuarter(key, q)) weeks.add(key);
  }
  return [...weeks].sort();
}

function getAllQuarters() {
  // returns sorted list of {year, quarter} that have at least one week of notas, plus current
  const set = new Set();
  Object.keys(state.notas).forEach(k => {
    const week = k.split('|')[0];
    const [year, weekNo] = week.split('-W').map(Number);
    // determine quarter
    const d = new Date(year, 0, 1 + (weekNo - 1) * 7);
    d.setDate(d.getDate() - d.getDay() + 1 + 3); // thursday
    const q = Math.floor(d.getMonth() / 3) + 1;
    set.add(`${d.getFullYear()}-${q}`);
  });
  const cq = getCurrentQuarter();
  set.add(`${cq.year}-${cq.quarter}`);
  return [...set]
    .map(s => { const [y,q] = s.split('-').map(Number); return { year: y, quarter: q }; })
    .sort((a,b) => a.year !== b.year ? b.year - a.year : b.quarter - a.quarter);
}

function getLastNWeeks(n) {
  const weeks = [];
  const now = new Date();
  for (let i = 0; i < n; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i * 7);
    const dd = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    dd.setUTCDate(dd.getUTCDate() + 4 - (dd.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(dd.getUTCFullYear(), 0, 1));
    const weekNo = Math.ceil((((dd - yearStart) / 86400000) + 1) / 7);
    weeks.push(`${dd.getUTCFullYear()}-W${String(weekNo).padStart(2,'0')}`);
  }
  return weeks.reverse();
}

function getAllWeeks() {
  const weeks = new Set();
  Object.keys(state.notas).forEach(k => weeks.add(k.split('|')[0]));
  weeks.add(getCurrentWeek());
  return [...weeks].sort().reverse();
}

// ─── PERFORMANCE FORMAT ──────────────────────────────────────

function formatViews(num) {
  if (!num) return '';
  const n = parseInt(String(num).replace(/[^\d]/g, ''));
  if (isNaN(n)) return '';
  return n.toLocaleString('pt-BR');
}

function parseViewsInput(s) {
  const n = parseInt(String(s).replace(/[^\d]/g, ''));
  return isNaN(n) ? null : n;
}

function formatWatchtime(s) {
  // accepts mm:ss or hh:mm:ss; returns hh:mm:ss
  if (!s) return '';
  const parts = s.split(':').map(p => p.trim());
  if (parts.length === 2) {
    const m = parseInt(parts[0]) || 0;
    const sec = parseInt(parts[1]) || 0;
    return `00:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  if (parts.length === 3) {
    const h = parseInt(parts[0]) || 0;
    const m = parseInt(parts[1]) || 0;
    const sec = parseInt(parts[2]) || 0;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  // assume seconds only
  const total = parseInt(s) || 0;
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const sec = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function watchtimeToSeconds(s) {
  if (!s) return 0;
  const parts = s.split(':').map(p => parseInt(p) || 0);
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return parts[0];
}

// ─── STEPPER ──────────────────────────────────────────────────

function renderStepper(week, editorId, key) {
  const k = `${week}|${editorId}|${key}`;
  const val = state.notas[k] ? parseFloat(state.notas[k]) : null;
  const display = val !== null ? val.toFixed(1) : '–';
  const dispClass = val !== null ? '' : 'stepper-empty';

  return `<div class="nota-stepper">
    <button class="stepper-btn" onclick="stepNota('${week}','${editorId}','${key}',-0.5)" ${val !== null && val <= 1 ? 'disabled' : ''}>−</button>
    <div class="stepper-value ${dispClass}">${display}</div>
    <button class="stepper-btn" onclick="stepNota('${week}','${editorId}','${key}',0.5)" ${val !== null && val >= 4 ? 'disabled' : ''}>+</button>
  </div>`;
}

function stepNota(week, editorId, key, delta) {
  const k = `${week}|${editorId}|${key}`;
  const cur = state.notas[k] ? parseFloat(state.notas[k]) : null;
  let next;
  if (cur === null) {
    next = delta > 0 ? 1 : null;
  } else {
    next = Math.round((cur + delta) * 2) / 2;
    if (next < 1) next = 1;
    if (next > 4) next = 4;
  }
  if (next === null) {
    delete state.notas[k];
  } else {
    state.notas[k] = next.toString();
  }
  const ed = state.editors.find(e => e.id === editorId);
  const cr = CRITERIOS.find(c => c.key === key);
  logChange('Nota alterada', `${ed ? ed.name : editorId} · ${week} · ${cr ? cr.label : key}: ${cur === null ? 'sem nota' : cur} → ${next === null ? 'sem nota' : next}`);
  saveNotas();
  renderTab(state.activeTab);
  showSaved();
}

function calcDecupAvg(decupadorId, week) {
  let sum = 0, count = 0;
  CRITERIOS_DECUPAGEM.forEach(cr => {

}

function calcDecupAvgInQuarter(decupadorId, q, criterioKey = null) {

function calcAvg(editorId, week) {
  let sum = 0, count = 0;
  CRITERIOS.forEach(cr => {

    if (v) { sum += parseFloat(v); count++; }
  });
  return count > 0 ? sum / count : null;
}

function getEditorMedals(editorId) {
  const m = (state.editorMedals && state.editorMedals[editorId]) || {};
  return { stars: Number(m.stars || 0), skulls: Number(m.skulls || 0) };
}

function editorTier(editorId, q = state.selectedQuarter || getCurrentQuarter()) {
  const avg = calcAvgInQuarter(editorId, q);
  const m = getEditorMedals(editorId);
  if (m.skulls >= 3) return { tier:'D', cls:'tier-d', label:'Tier D' };
  if (avg === null) return { tier:'–', cls:'tier-b', label:'Sem tier' };
  if (avg >= 3.7 || m.stars >= 3) return { tier:'S', cls:'tier-s', label:'Tier S' };
  if (avg >= 3.4) return { tier:'A', cls:'tier-a', label:'Tier A' };
  if (avg >= 3.0) return { tier:'B', cls:'tier-b', label:'Tier B' };
  if (avg >= 2.5) return { tier:'C', cls:'tier-c', label:'Tier C' };
  return { tier:'D', cls:'tier-d', label:'Tier D' };
}

function tierHTML(editorId, q = state.selectedQuarter || getCurrentQuarter()) {
  const t = editorTier(editorId, q);
  if (t.tier === '–') return '';
  return `<span class="tier-badge ${t.cls}" title="${t.label}">${t.label}</span>`;
}

function editorMedalsHTML(editorId) {
  const m = getEditorMedals(editorId);
  if (!m.stars && !m.skulls) return '';
  return `<div class="badge-row">
    ${m.stars ? `<span class="editor-medal star" title="Estrelas dadas pelo admin">⭐ ${m.stars}</span>` : ''}
    ${m.skulls ? `<span class="editor-medal skull" title="Caveiras dadas pelo admin">☠️ ${m.skulls}</span>` : ''}
    ${m.skulls >= 3 ? `<span class="editor-medal skull" title="Alerta crítico">🚨 crítico</span>` : ''}
  </div>`;
}

function showMedalPop(type, delta) {
  const pop = document.createElement('div');
  pop.className = 'medal-pop';
  const icon = type === 'stars' ? '⭐' : '☠️';
  pop.textContent = `${delta > 0 ? '+1' : '-1'} ${icon}`;
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

function changeEditorMedal(editorId, type, delta) {
  if (!state.currentUser || state.currentUser.role !== 'admin') return;
  if (!state.editorMedals[editorId]) state.editorMedals[editorId] = { stars:0, skulls:0 };
  const cur = Number(state.editorMedals[editorId][type] || 0);
  const next = Math.max(0, cur + delta);
  if (next === cur) return;
  state.editorMedals[editorId][type] = next;
  const ed = state.editors.find(e => e.id === editorId);
  saveEditorMedals();
  logChange(type === 'stars' ? 'Estrela alterada' : 'Caveira alterada', `${ed ? ed.name : editorId}: ${type} = ${state.editorMedals[editorId][type]}`);
  const reopenManage = state.manageEditorId === editorId && document.getElementById('modal-editor-manage')?.classList.contains('open');
  showMedalPop(type, delta);
  showSaved();
  renderTab(state.activeTab);
  if (reopenManage) setTimeout(() => openEditorManage(editorId), 0);
}

function collectCloudData() {
  return {
    editors: state.editors || [],
    decupadores: state.decupadores || [],
    notas: state.notas || {},
    teamColors: state.teamColors || {},
    evalLabels: state.evalLabels || {},

    editorMedals: state.editorMedals || {},

  };
}

function applyCloudData(data) {
  if (!data || typeof data !== 'object') return;
  state.editors = data.editors || state.editors || [];
  state.decupadores = data.decupadores || state.decupadores || [];
  state.notas = data.notas || state.notas || {};
  state.teamColors = data.teamColors || state.teamColors || {};
  state.evalLabels = data.evalLabels || state.evalLabels || {};
  state.logs = data.logs || state.logs || [];
  state.chatMessages = data.chatMessages || state.chatMessages || [];
  state.pinnedMessage = data.pinnedMessage || '';
  state.editorMedals = data.editorMedals || state.editorMedals || {};
  state.pipelineItems = data.pipelineItems || state.pipelineItems || [];
  localStorage.setItem('prota_editors', JSON.stringify(state.editors));
  localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores || []));
  localStorage.setItem('prota_notas', JSON.stringify(state.notas));
  localStorage.setItem('prota_team_colors', JSON.stringify(state.teamColors));
  localStorage.setItem('prota_eval_labels', JSON.stringify(state.evalLabels));
  localStorage.setItem('prota_logs', JSON.stringify(state.logs.slice(0, 200)));
  localStorage.setItem('prota_chat_messages', JSON.stringify(state.chatMessages.slice(-300)));
  localStorage.setItem('prota_pinned_message', state.pinnedMessage || '');
  localStorage.setItem('prota_editor_medals', JSON.stringify(state.editorMedals || {}));
  localStorage.setItem('prota_pipeline_items', JSON.stringify(state.pipelineItems || []));
  applyCriterionLabels();
}

function saveDbConfig(enabled) {
  const url = document.getElementById('db-url')?.value.trim() || '';
  const anonKey = document.getElementById('db-key')?.value.trim() || '';
  state.dbConfig = { enabled, url, anonKey };
  localStorage.setItem('prota_db_config', JSON.stringify(state.dbConfig));
  showSaved();
  renderTab(state.activeTab);
}

function dbHeaders() {
  const key = state.dbConfig?.anonKey || '';
  return { 'apikey': key, 'Authorization': `Bearer ${key}`, 'Content-Type':'application/json' };
}

async function cloudPull(force=false) {
  const cfg = state.dbConfig || {};
  if (!cfg.enabled && !force) return;
  if (!cfg.url || !cfg.anonKey) { alert('Configure a URL e a Anon Key do Supabase primeiro.'); return; }
  try {
    const res = await fetch(`${cfg.url.replace(/\/$/,'')}/rest/v1/prota_state?id=eq.main&select=data`, { headers: dbHeaders() });
    if (!res.ok) throw new Error(await res.text());
    const rows = await res.json();
    if (rows && rows[0] && rows[0].data) {
      applyCloudData(rows[0].data);
      logChange('Sincronização DB', 'Dados baixados do Supabase');
      showSaved();
      renderTab(state.activeTab);
    } else if (force) alert('Nenhum dado encontrado no DB ainda. Use “Enviar para DB” primeiro.');
  } catch (err) { console.error(err); alert('Erro ao baixar do DB. Confira URL, chave, tabela e permissões.'); }
}

async function cloudPush(force=false) {
  const cfg = state.dbConfig || {};
  if (!cfg.enabled && !force) return;
  if (!cfg.url || !cfg.anonKey) { if(force) alert('Configure a URL e a Anon Key do Supabase primeiro.'); return; }
  try {
    const body = JSON.stringify({ id:'main', data: collectCloudData(), updated_at: new Date().toISOString() });
    const res = await fetch(`${cfg.url.replace(/\/$/,'')}/rest/v1/prota_state`, {
      method:'POST', headers:{ ...dbHeaders(), 'Prefer':'resolution=merge-duplicates' }, body
    });
    if (!res.ok) throw new Error(await res.text());
    if (force) { logChange('Sincronização DB', 'Dados enviados para o Supabase'); showSaved(); renderTab(state.activeTab); }
  } catch (err) { console.error(err); if(force) alert('Erro ao enviar para o DB. Confira tabela/permissões.'); }
}

function scheduleCloudSave() {
  if (!state.dbConfig || !state.dbConfig.enabled) return;
  clearTimeout(window._cloudSaveTimer);
  window._cloudSaveTimer = setTimeout(() => cloudPush(false), 800);
}

function pinnedInlineHTML() {
  const msg = (state.pinnedMessage || '').trim();
  if (!msg) return '';
  return `<div class="pinned-bar pinned-inline show"><div class="pinned-icon">📌</div><div class="pinned-content"><div class="pinned-title">Mensagem fixada da gestão</div><div class="pinned-text">${escapeHTML(msg)}</div></div></div>`;
}

function csvEscape(v) {
  const str = String(v ?? '');
  return '"' + str.replace(/"/g, '""') + '"';
}

function exportAvaliacoesCSV() {
  const rows = [];
  const header = ['Semana','Tipo','Canal','Nome','Critério 1','Critério 2','Critério 3','Critério 4','Média','Views médias/sem','Watchtime','Atrasou','Observação','Estrelas','Caveirinhas','Editor impactado','Vídeos'];
  rows.push(header.map(csvEscape).join(','));
  const weeks = getAllWeeks().slice().reverse();
  weeks.forEach(week => {
    state.editors.forEach(ed => {
      const avg = calcAvg(ed.id, week);
      const hasAny = avg !== null || state.notas[`${week}|${ed.id}|views24`] || state.notas[`${week}|${ed.id}|watchtime`] || state.notas[`${week}|${ed.id}|obs`] || state.notas[`${week}|${ed.id}|atrasouEditor`] === 'sim';
      if (!hasAny) return;
      const medals = getEditorMedals(ed.id);
      const row = [week, 'Editor', ed.canal, ed.name];
      CRITERIOS.forEach(cr => row.push(state.notas[`${week}|${ed.id}|${cr.key}`] || ''));
      row.push(avg !== null ? avg.toFixed(2) : '');
      row.push(state.notas[`${week}|${ed.id}|views24`] || '');
      row.push(state.notas[`${week}|${ed.id}|watchtime`] || '');
      row.push(state.notas[`${week}|${ed.id}|atrasouEditor`] === 'sim' ? 'Sim' : 'Não');
      row.push(state.notas[`${week}|${ed.id}|obs`] || '');
      row.push(medals.stars);
      row.push(medals.skulls);
      row.push('');
      row.push('');
      rows.push(row.map(csvEscape).join(','));
    });
    (state.decupadores || []).forEach(dc => {
      const avg = calcDecupAvg(dc.id, week);
      const hasAny = avg !== null || state.notas[`${week}|${dc.id}|views24`] || state.notas[`${week}|${dc.id}|watchtimeSeconds`] || state.notas[`${week}|${dc.id}|obsDecup`] || state.notas[`${week}|${dc.id}|atrasou`] === 'sim' || state.notas[`${week}|${dc.id}|videos`];
      if (!hasAny) return;
      const impactedId = state.notas[`${week}|${dc.id}|editorImpactado`] || '';
      const impacted = state.editors.find(e => e.id === impactedId)?.name || '';
      const row = [week, 'Decupador', dc.canal, dc.name];
      CRITERIOS_DECUPAGEM.forEach(cr => row.push(state.notas[`${week}|${dc.id}|${cr.key}`] || ''));
      row.push(avg !== null ? avg.toFixed(2) : '');
      row.push(state.notas[`${week}|${dc.id}|views24`] || '');
      row.push(state.notas[`${week}|${dc.id}|watchtimeSeconds`] || '');
      row.push(state.notas[`${week}|${dc.id}|atrasou`] === 'sim' ? 'Sim' : 'Não');
      row.push(state.notas[`${week}|${dc.id}|obsDecup`] || '');
      row.push('');
      row.push('');
      row.push(impacted);
      row.push(state.notas[`${week}|${dc.id}|videos`] || '');
      rows.push(row.map(csvEscape).join(','));
    });
  });
  const blob = new Blob(['\ufeff' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `avaliacoes-prota-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  logChange('Avaliações exportadas', 'CSV com editores e decupadores compatível com Google Sheets');
  showSaved();
}

function calcAvgInQuarter(editorId, q, criterioKey = null) {
  const weeks = getWeeksInQuarter(q);
  let sum = 0, count = 0;
  weeks.forEach(w => {
    if (criterioKey) {
      const v = state.notas[`${w}|${editorId}|${criterioKey}`];
      if (v) { sum += parseFloat(v); count++; }
    } else {
      CRITERIOS.forEach(cr => {
        const v = state.notas[`${w}|${editorId}|${cr.key}`];
        if (v) { sum += parseFloat(v); count++; }
      });
    }
  });
  return count > 0 ? sum / count : null;
}

function calcCriterioAvgInQuarter(criterioKey, q, canalFilter = null) {
  const weeks = getWeeksInQuarter(q);
  let sum = 0, count = 0;
  state.editors.forEach(ed => {
    if (canalFilter && canalFilter !== 'all' && ed.canal !== canalFilter) return;
    weeks.forEach(w => {
      const v = state.notas[`${w}|${ed.id}|${criterioKey}`];
      if (v) { sum += parseFloat(v); count++; }
    });
  });
  return count > 0 ? sum / count : null;
}

function heatClass(score) {
  if (score === null) return 'empty';
  if (score < 1.5) return 'heat-1';
  if (score < 2)   return 'heat-1-5';
  if (score < 2.5) return 'heat-2';
  if (score < 3)   return 'heat-2-5';
  if (score < 3.5) return 'heat-3';
  if (score < 4)   return 'heat-3-5';
  return 'heat-4';
}

function colorByScore(score) {
  if (score === null) return 'var(--text-tertiary)';
  if (score < 2.5) return 'var(--red)';
  if (score < 3) return 'var(--orange)';
  if (score < 3.5) return 'var(--green)';
  return 'var(--blue)';
}

function renderAdminPerformanceSuggestions(q) {
  if (!state.currentUser || state.currentUser.role !== 'admin') return '';
  const week = getCurrentWeek();
  const starSuggestions = [];
  const skullSuggestions = [];
  const critical = [];
  state.editors.forEach(ed => {
    const weekAvg = calcAvg(ed.id, week);
    const quarterAvg = calcAvgInQuarter(ed.id, q);
    const m = getEditorMedals(ed.id);
    if ((weekAvg !== null && weekAvg >= 3.5) || (quarterAvg !== null && quarterAvg >= 3.5)) starSuggestions.push({ ...ed, avg: weekAvg ?? quarterAvg });
    if ((weekAvg !== null && weekAvg < 2.5) || (quarterAvg !== null && quarterAvg < 2.5)) skullSuggestions.push({ ...ed, avg: weekAvg ?? quarterAvg });
    if (m.skulls >= 3) critical.push({ ...ed, skulls: m.skulls });
  });
  const makeRows = (items, type) => items.slice(0,5).map(ed => {
    const isStar = type === 'star';
    return `<div class="alert-row ${!isStar && getEditorMedals(ed.id).skulls >= 3 ? 'urgent-row' : ''}">
      ${editorAvatarHTML(ed, ed.canal, 30, 11)}
      <div class="alert-name">${ed.name}<br><span style="font-size:11px;color:var(--text-secondary);">${ed.canal} · média ${ed.avg !== undefined ? ed.avg.toFixed(1) : '–'}</span></div>
      <button class="mini-action-btn ${isStar ? 'star' : 'skull'}" onclick="changeEditorMedal('${ed.id}','${isStar ? 'stars' : 'skulls'}',1)">${isStar ? 'Aprovar ⭐' : 'Aplicar ☠️'}</button>
    </div>`;
  }).join('') || '<div class="empty-state" style="padding:16px;">Sem sugestões agora.</div>';
  const criticalRows = critical.slice(0,5).map(ed => {
    return `<div class="alert-row urgent-row">${editorAvatarHTML(ed, ed.canal, 30, 11)}<div class="alert-name">${ed.name}<br><span style="font-size:11px;color:var(--red);font-weight:800;">${ed.skulls} caveiras acumuladas</span></div><button class="mini-action-btn skull" onclick="openPautaFromAlert('${ed.id}')">Abrir pauta</button></div>`;
  }).join('') || '<div class="empty-state" style="padding:16px;">Nenhum editor crítico.</div>';
  return `<div class="suggestion-grid">
    <div class="suggestion-card"><div class="suggestion-title">⭐ Sugestões de estrela</div><div class="suggestion-sub">Baseado em média alta na semana ou no trimestre. O admin aprova manualmente.</div>${makeRows(starSuggestions, 'star')}</div>
    <div class="suggestion-card"><div class="suggestion-title">☠️ Sugestões de caveira</div><div class="suggestion-sub">Baseado em média baixa. O sistema só sugere; quem aplica é o admin.</div>${makeRows(skullSuggestions, 'skull')}</div>
    <div class="suggestion-card"><div class="suggestion-title">🚨 Alerta crítico</div><div class="suggestion-sub">Editores com 3 ou mais caveiras acumuladas.</div>${criticalRows}</div>
  </div>`;
}

function renderDashboardDecupadoresResumo(q) {
  const decups = state.decupadores || [];
  const weeks = getWeeksInQuarter(q);
  const avaliados = decups.filter(dc => weeks.some(w => CRITERIOS_DECUPAGEM.some(cr => state.notas[`${w}|${dc.id}|${cr.key}`]))).length;

const PIPELINE_STAGES = [
  { key:'decupagem', label:'Decupagem', icon:'🎬' },
  { key:'edicao', label:'Edição', icon:'✂️' },
  { key:'revisao', label:'Revisão', icon:'👀' },
  { key:'postado', label:'Postado', icon:'🚀' },
];

function getVisibleCanais() {
  return state.currentUser && state.currentUser.role === 'admin' ? ['Falco','Phoenix','Astra'] : [state.currentUser.canal];
}
function nowISODate() { return new Date().toISOString().slice(0,10); }
function daysBetween(a,b=new Date()) {
  if (!a) return 0;
  const d = new Date(a + 'T00:00:00');
  return Math.max(0, Math.floor((new Date(b).setHours(0,0,0,0) - d.setHours(0,0,0,0)) / 86400000));
}
function stageSLA(stage) { return ({ decupagem:2, edicao:3, revisao:1, postado:999 })[stage] || 2; }
function pipelineIsLate(item) { return item.stage !== 'postado' && daysBetween(item.updatedAt || item.createdAt || nowISODate()) > stageSLA(item.stage); }
function pipelineStageIndex(stage) { return PIPELINE_STAGES.findIndex(s => s.key === stage); }
function pipelineProgressHTML(item) {
  const idx = pipelineStageIndex(item.stage);
  const late = pipelineIsLate(item);
  return `<div class="timeline-mini">${PIPELINE_STAGES.map((s,i)=>`<div class="timeline-step ${i<=idx?'on':''} ${late && i===idx?'late':''}" title="${s.label}"></div>`).join('')}</div>`;
}
function priorityFromAvg(avg, late=false, skulls=0) {
  if (late || skulls >= 3 || (avg !== null && avg < 2.5)) return { label:'Crítico', cls:'priority-critical', icon:'🔴' };
  if (skulls > 0 || (avg !== null && avg < 3.2)) return { label:'Atenção', cls:'priority-attention', icon:'🟡' };
  return { label:'OK', cls:'priority-ok', icon:'🟢' };
}
function priorityHTML(obj) { return `<span class="priority-pill ${obj.cls}">${obj.icon} ${obj.label}</span>`; }
function getAllPeople(type='editor') { return type === 'decupador' ? (state.decupadores || []) : (state.editors || []); }
function calcPersonAvgInQuarter(person, q, type='editor') { return type === 'decupador' ? calcDecupAvgInQuarter(person.id, q) : calcAvgInQuarter(person.id, q); }
function calcPersonAvg(person, week, type='editor') { return type === 'decupador' ? calcDecupAvg(person.id, week) : calcAvg(person.id, week); }
function isPersonLateThisWeek(person, week, type='editor') { return state.notas[`${week}|${person.id}|${type==='decupador'?'atrasou':'atrasouEditor'}`] === 'sim'; }
function personAvatar(person, type='editor', size=30, fs=11) { return type === 'decupador' ? decupadorAvatarHTML(person,size,fs) : editorAvatarHTML(person, person.canal, size, fs); }

function movePipelineItem(id, dir) {

function buildPriorityList(q) {
  const week = getCurrentWeek();
  const canais = getVisibleCanais();
  const arr = [];
  state.editors.filter(e=>canais.includes(e.canal)).forEach(ed => {
    const avg = calcAvgInQuarter(ed.id, q); const medals = getEditorMedals(ed.id); const late = isPersonLateThisWeek(ed, week, 'editor');
    const priority = priorityFromAvg(avg, late, medals.skulls);
    arr.push({ type:'editor', person:ed, avg, late, skulls:medals.skulls, priority });
  });
  (state.decupadores || []).filter(d=>canais.includes(d.canal)).forEach(dc => {
    const avg = calcDecupAvgInQuarter(dc.id, q); const late = isPersonLateThisWeek(dc, week, 'decupador') || countDecupAtrasosInQuarter(dc.id, q) > 1;
    const priority = priorityFromAvg(avg, late, 0);
    arr.push({ type:'decupador', person:dc, avg, late, skulls:0, priority });
  });
  const order = { 'Crítico':0, 'Atenção':1, 'OK':2 };
  return arr.sort((a,b)=> order[a.priority.label]-order[b.priority.label] || (a.avg??9)-(b.avg??9));
}

  }).join('')}</div>` : `<div class="empty-state">Sem pessoas cadastradas.</div>`}</div>`;
}
function renderInsightsPanel(q, week) {
  const insights = [];
  ['Falco','Phoenix','Astra'].forEach(canal => {
    if (!getVisibleCanais().includes(canal)) return;
    const eds = getEditoresByCanal(canal);

    if (ritmos.length && ritmos.reduce((a,b)=>a+b,0)/ritmos.length < 2.8) insights.push({e:'🎬', t:`${canal} com risco em Ritmo`, d:'A média de ritmo está baixa. Priorize treinamento de pacing e cortes longos.'});

  });
  const critical = buildPriorityList(q).filter(x=>x.priority.label==='Crítico').length;

  <div class="dash-grid">
    <div class="chart-card">
      <div class="chart-card-title">Distribuição de Notas</div>
      <div class="chart-card-sub">Por critério, no trimestre</div>
      <div class="chart-wrap"><canvas id="chart-criterios"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Editores em Alerta</div>

      html += `<div class="alert-row clickable-alert" onclick="openPautaFromAlert('${ed.id}')" title="Abrir pauta 1:1 de ${ed.name}">

    html += `</div>`;
  }
  html += `</div></div>`;

  html += `<div class="chart-card">
    <div class="chart-card-title">Top editores por views</div>
    <div class="chart-card-sub">Soma de Views médias/sem no trimestre</div>`;
  if (topViews.length === 0) {
    html += `<div class="empty-state" style="padding:20px;">Sem dados de views no trimestre.</div>`;
  } else {
    html += `<div class="alert-list">`;
    topViews.forEach((ed, i) => {
      const cc = canalCSS(ed.canal);
      html += `<div class="alert-row">
        <div style="font-size:13px;color:var(--text-tertiary);font-weight:800;width:22px;">#${i+1}</div>
        ${editorAvatarHTML(ed, ed.canal, 30, 11)}
        <div class="alert-name">${ed.name}<br>${editorMedalsHTML(ed.id)}</div>
        ${tierHTML(ed.id)}
        <div class="alert-canal" style="background:${cc.bg};color:${cc.color};">${ed.canal}</div>
        <div class="alert-score" style="color:var(--green);min-width:86px;">${formatViews(ed.totalViews)}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;


  html += renderSeparatedRankings(q);

  html += `<div class="chart-card">
    <div class="chart-card-title">Heatmap · Editor x Semana</div>
    <div class="chart-card-sub">Média semanal no trimestre · ${quarterWeeks.length} semanas</div>
    <div class="heatmap-wrap" id="heatmap-container"></div>

  setTimeout(() => {

function sumViewsInQuarter(personId, q) {
  let total = 0;
  getWeeksInQuarter(q).forEach(w => {
    const v = state.notas[`${w}|${personId}|views24`];
    if (v) total += parseViewsInput(v) || 0;
  });
  return total;
}

function countDecupAtrasosInQuarter(decupadorId, q) {
  return getWeeksInQuarter(q).filter(w => state.notas[`${w}|${decupadorId}|atrasou`] === 'sim').length;
}

function renderSeparatedRankings(q) {
  const topEditors = [...state.editors].map(ed => ({...ed, views: sumViewsInQuarter(ed.id, q), avg: calcAvgInQuarter(ed.id, q)}))
    .filter(x => x.views > 0 || x.avg !== null)
    .sort((a,b) => (b.views - a.views) || ((b.avg||0)-(a.avg||0))).slice(0,5);
  const topDecup = [...(state.decupadores || [])].map(dc => ({...dc, avg: calcDecupAvgInQuarter(dc.id, q), views: sumViewsInQuarter(dc.id, q), atrasos: countDecupAtrasosInQuarter(dc.id, q)}))
    .filter(x => x.avg !== null || x.atrasos > 0)
    .sort((a,b) => (b.views-a.views) || ((b.avg||0)-(a.avg||0)) || (a.atrasos-b.atrasos)).slice(0,5);
  const rowEditor = ed => { const cc=canalCSS(ed.canal); return `<div class="alert-row"><div class="editor-avatar" style="width:28px;height:28px;font-size:10px;background:${cc.color};">${avatarFor(ed.name)}</div><div class="alert-name">${escapeHTML(ed.name)}</div><div class="alert-canal" style="background:${cc.bg};color:${cc.color};">${ed.canal}</div><div class="alert-score">${ed.views ? formatViews(ed.views) : (ed.avg ? ed.avg.toFixed(1) : '–')}</div></div>`; };
  const rowDecup = dc => { const cc=canalCSS(dc.canal); return `<div class="alert-row">${decupadorAvatarHTML(dc,28,10)}<div class="alert-name">${escapeHTML(dc.name)}</div><div class="alert-canal" style="background:${cc.bg};color:${cc.color};">${dc.canal}</div><div class="alert-score" style="color:${dc.atrasos ? 'var(--red)' : colorByScore(dc.avg)};">${dc.views ? formatViews(dc.views) : (dc.avg !== null ? dc.avg.toFixed(1) : '–')}${dc.atrasos ? ` · ⚠️${dc.atrasos}` : ''}</div></div>`; };
  return `<div class="ranking-split">
    <div class="chart-card"><div class="chart-card-title">Ranking · Editores</div><div class="chart-card-sub">Top por views no trimestre</div>${topEditors.length ? `<div class="alert-list">${topEditors.map(rowEditor).join('')}</div>` : `<div class="empty-state" style="padding:20px;">Sem dados de editores.</div>`}</div>
    <div class="chart-card"><div class="chart-card-title">Ranking · Decupadores</div><div class="chart-card-sub">Top por views/nota de decupagem · ⚠️ mostra atrasos</div>${topDecup.length ? `<div class="alert-list">${topDecup.map(rowDecup).join('')}</div>` : `<div class="empty-state" style="padding:20px;">Sem dados de decupadores.</div>`}</div>
  </div>`;
}

function buildChartCanais(q) {
  const canvas = document.getElementById('chart-canais');
  if (!canvas) return;

  const data = ['Falco', 'Phoenix', 'Astra'].map(canal => {
    const eds = getEditoresByCanal(canal);
    const avgs = eds.map(ed => calcAvgInQuarter(ed.id, q)).filter(x => x !== null);
    return avgs.length > 0 ? avgs.reduce((a,b)=>a+b,0) / avgs.length : 0;
  });

  const styles = getComputedStyle(document.documentElement);
  const textColor = styles.getPropertyValue('--text-secondary').trim();
  const gridColor = styles.getPropertyValue('--separator-soft').trim();
  // Usa as cores configuradas pelo admin, não apenas as cores padrão do CSS.
  const teamColors = ['Falco', 'Phoenix', 'Astra'].map(canal => canalCSS(canal).color);

  if (window._chartCanais) window._chartCanais.destroy();
  window._chartCanais = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: ['Falco', 'Phoenix', 'Astra'],
      datasets: [{
        data,
        backgroundColor: teamColors,
        hoverBackgroundColor: teamColors,
        borderColor: teamColors,
        borderWidth: 1,
        borderRadius: 10,
        borderSkipped: false,
        barThickness: 42,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { beginAtZero: true, max: 4, ticks: { color: textColor, stepSize: 1 }, grid: { color: gridColor } },
        x: { ticks: { color: textColor }, grid: { display: false } }
      }
    }
  });
}

function buildChartEvolution(q) {
  const canvas = document.getElementById('chart-evolution');
  if (!canvas) return;

  const weeks = getWeeksInQuarter(q);
  const styles = getComputedStyle(document.documentElement);
  const textColor = styles.getPropertyValue('--text-secondary').trim();
  const gridColor = styles.getPropertyValue('--separator-soft').trim();

  const datasets = ['Falco', 'Phoenix', 'Astra'].map(canal => {
    const data = weeks.map(w => {
      const eds = getEditoresByCanal(canal);
      const avgs = eds.map(ed => calcAvg(ed.id, w)).filter(x => x !== null);
      return avgs.length > 0 ? avgs.reduce((a,b)=>a+b,0) / avgs.length : null;
    });
    return {
      label: canal,
      data,
      borderColor: canalCSS(canal).color,
      backgroundColor: canalCSS(canal).bg,
      tension: 0.35,
      borderWidth: 2.5,
      pointRadius: 3,
      pointHoverRadius: 5,
      spanGaps: true,
    };
  });

  if (window._chartEvolution) window._chartEvolution.destroy();
  window._chartEvolution = new Chart(canvas, {
    type: 'line',
    data: { labels: weeks.map(w => 'S' + w.split('-W')[1]), datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: textColor, boxWidth: 12, padding: 12 } } },
      scales: {
        y: { beginAtZero: true, max: 4, ticks: { color: textColor, stepSize: 1 }, grid: { color: gridColor } },
        x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } }
      }
    }
  });
}

function buildChartCriterios(q) {
  const canvas = document.getElementById('chart-criterios');
  if (!canvas) return;

  const styles = getComputedStyle(document.documentElement);
  const textColor = styles.getPropertyValue('--text-secondary').trim();
  const gridColor = styles.getPropertyValue('--separator-soft').trim();

  const data = CRITERIOS.map(cr => calcCriterioAvgInQuarter(cr.key, q) || 0);

  if (window._chartCriterios) window._chartCriterios.destroy();
  window._chartCriterios = new Chart(canvas, {
    type: 'radar',
    data: {
      labels: CRITERIOS.map(c => c.label),
      datasets: [{
        data,
        backgroundColor: styles.getPropertyValue('--blue').trim() + '30',
        borderColor: styles.getPropertyValue('--blue').trim(),

        pointBackgroundColor: styles.getPropertyValue('--blue').trim(),
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          beginAtZero: true,
          max: 4,
          ticks: { color: textColor, backdropColor: 'transparent', stepSize: 1 },
          grid: { color: gridColor },
          angleLines: { color: gridColor },

        }
      }
