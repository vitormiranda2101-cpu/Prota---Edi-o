  window.renderRankingMVP=function(el){ const type=state.rankFunctionV24||'editor'; const period=state.rankPeriod||'month'; const rows=rowsFor(type,period); const periodLabel=period==='month'?'Este mês':period==='quarter'?'Trimestre':'Tudo'; let html=`<div class="section-header"><div class="section-header-left"><div class="section-title">🏆 Ranking & MVP</div><div class="section-sub">Ranking separado por função para não misturar métricas de Editor e Decupador</div></div><div class="rank-controls"><div class="v24-rank-tabs"><button class="v24-rank-tab ${type==='editor'?'active':''}" onclick="setRankFunctionV24('editor')">Editores</button><button class="v24-rank-tab ${type==='decupador'?'active':''}" onclick="setRankFunctionV24('decupador')">Decupadores</button></div><select class="week-select" onchange="setRankPeriodV24(this.value)"><option value="month" ${period==='month'?'selected':''}>Este mês</option><option value="quarter" ${period==='quarter'?'selected':''}>Trimestre</option><option value="all" ${period==='all'?'selected':''}>Tudo</option></select></div></div>`; if(!rows.length){ el.innerHTML=html+`<div class="card"><div class="empty-state">Ainda não há avaliações suficientes em ${type==='editor'?'Editores':'Decupadores'} para montar o ranking.</div></div>`; return; } html+=heroCards(rows,type); html+=podium(rows); html+= type==='editor'?editorTable(rows):decupTable(rows); el.innerHTML=html; };
})();

<script>
(function(){
  const V25_ALL_TABS = ['Dashboard','Ranking & MVP','Operação','Dificuldades','Pautas 1:1','Lançar Notas','Cadastro','Perfil','Histórico','Configurações','Chat','Mensagem Fixada','Logs'];
  const V25_SUP_DEFAULT = ['Ranking & MVP','Operação','Lançar Notas','Dificuldades','Cadastro','Perfil','Chat'];
  function ensureV25(){
    state.permissions = state.permissions || JSON.parse(localStorage.getItem('prota_permissions')||'{}');
    state.userAccounts = state.userAccounts || JSON.parse(localStorage.getItem('prota_user_accounts')||'[]');

  }
  function saveV25(){

    localStorage.setItem('prota_user_accounts', JSON.stringify(state.userAccounts||[]));
    localStorage.setItem('prota_profile_notes', JSON.stringify(state.profileNotes||{}));

  function esc(s){ return typeof escapeHTML==='function'?escapeHTML(String(s??'')):String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function getTeams(){ try { return typeof getAllTeams==='function'?getAllTeams():(state.teams||['Falco','Phoenix','Astra']); } catch(e){ return state.teams||['Falco','Phoenix','Astra']; } }
  function permKey(canal, role='supervisor'){ return `${role}:${canal}`; }
  function allowedTabsFor(user){
    ensureV25();
    if(!user) return [];
    if(user.role==='admin') return V25_ALL_TABS;
    const base = (state.permissions||{})[permKey(user.canal,user.role)] || (state.permissions||{})[user.canal] || V25_SUP_DEFAULT;
    return base.filter(t=>V25_ALL_TABS.includes(t));
  }
  window.v25CanOpenTab=function(tab){ const u=state.currentUser; if(!u) return false; if(u.role==='admin') return true; return allowedTabsFor(u).includes(tab); };
  function iconFor(t){ return ({'Dashboard':'📊','Ranking & MVP':'🏆','Operação':'📌','Dificuldades':'🔎','Pautas 1:1':'💬','Lançar Notas':'📝','Cadastro':'👥','Perfil':'👤','Histórico':'🗂️','Configurações':'⚙️','Chat':'💬','Mensagem Fixada':'📣','Logs':'🧾'}[t]||'•'); }

  const oldDoLogin = window.doLogin;
  window.doLogin = function(){
    ensureV25();
    const raw = (document.getElementById('login-user')?.value||'').trim();
    const p = document.getElementById('login-pass')?.value||'';
    const key = raw.toLowerCase();
    let user = USERS[key];
    let username = key;
    const acc = (state.userAccounts||[]).find(a => String(a.email||'').toLowerCase()===key || String(a.username||'').toLowerCase()===key);
    if(acc){ user = {pass: acc.pass||acc.password||'', role: acc.role||'supervisor', name: acc.name||acc.email, canal: acc.canal||acc.team||null, email: acc.email, personType: acc.personType||'', personId: acc.personId||''}; username=acc.email||acc.username; }

  window.initApp = function(){

  window.v25RenderPerfil=function(el){

    el.innerHTML=html; setTimeout(()=>v25BuildProfileChart(type,id),30);
  };
  function v25BuildProfileChart(type,id){ if(typeof Chart==='undefined') return; const c=document.getElementById('v25-profile-chart'); if(!c) return; const weeks=(typeof getWeeksInQuarter==='function'?getWeeksInQuarter(state.selectedQuarter||getCurrentQuarter()):[]); const data=weeks.map(w=> type==='decupador'&&typeof calcDecupadorAvg==='function'?calcDecupadorAvg(id,w):(typeof calcAvg==='function'?calcAvg(id,w):null)); const st=getComputedStyle(document.documentElement); if(window._v25ProfileChart) window._v25ProfileChart.destroy(); window._v25ProfileChart=new Chart(c,{type:'line',data:{labels:weeks.map(w=>'S'+w.split('-W')[1]),datasets:[{label:'Média',data,borderColor:st.getPropertyValue('--blue').trim(),backgroundColor:st.getPropertyValue('--blue').trim()+'20',tension:.35,borderWidth:3,pointRadius:4,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:st.getPropertyValue('--text-secondary').trim()}}},scales:{y:{min:0,max:4,ticks:{color:st.getPropertyValue('--text-secondary').trim()},grid:{color:st.getPropertyValue('--separator-soft').trim()}},x:{ticks:{color:st.getPropertyValue('--text-secondary').trim()},grid:{display:false}}}}}); }

  // Configurações: permissões + contas por email
  const oldConfig = window.renderConfiguracoes;
  window.renderConfiguracoes=function(el){ oldConfig(el); if(state.currentUser?.role!=='admin') return; el.insertAdjacentHTML('beforeend', v25PermissionsHTML()+v25AccountsHTML()); };
  function v25PermissionsHTML(){ const tabs=V25_ALL_TABS.filter(t=>!['Configurações','Mensagem Fixada','Logs'].includes(t)); return `<div style="height:14px"></div><div class="section-header"><div class="section-header-left"><div class="section-title">Permissões por time</div><div class="section-sub">Libere abas específicas para cada time/supervisor. Ex: liberar Dashboard para Falco.</div></div></div><div class="v25-perm-grid">${getTeams().map(team=>{ const key=permKey(team,'supervisor'); const allowed=(state.permissions||{})[key]||V25_SUP_DEFAULT; const cc=typeof canalCSS==='function'?canalCSS(team):{color:'var(--blue)'}; return `<div class="v25-perm-card"><div class="v25-perm-title" style="color:${cc.color}">${esc(team)}</div><div class="v25-perm-sub">Permissões do cargo Supervisor</div><div class="v25-checks">${tabs.map(t=>`<label class="v25-check"><input type="checkbox" ${allowed.includes(t)?'checked':''} onchange="v25TogglePermission('${esc(team)}','${esc(t)}',this.checked)">${iconFor(t)} ${esc(t)}</label>`).join('')}</div></div>`; }).join('')}</div>`; }
  window.v25TogglePermission=function(team,tab,on){ ensureV25(); const key=permKey(team,'supervisor'); let arr=(state.permissions[key]||V25_SUP_DEFAULT).slice(); if(on && !arr.includes(tab)) arr.push(tab); if(!on) arr=arr.filter(x=>x!==tab); state.permissions[key]=arr; logChange('Permissão alterada', `${team}: ${tab} ${on?'liberado':'bloqueado'}`); saveV25(); showSaved(); };
  function v25AccountsHTML(){ const people=allPeople(); return `<div style="height:14px"></div><div class="section-header"><div class="section-header-left"><div class="section-title">Login por email</div><div class="section-sub">Crie acessos por email e vincule o usuário a um perfil.</div></div></div><div class="card"><div class="v25-email-grid"><input class="field" id="v25-acc-name" placeholder="Nome do usuário"><input class="field" id="v25-acc-email" placeholder="email@prota.com"><input class="field" id="v25-acc-pass" placeholder="senha"><select class="field" id="v25-acc-role"><option value="supervisor">Supervisor</option><option value="admin">Admin</option><option value="viewer">Viewer</option></select><select class="field" id="v25-acc-team">${getTeams().map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join('')}</select><select class="field" id="v25-acc-person"><option value="">Sem perfil vinculado</option>${people.map(p=>`<option value="${p.type}|${p.id}">${esc(p.name)} · ${p.roleLabel} · ${esc(p.canal)}</option>`).join('')}</select></div><button class="btn-add" style="margin-top:12px" onclick="v25AddAccount()">Criar login</button><div class="v25-mini-note">O campo “Usuário” da tela de login aceita email ou usuário antigo.</div></div><div class="card"><div class="chart-card-title">Contas cadastradas</div><div class="alert-list">${(state.userAccounts||[]).length?(state.userAccounts||[]).map(a=>`<div class="alert-row"><div class="alert-name"><b>${esc(a.name||a.email)}</b><div class="editor-meta">${esc(a.email)} · ${esc(a.role)} · ${esc(a.canal||'sem time')}</div></div><button class="btn-delete" onclick="v25RemoveAccount('${esc(a.id)}')">✕</button></div>`).join(''):'<div class="empty-state">Nenhuma conta por email criada.</div>'}</div></div>`; }
  window.v25AddAccount=function(){ const person=(document.getElementById('v25-acc-person')?.value||'').split('|'); const acc={id:Date.now().toString(),name:(document.getElementById('v25-acc-name')?.value||'').trim(),email:(document.getElementById('v25-acc-email')?.value||'').trim().toLowerCase(),pass:(document.getElementById('v25-acc-pass')?.value||'').trim(),role:document.getElementById('v25-acc-role')?.value||'supervisor',canal:document.getElementById('v25-acc-team')?.value||'',personType:person[0]||'',personId:person[1]||''}; if(!acc.email||!acc.pass){alert('Preencha email e senha.');return;} state.userAccounts=(state.userAccounts||[]).filter(a=>a.email!==acc.email); state.userAccounts.push(acc); logChange('Login criado', acc.email); saveV25(); renderTab('Configurações'); };
  window.v25RemoveAccount=function(id){ state.userAccounts=(state.userAccounts||[]).filter(a=>a.id!==id); logChange('Login removido', id); saveV25(); renderTab('Configurações'); };

  // MVP popup semanal: terça-feira, melhor editor e decupador
  function scoreFor(type,p){ const avg=avgPerson(type,p.id)||0; let views=0, atrasos=0; Object.keys(state.notas||{}).forEach(k=>{ const [w,id,key]=k.split('|'); if(id!==p.id) return; if(key==='views24') views+=parseInt(String(state.notas[k]).replace(/\D/g,''))||0; if(key==='atrasou' && String(state.notas[k])==='sim') atrasos++; }); return Math.max(0, Math.round(avg*20 + Math.min(20,views/5000) - atrasos*8)); }
  function bestOf(type){ const arr=(type==='decupador'?(state.decupadores||[]):(state.editors||[])).map(p=>({...p,score:scoreFor(type,p)})).sort((a,b)=>b.score-a.score); return arr[0]||null; }
  window.v25MaybeShowMVP=function(force=false){ const now=new Date(); const weekKey=`${now.getFullYear()}-${typeof getCurrentWeek==='function'?getCurrentWeek():''}`; const seen=localStorage.getItem('prota_mvp_seen_week'); if(!force && now.getDay()!==2) return; if(!force && seen===weekKey) return; const ed=bestOf('editor'), dc=bestOf('decupador'); if(!ed&&!dc) return; if(!document.getElementById('v25-mvp-overlay')) document.body.insertAdjacentHTML('beforeend','<div class="v25-mvp-overlay" id="v25-mvp-overlay"></div>'); const modal=document.getElementById('v25-mvp-overlay'); const card=(p,role)=>p?`<div class="v25-mvp-card"><div class="v25-mvp-avatar">${esc((typeof avatarFor==='function'?avatarFor(p.name):(p.name||'?').slice(0,2)).toUpperCase())}</div><div class="v25-mvp-name">${esc(p.name)}</div><div class="v25-mvp-role">${role}</div><div class="v25-mvp-score">${p.score} pts</div></div>`:`<div class="v25-mvp-card"><div class="v25-mvp-name">Sem dados</div><div class="v25-mvp-role">${role}</div></div>`; modal.innerHTML=`<div class="v25-mvp-modal"><button class="v25-mvp-close" onclick="v25CloseMVP()">×</button><div class="v25-mvp-kicker">🏆</div><div class="v25-mvp-title">MVPs DA SEMANA</div><div class="v25-mvp-duo">${card(ed,'Melhor Editor')}${card(dc,'Melhor Decupador')}</div><div class="v25-mvp-footer">Clique para fechar</div></div>`; modal.classList.add('open'); localStorage.setItem('prota_mvp_seen_week',weekKey); };
  window.v25CloseMVP=function(){ document.getElementById('v25-mvp-overlay')?.classList.remove('open'); };
  window.addEventListener('click',e=>{ if(e.target?.id==='v25-mvp-overlay') v25CloseMVP(); });

  // Botão preview no ranking
  const oldRank = window.renderRankingMVP;
  window.renderRankingMVP=function(el){ oldRank(el); const header=el.querySelector('.section-header'); if(header && state.currentUser?.role==='admin') header.insertAdjacentHTML('beforeend','<button class="btn-add" onclick="v25MaybeShowMVP(true)">Preview MVP terça</button>'); };
})();
</script>

<!-- V23 PATCH — Ranking & MVP + logins para times dinâmicos -->
<style>
  .rank-hero-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin:18px 0 24px;}

  .podium-card.first{min-height:270px;border-color:var(--yellow);background:linear-gradient(180deg,color-mix(in srgb,var(--yellow) 8%,var(--bg-elevated)),var(--bg-elevated));}
  .podium-card.third{border-color:color-mix(in srgb,var(--orange) 35%,var(--separator-soft));}
  .podium-crown{font-size:28px;margin-bottom:12px;filter:drop-shadow(0 4px 8px #0006);}
  .podium-pos{font-size:32px;font-weight:950;color:var(--text-secondary);margin:10px 0;}
  .podium-card.first .podium-pos{font-size:38px;color:var(--yellow);}
  .podium-card.third .podium-pos{color:var(--orange);}
  .podium-person{font-weight:850;font-size:15px;margin-top:4px;}
  .podium-role{font-size:12px;color:var(--text-secondary);margin-top:2px;}
  .podium-score{font-size:18px;color:var(--blue);font-weight:900;margin-top:14px;font-variant-numeric:tabular-nums;}
  .rank-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;background:linear-gradient(135deg,var(--blue),var(--phoenix));overflow:hidden;}
  .rank-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .rank-table{width:100%;border-collapse:separate;border-spacing:0;min-width:980px;}
  .rank-table th{background:var(--bg-grouped2);color:var(--text-secondary);font-size:11px;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:13px 14px;font-weight:850;}
  .rank-table th:first-child{border-radius:12px 0 0 12px;}.rank-table th:last-child{border-radius:0 12px 12px 0;}
  .rank-table td{padding:14px;border-bottom:1px solid var(--separator-soft);font-size:14px;vertical-align:middle;}
  .rank-place{font-weight:950;color:var(--yellow);font-size:16px;}
  .rank-delta.up{color:var(--green);font-weight:800}.rank-delta.down{color:var(--red);font-weight:800}.rank-delta.flat{color:var(--text-secondary);font-weight:800}
  .rank-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .team-login-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:14px;}
  .login-user-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px;border-radius:12px;background:var(--bg-grouped2);margin-top:8px;}
  .login-user-main{font-weight:800}.login-user-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
  @media(max-width:900px){.rank-hero-grid,.podium{grid-template-columns:1fr}.podium-card.first{order:-1}.podium-card{min-height:180px}.podium-card.first{min-height:210px}}
</style>
<script>
(function(){
  function safeEsc(s){ try { return escapeHTML(String(s ?? '')); } catch(e){ return String(s ?? '').replace(/[&<>'"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); } }
  function safeAttr(s){ try { return escapeAttr(String(s ?? '')); } catch(e){ return safeEsc(s); } }
  function initials(name){ try { return avatarFor(name); } catch(e){ return String(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); } }
  function teamsV23(){ try { return getAllTeams(); } catch(e){ return (state.teams||['Falco','Phoenix','Astra']).slice(); } }
  function visibleTeamsV23(){ return state?.currentUser?.role === 'admin' ? teamsV23() : [state?.currentUser?.canal].filter(Boolean); }
  function ensureTeamUsersV23(){
    if(!state.teamUsers){
      try { state.teamUsers = JSON.parse(localStorage.getItem('prota_team_users') || '{}') || {}; }
      catch(e){ state.teamUsers = {}; }
    }
    return state.teamUsers;
  }
  function saveTeamUsersV23(){ localStorage.setItem('prota_team_users', JSON.stringify(ensureTeamUsersV23())); if(typeof scheduleCloudSave==='function') scheduleCloudSave(); }
  window.ensureTeamUsersV23 = ensureTeamUsersV23;

  const oldDoLogin = window.doLogin;
  window.doLogin = function(){
    const u = document.getElementById('login-user').value.trim().toLowerCase();
    const p = document.getElementById('login-pass').value;
    const dynamicUsers = ensureTeamUsersV23();
    const user = (typeof USERS !== 'undefined' && USERS[u]) ? USERS[u] : dynamicUsers[u];
    if (!user || user.pass !== p) {
      document.getElementById('login-error').style.display = 'block';
      return;
    }
    state.currentUser = { ...user, username: u, role: user.role || 'supervisor' };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  };

  const oldInitApp = window.initApp;
  window.initApp = function(){
    const u = state.currentUser;
    document.getElementById('topbar-user').textContent = u.name;
    const badge = document.getElementById('topbar-canal-badge');
    if (u.role === 'admin') { badge.textContent = 'ADMIN'; badge.className = 'topbar-canal canal-admin'; }
    else { badge.textContent = String(u.canal||'TIME').toUpperCase(); badge.className = `topbar-canal canal-${String(u.canal||'').toLowerCase()}`; }
    const tabs = u.role === 'admin'
      ? ['Dashboard', 'Ranking & MVP', 'Operação', 'Dificuldades', 'Pautas 1:1', 'Lançar Notas', 'Cadastro', 'Perfil', 'Histórico', 'Configurações', 'Chat', 'Mensagem Fixada', 'Logs']
      : ['Ranking & MVP', 'Operação', 'Lançar Notas', 'Dificuldades', 'Cadastro', 'Perfil', 'Chat'];
    const navEl = document.getElementById('nav-tabs'); navEl.innerHTML = '';
    tabs.forEach((t,i)=>{ const btn=document.createElement('button'); btn.className='nav-tab'+(i===0?' active':''); btn.textContent=t; btn.onclick=()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');state.activeTab=t;renderTab(t);}; navEl.appendChild(btn); });
    state.activeTab = tabs[0];
    if (!state.selectedQuarter && typeof getCurrentQuarter==='function') state.selectedQuarter = getCurrentQuarter();
    if(typeof updatePinnedBar==='function') updatePinnedBar();
    renderTab(tabs[0]);
    if (state.dbConfig && state.dbConfig.enabled && typeof cloudPull==='function') setTimeout(() => cloudPull(false), 300);
  };

  const oldRenderTab = window.renderTab;
  window.renderTab = function(tab){
    const el = document.getElementById('main-content');
    if(!el) return;
    el.innerHTML = '';
    if(tab === 'Ranking & MVP') return renderRankingMVP(el);
    return oldRenderTab(tab);
  };

  function weekToDateV23(weekStr){
    const m = String(weekStr||'').match(/(\d{4})-W(\d{2})/); if(!m) return null;
    const year=+m[1], week=+m[2];
    const d = new Date(year,0,1+(week-1)*7); d.setDate(d.getDate()-d.getDay()+1); return d;
  }
  function weeksForRankPeriod(period){
    const all = new Set(); Object.keys(state.notas||{}).forEach(k=>{ const w=k.split('|')[0]; if(/\d{4}-W\d{2}/.test(w)) all.add(w); });
    if(typeof getCurrentWeek==='function') all.add(getCurrentWeek());
    const arr=[...all].sort(); const now=new Date();
    if(period==='all') return arr;
    if(period==='quarter' && state.selectedQuarter && typeof getWeeksInQuarter==='function') return getWeeksInQuarter(state.selectedQuarter);
    return arr.filter(w=>{ const d=weekToDateV23(w); return d && d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); });
  }
  function parseNumberV23(v){ const n=parseInt(String(v||'').replace(/[^\d]/g,''),10); return isNaN(n)?0:n; }
  function avgPersonV23(person,type,weeks){
    const criteria = type==='decupador' ? (typeof CRITERIOS_DECUPAGEM!=='undefined'?CRITERIOS_DECUPAGEM:[]) : (typeof CRITERIOS!=='undefined'?CRITERIOS:[]);
    let sum=0,count=0; weeks.forEach(w=>criteria.forEach(cr=>{ const v=state.notas?.[`${w}|${person.id}|${cr.key}`]; if(v){ sum+=parseFloat(v); count++; } }));
    return count?sum/count:null;
  }
  function personRowsV23(filter, period){
    const weeks=weeksForRankPeriod(period); const teams=visibleTeamsV23(); let people=[];
    if(filter==='all'||filter==='editor') people=people.concat((state.editors||[]).filter(p=>teams.includes(p.canal)).map(p=>({...p,type:'editor'})));
    if(filter==='all'||filter==='decupador') people=people.concat((state.decupadores||[]).filter(p=>teams.includes(p.canal)).map(p=>({...p,type:'decupador'})));
    const raw=people.map(p=>{
      let views=0, videos=0, wt=0, atrasos=0, dataWeeks=0;
      weeks.forEach(w=>{
        const prefix=`${w}|${p.id}|`;
        views += parseNumberV23(state.notas?.[prefix+'views24']);
        videos += parseNumberV23(state.notas?.[prefix+'videos']);
        wt += parseNumberV23(state.notas?.[prefix+'watchtimeSeconds']);
        if(state.notas?.[prefix+'watchtime']) wt += (typeof watchtimeToSeconds==='function'?watchtimeToSeconds(state.notas[prefix+'watchtime']):0);
        if(state.notas?.[prefix+'atrasou']==='sim') atrasos++;
        if(Object.keys(state.notas||{}).some(k=>k.startsWith(prefix))) dataWeeks++;
      });
      const avg=avgPersonV23(p,p.type,weeks);
      const quality = avg===null ? 0 : Math.max(0, Math.min(100, ((avg-1)/3)*100));
      const productions = Math.max(videos, dataWeeks);
      return {...p, avg, quality, views, videos, productions, wt, atrasos};
    });
    const maxVol = Math.max(1, ...raw.map(r=>r.views + r.productions*1000));
    return raw.map(r=>{
      const volumeRaw = r.views + r.productions*1000;
      const volume = Math.round((volumeRaw/maxVol)*100);
      const speed = Math.max(0, 100 - (r.atrasos*20));
      const score = Math.round(volume*0.4 + speed*0.3 + r.quality*0.3);
      return {...r, volume, speed, score};
    }).sort((a,b)=> b.score-a.score || b.views-a.views || b.quality-a.quality);
  }
  function rankAvatarHTML(p,size=56){
    const photo=p.photo; const bg=(typeof canalCSS==='function' ? canalCSS(p.canal)?.color : 'var(--blue)') || 'var(--blue)';
    return `<div class="rank-avatar" style="width:${size}px;height:${size}px;background:${bg};">${photo?`<img src="${safeAttr(photo)}" alt="">`:initials(p.name)}</div>`;
  }
  function podiumCard(p,pos){
    if(!p) return `<div class="podium-card"><div class="empty-state">Sem dados</div></div>`;
    const klass=pos===1?'first':pos===3?'third':''; const crown=pos===1?'👑':'';
    return `<div class="podium-card ${klass}">${crown?`<div class="podium-crown">${crown}</div>`:''}${rankAvatarHTML(p,pos===1?72:56)}<div class="podium-pos">${pos}</div><div class="podium-person">${safeEsc(p.name)}</div><div class="podium-role">${p.type==='editor'?'Editor':'Decupador'} · ${safeEsc(p.canal)}</div><div class="podium-score">${p.score}</div></div>`;
  }
  window.setRankFilterV23 = function(v){ state.rankFilter=v; renderTab('Ranking & MVP'); };
  window.setRankPeriodV23 = function(v){ state.rankPeriod=v; renderTab('Ranking & MVP'); };
  window.renderRankingMVP = function(el){
    const filter=state.rankFilter||'all', period=state.rankPeriod||'month';
    const rows=personRowsV23(filter,period); const mvp=rows[0]; const prod=[...rows].sort((a,b)=>b.productions-a.productions||b.views-a.views)[0]; const quality=[...rows].sort((a,b)=>b.quality-a.quality||b.score-a.score)[0];
    const periodLabel = period==='month'?'Este mês':period==='quarter'?'Trimestre':'Tudo';
    let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">🏆 Ranking & MVP</div><div class="section-sub">Score = 40% volume + 30% velocidade + 30% qualidade</div></div><div class="rank-controls"><select class="week-select" onchange="setRankFilterV23(this.value)"><option value="all" ${filter==='all'?'selected':''}>Todas funções</option><option value="editor" ${filter==='editor'?'selected':''}>Editores</option><option value="decupador" ${filter==='decupador'?'selected':''}>Decupadores</option></select><select class="week-select" onchange="setRankPeriodV23(this.value)"><option value="month" ${period==='month'?'selected':''}>Este mês</option><option value="quarter" ${period==='quarter'?'selected':''}>Trimestre</option><option value="all" ${period==='all'?'selected':''}>Tudo</option></select></div></div>`;
    if(!rows.length){ el.innerHTML=html+`<div class="card"><div class="empty-state">Ainda não há avaliações suficientes para montar o ranking.</div></div>`; return; }
    html += `<div class="rank-hero-grid"><div class="rank-card mvp"><div class="rank-kicker">👑 MVP</div><div class="rank-name">${safeEsc(mvp.name)}</div><div class="rank-metric gold">${mvp.score} pts</div></div><div class="rank-card"><div class="rank-kicker">🚀 Mais produtivo</div><div class="rank-name">${safeEsc(prod?.name||'—')}</div><div class="rank-metric">${prod?.productions||0} produções</div></div><div class="rank-card"><div class="rank-kicker">✨ Maior qualidade</div><div class="rank-name">${safeEsc(quality?.name||'—')}</div><div class="rank-metric" style="color:var(--green)">${quality?Math.round(quality.quality):0}%</div></div></div>`;
    html += `<div class="podium">${podiumCard(rows[1],2)}${podiumCard(rows[0],1)}${podiumCard(rows[2],3)}</div>`;
    html += `<div class="card"><div class="chart-card-title">Classificação geral · ${safeEsc(periodLabel)}</div><div class="table-wrap"><table class="rank-table"><thead><tr><th>#</th><th>Produtor</th><th>Função</th><th>Time</th><th>Score</th><th>Volume</th><th>Velocidade</th><th>Qualidade</th><th>Produções</th><th>Views médias/sem</th><th>Atrasos</th></tr></thead><tbody>`;
    rows.forEach((r,i)=>{ html += `<tr><td><span class="rank-place">#${i+1}</span></td><td><div style="display:flex;align-items:center;gap:10px;">${rankAvatarHTML(r,34)}<div><div style="font-weight:850">${safeEsc(r.name)}</div><div style="font-size:12px;color:var(--text-secondary)">${safeEsc((r.tags||[]).join(', ')||'Sem tag')}</div></div></div></td><td>${r.type==='editor'?'Editor':'Decupador'}</td><td>${safeEsc(r.canal)}</td><td><b style="color:var(--blue)">${r.score}</b></td><td>${r.volume}</td><td>${r.speed}</td><td>${Math.round(r.quality)}</td><td>${r.productions}</td><td>${(r.views||0).toLocaleString('pt-BR')}</td><td style="color:${r.atrasos?'var(--red)':'var(--green)'};font-weight:800">${r.atrasos}</td></tr>`; });
    html += `</tbody></table></div></div>`; el.innerHTML=html;
  };

  function renderTeamLoginSystemV23(){
    const users=ensureTeamUsersV23(); const teams=teamsV23();
    return `<div class="settings-row"><div class="settings-title">Logins para novos times</div><div class="settings-sub">Crie um usuário de supervisor para qualquer time criado. Use isso quando adicionar um time novo.</div><div class="team-login-grid"><input class="field" id="team-login-user" placeholder="usuário ex: zoomy"><input class="field" id="team-login-pass" placeholder="senha"><input class="field" id="team-login-name" placeholder="nome exibido ex: Sup. Zoomy"><select class="week-select" id="team-login-team">${teams.map(t=>`<option value="${safeAttr(t)}">${safeEsc(t)}</option>`).join('')}</select></div><button class="btn-add" style="margin-top:12px;max-width:220px" onclick="addTeamLoginV23()">+ Criar login</button><div style="margin-top:14px">${Object.keys(users).length?Object.entries(users).map(([username,u])=>`<div class="login-user-row"><div><div class="login-user-main">${safeEsc(username)}</div><div class="login-user-sub">${safeEsc(u.name)} · ${safeEsc(u.canal)}</div></div><span class="alert-canal">${safeEsc(u.role||'supervisor')}</span><button class="btn-delete" onclick="removeTeamLoginV23('${safeAttr(username)}')">✕</button></div>`).join(''):`<div class="empty-state" style="padding:18px">Nenhum login extra criado ainda.</div>`}</div></div>`;
  }
  window.addTeamLoginV23 = function(){
    const username=(document.getElementById('team-login-user')?.value||'').trim().toLowerCase(); const pass=(document.getElementById('team-login-pass')?.value||'').trim(); const name=(document.getElementById('team-login-name')?.value||'').trim() || `Sup. ${document.getElementById('team-login-team')?.value||''}`; const canal=document.getElementById('team-login-team')?.value;
    if(!username||!pass||!canal) return alert('Preencha usuário, senha e time.');
    if((typeof USERS!=='undefined' && USERS[username]) || ensureTeamUsersV23()[username]) return alert('Esse usuário já existe.');
    ensureTeamUsersV23()[username]={pass,role:'supervisor',name,canal}; saveTeamUsersV23(); if(typeof logChange==='function') logChange('Login de time criado', `${username} · ${canal}`); showSaved(); renderTab('Configurações');
  };
  window.removeTeamLoginV23 = function(username){ if(!confirm(`Remover login ${username}?`)) return; delete ensureTeamUsersV23()[username]; saveTeamUsersV23(); if(typeof logChange==='function') logChange('Login de time removido', username); showSaved(); renderTab('Configurações'); };

  const oldRenderConfiguracoes = window.renderConfiguracoes;
  window.renderConfiguracoes = function(el){ oldRenderConfiguracoes(el); if(state.currentUser?.role==='admin'){ el.insertAdjacentHTML('beforeend', `<div style="height:14px"></div><div class="settings-grid">${renderTeamLoginSystemV23()}</div>`); } };

  const oldGetCloudPayload = window.getCloudPayload;
  window.getCloudPayload = function(){ const data = oldGetCloudPayload ? oldGetCloudPayload() : {}; data.teamUsers = ensureTeamUsersV23(); return data; };
  const oldApplyCloudPayload = window.applyCloudPayload;
  window.applyCloudPayload = function(data){ if(oldApplyCloudPayload) oldApplyCloudPayload(data); if(data && data.teamUsers){ state.teamUsers=data.teamUsers; localStorage.setItem('prota_team_users', JSON.stringify(state.teamUsers)); } };
})();
</script>

<script>
(function(){
  const V26_TABS = ['Dashboard','Ranking & MVP','Operação','Dificuldades','Pautas 1:1','Lançar Notas','Cadastro','Comparar','Perfil','Usuários','Histórico','Configurações','Chat','Mensagem Fixada','Logs'];
  const V26_GROUPS = [
    {title:'📊 Gestão', tabs:['Dashboard','Ranking & MVP','Operação','Dificuldades']},
    {title:'👥 Equipe', tabs:['Pautas 1:1','Lançar Notas','Cadastro','Comparar','Perfil','Usuários']},
    {title:'⚙️ Sistema', tabs:['Histórico','Configurações','Chat','Mensagem Fixada','Logs']}
  ];
  const DEFAULT_ROLE_PERMS = {
    admin: V26_TABS.slice(),
    supervisor: ['Ranking & MVP','Operação','Dificuldades','Pautas 1:1','Lançar Notas','Cadastro','Comparar','Perfil','Chat'],
    editor: ['Ranking & MVP','Perfil','Chat'],
    decupador: ['Ranking & MVP','Perfil','Chat'],
    viewer: ['Dashboard','Ranking & MVP','Perfil','Chat']
  };
  function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function attr(s){ return esc(s).replace(/`/g,'&#96;'); }
  function ensure(){
    document.body.classList.add('v26-shell');
    state.v26Permissions = state.v26Permissions || JSON.parse(localStorage.getItem('prota_v26_permissions')||'{}');
    state.userAccounts = state.userAccounts || JSON.parse(localStorage.getItem('prota_user_accounts')||'[]');
    state.loginEvents = state.loginEvents || JSON.parse(localStorage.getItem('prota_login_events')||'[]');
    state.rankingEditorWeights = state.rankingEditorWeights || JSON.parse(localStorage.getItem('prota_rank_editor_weights')||'{"quality":50,"views":25,"watchtime":15,"delay":10}');
  }
  function save(){
    localStorage.setItem('prota_v26_permissions', JSON.stringify(state.v26Permissions||{}));
    localStorage.setItem('prota_user_accounts', JSON.stringify(state.userAccounts||[]));
    localStorage.setItem('prota_login_events', JSON.stringify((state.loginEvents||[]).slice(-500)));
    localStorage.setItem('prota_rank_editor_weights', JSON.stringify(state.rankingEditorWeights||{}));
    if(typeof scheduleCloudSave==='function') scheduleCloudSave();
  }
  function teams(){ try{return typeof getAllTeams==='function'?getAllTeams():(state.teams||['Falco','Phoenix','Astra']);}catch(e){return ['Falco','Phoenix','Astra'];} }
  function allPeople(){ return [...(state.editors||[]).map(p=>({...p,personType:'editor',roleLabel:'Editor'})),...(state.decupadores||[]).map(p=>({...p,personType:'decupador',roleLabel:'Decupador'}))]; }
  function avatar(p,size=34){
    const initials = (typeof avatarFor==='function'?avatarFor(p.name||p.email||'?'):String(p.name||p.email||'?').split(' ').map(x=>x[0]).join('').slice(0,2)).toUpperCase();
    if(p.photo) return `<div class="editor-avatar" style="width:${size}px;height:${size}px;overflow:hidden"><img src="${attr(p.photo)}"></div>`;
    const cc = typeof canalCSS==='function'?canalCSS(p.canal):{color:'var(--blue)'};
    return `<div class="editor-avatar" style="width:${size}px;height:${size}px;background:${cc.color};font-size:${Math.max(10,Math.round(size/3))}px">${esc(initials)}</div>`;
  }
  function avgFor(p){ try{ if(p.personType==='decupador' && typeof calcAvgDecupInQuarter==='function') return calcAvgDecupInQuarter(p.id,state.selectedQuarter||getCurrentQuarter()); if(typeof calcAvgInQuarter==='function') return calcAvgInQuarter(p.id,state.selectedQuarter||getCurrentQuarter()); }catch(e){} return null; }
  function criteriaFor(type){ return type==='decupador' ? (window.CRITERIOS_DECUPAGEM||[]) : (window.CRITERIOS||[]); }
  function calcCrit(p, key){ const q=state.selectedQuarter||getCurrentQuarter(); const weeks=typeof getWeeksInQuarter==='function'?getWeeksInQuarter(q):[]; let s=0,c=0; weeks.forEach(w=>{ const v=state.notas?.[`${w}|${p.id}|${key}`]; if(v){s+=parseFloat(v);c++;}}); return c?s/c:null; }
  function allowedTabs(user){
    ensure(); if(!user) return [];
    if(user.role==='admin') return V26_TABS;
    const roleAllowed = state.v26Permissions['role:'+user.role] || DEFAULT_ROLE_PERMS[user.role] || DEFAULT_ROLE_PERMS.viewer;
    const teamAllowed = user.canal ? state.v26Permissions['team:'+user.canal+':'+user.role] : null;
    return (teamAllowed || roleAllowed).filter(t=>V26_TABS.includes(t));
  }
  function icon(t){ return ({'Dashboard':'📊','Ranking & MVP':'🏆','Operação':'📌','Dificuldades':'🔎','Pautas 1:1':'💬','Lançar Notas':'📝','Cadastro':'👥','Comparar':'⚖️','Perfil':'👤','Usuários':'🔐','Histórico':'🗂️','Configurações':'⚙️','Chat':'💬','Mensagem Fixada':'📣','Logs':'🧾'}[t]||'•'); }
  function registerLogin(user){
    const now = new Date().toISOString();
    const key = (user.email||user.username||user.name||'').toLowerCase();
    state.loginEvents = state.loginEvents || [];
    state.loginEvents.push({at:now,email:user.email||'',username:user.username||'',name:user.name||'',role:user.role||'',canal:user.canal||''});
    state.userPresence = state.userPresence || JSON.parse(localStorage.getItem('prota_user_presence')||'{}');
    state.userPresence[key] = {lastSeen:now,name:user.name||'',email:user.email||'',role:user.role||'',canal:user.canal||''};
    localStorage.setItem('prota_user_presence', JSON.stringify(state.userPresence));
    save();
  }
  function findLogin(raw){
    const key = raw.toLowerCase();
    const base = (typeof USERS!=='undefined' && USERS[key]) ? {...USERS[key], username:key} : null;
    const dyn = (state.teamUsers||JSON.parse(localStorage.getItem('prota_team_users')||'{}'))[key];
    const acc = (state.userAccounts||[]).find(a=> String(a.email||'').toLowerCase()===key || String(a.username||'').toLowerCase()===key);
    if(acc) return {...acc, username:acc.username||acc.email, pass:acc.pass||acc.password||'', name:acc.name||acc.email, canal:acc.canal||acc.team||'', role:acc.role||'viewer'};
    if(dyn) return {...dyn, username:key};
    if(base) return base;
    return null;
  }
  window.doLogin = function(){
    ensure();
    const raw=(document.getElementById('login-user')?.value||'').trim();
    const p=document.getElementById('login-pass')?.value||'';
    const user=findLogin(raw);
    if(!user || String(user.pass)!==String(p)){ const er=document.getElementById('login-error'); if(er) er.style.display='block'; return; }
    state.currentUser={...user, username:user.username||raw.toLowerCase()};
    localStorage.setItem('prota_session_user', JSON.stringify(state.currentUser));
    registerLogin(state.currentUser);
    document.getElementById('login-screen').style.display='none'; document.getElementById('app').style.display='block';
    initApp();
  };
  window.doLogout = function(){ localStorage.removeItem('prota_session_user'); state.currentUser=null; document.getElementById('login-screen').style.display='flex'; document.getElementById('app').style.display='none'; };
  window.initApp = function(){
    ensure(); const u=state.currentUser;
    const tu=document.getElementById('topbar-user'); if(tu) tu.innerHTML=`${esc(u.name||u.email||u.username)}${u.email?`<div style="font-size:11px;color:var(--text-secondary);font-weight:700;">${esc(u.email)}</div>`:''}`;
    const badge=document.getElementById('topbar-canal-badge'); if(badge){ if(u.role==='admin'){badge.textContent='ADMIN';badge.className='topbar-canal canal-admin';} else {badge.textContent=String(u.canal||u.role||'USUÁRIO').toUpperCase();badge.className='topbar-canal';}}
    const tabs=allowedTabs(u); const nav=document.getElementById('nav-tabs'); nav.innerHTML='';
    nav.insertAdjacentHTML('beforeend',`<input class="v26-sidebar-search" id="v26-search" placeholder="🔍 Buscar perfil..." oninput="v26Search(this.value)"><div class="v26-search-results" id="v26-search-results"></div>`);
    V26_GROUPS.forEach(g=>{ const groupTabs=g.tabs.filter(t=>tabs.includes(t)); if(!groupTabs.length) return; nav.insertAdjacentHTML('beforeend',`<div class="v26-nav-section">${g.title}</div>`); groupTabs.forEach((t)=>{ const btn=document.createElement('button'); btn.className='nav-tab'+(!state.activeTab&&t===tabs[0]?' active':''); btn.innerHTML=`<span>${icon(t)}</span><span>${t}</span>`; btn.onclick=()=>{document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));btn.classList.add('active');state.activeTab=t;renderTab(t);}; nav.appendChild(btn); }); });
    state.activeTab = tabs.includes(state.activeTab)?state.activeTab:(tabs[0]||'Perfil'); if(!state.selectedQuarter && typeof getCurrentQuarter==='function') state.selectedQuarter=getCurrentQuarter();
    const active=[...document.querySelectorAll('.nav-tab')].find(b=>b.textContent.includes(state.activeTab)); if(active){document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active')); active.classList.add('active');}
    renderTab(state.activeTab);
  };
  const previousRenderTab = window.renderTab;
  window.renderTab = function(tab){
    ensure(); const el=document.getElementById('main-content'); if(!el) return; el.innerHTML='';
    if(!allowedTabs(state.currentUser).includes(tab)){ el.innerHTML='<div class="card"><div class="empty-state">Você não tem permissão para acessar esta área.</div></div>'; return; }
    if(tab==='Usuários') return renderUsers(el);
    if(tab==='Perfil') return renderProfile(el);
    if(tab==='Comparar') return renderCompare(el);
    if(tab==='Configurações') { previousRenderTab(tab); setTimeout(()=>injectSettings(),30); return; }
    return previousRenderTab(tab);
  };
  window.v26Search=function(q){
    const box=document.getElementById('v26-search-results'); if(!box) return; q=String(q||'').trim().toLowerCase(); if(!q){box.classList.remove('show');box.innerHTML='';return;}
    const visible=allPeople().filter(p=> state.currentUser?.role==='admin' || p.canal===state.currentUser?.canal || p.email===state.currentUser?.email);
    const res=visible.filter(p=>[p.name,p.email,p.canal,p.roleLabel].join(' ').toLowerCase().includes(q)).slice(0,12);
    box.innerHTML=res.length?res.map(p=>`<div class="v26-search-item" onclick="state.selectedProfileType='${p.personType}';state.selectedProfileId='${p.id}';document.getElementById('v26-search-results').classList.remove('show');state.activeTab='Perfil';renderTab('Perfil')">${avatar(p,28)}<div><b>${esc(p.name)}</b><div class="v26-search-sub">${esc(p.roleLabel)} · ${esc(p.canal)} ${p.email?'· '+esc(p.email):''}</div></div></div>`).join(''):'<div class="empty-state" style="padding:14px">Nada encontrado.</div>';
    box.classList.add('show');
  };
  function renderUsers(el){

    let html=`<div class="section-header"><div class="section-header-left"><div class="section-title">🔐 Usuários</div><div class="section-sub">Gerencie login, permissões e último acesso.</div></div><button class="btn-add" onclick="v26CreateUser()">+ Criar usuário</button></div>`;

    const rows=[...accounts,{name:'Administrador',email:'admin',username:'admin',role:'admin',canal:'',status:'ativo',builtin:true}];
    html+=`<div class="card"><div class="table-wrap"><table class="v26-table"><thead><tr><th>Nome</th><th>Email/Usuário</th><th>Perfil</th><th>Time</th><th>Último acesso</th><th>Status</th><th>Ações</th></tr></thead><tbody>${rows.map(a=>{ const key=String(a.email||a.username||'').toLowerCase(); const pr=presence[key]; const last=pr?timeAgo(new Date(pr.lastSeen)):'Nunca entrou'; const active=a.status!=='inativo'; return `<tr><td><b>${esc(a.name||a.email||a.username)}</b></td><td>${esc(a.email||a.username||'')}</td><td>${esc(a.role||'viewer')}</td><td>${esc(a.canal||'–')}</td><td>${last}</td><td><span class="v26-status ${active?'on':'disabled'}">${active?'Ativo':'Inativo'}</span></td><td><div class="v26-actions">${a.builtin?'':`<button class="v26-btn" onclick="v26EditUser('${a.id}')">Editar</button><button class="v26-btn warn" onclick="v26ToggleUser('${a.id}')">${active?'Desativar':'Ativar'}</button><button class="v26-btn danger" onclick="v26RemoveUser('${a.id}')">Remover</button>`}</div></td></tr>`; }).join('')}</tbody></table></div></div>`;
    html+=`<div class="card"><div class="v26-card-title">Quem entrou recentemente</div><div class="v26-grid">${Object.values(presence).sort((a,b)=>new Date(b.lastSeen)-new Date(a.lastSeen)).slice(0,12).map(p=>`<div class="v26-card"><b>${esc(p.name||p.email)}</b><div class="v26-card-sub">${esc(p.role)} · ${esc(p.canal||'sem time')}</div><span class="v26-status on">${timeAgo(new Date(p.lastSeen))}</span></div>`).join('') || '<div class="empty-state">Nenhum login registrado.</div>'}</div></div>`;
    el.innerHTML=html;
  }
  function timeAgo(d){ const s=Math.floor((Date.now()-d.getTime())/1000); if(isNaN(s)) return 'Nunca'; if(s<60) return 'online agora'; if(s<3600) return `offline · ${Math.floor(s/60)}min`; if(s<86400) return `offline · ${Math.floor(s/3600)}h`; return `offline · ${Math.floor(s/86400)}d`; }
  window.v26CreateUser=function(){
    const person=(document.getElementById('v26-new-person')?.value||'').split('|'); const email=(document.getElementById('v26-new-email')?.value||'').trim().toLowerCase(); const pass=(document.getElementById('v26-new-pass')?.value||'').trim();
    if(!email||!pass) return alert('Preencha email e senha.');
    const acc={id:Date.now().toString(),name:(document.getElementById('v26-new-name')?.value||email).trim(),email,pass,role:document.getElementById('v26-new-role')?.value||'viewer',canal:document.getElementById('v26-new-team')?.value||'',personType:person[0]||'',personId:person[1]||'',status:'ativo'};
    state.userAccounts=(state.userAccounts||[]).filter(a=>a.email!==email); state.userAccounts.push(acc); save(); if(typeof logChange==='function') logChange('Usuário criado',email); renderTab('Usuários');
  };
  window.v26RemoveUser=function(id){ if(!confirm('Remover este usuário?')) return; state.userAccounts=(state.userAccounts||[]).filter(a=>a.id!==id); save(); renderTab('Usuários'); };
  window.v26ToggleUser=function(id){ const a=(state.userAccounts||[]).find(x=>x.id===id); if(a){a.status=a.status==='inativo'?'ativo':'inativo'; save(); renderTab('Usuários');} };
  window.v26EditUser=function(id){ const a=(state.userAccounts||[]).find(x=>x.id===id); if(!a) return; const pass=prompt('Nova senha (deixe vazio para manter):',''); const role=prompt('Perfil/cargo:',a.role||'viewer'); const team=prompt('Time:',a.canal||''); if(pass) a.pass=pass; if(role) a.role=role; if(team!==null) a.canal=team; save(); renderTab('Usuários'); };
  function renderProfile(el){
    const people=allPeople().filter(p=> state.currentUser?.role==='admin' || p.canal===state.currentUser?.canal || p.email===state.currentUser?.email || p.id===state.currentUser?.personId);
    let type=state.selectedProfileType||state.currentUser?.personType||people[0]?.personType; let id=state.selectedProfileId||state.currentUser?.personId||people[0]?.id; const p=people.find(x=>x.id===id&&x.personType===type)||people[0];
    if(!p){ el.innerHTML='<div class="card"><div class="empty-state">Nenhum perfil encontrado.</div></div>'; return; }
    const avg=avgFor(p); const crits=criteriaFor(p.personType); const cc=typeof canalCSS==='function'?canalCSS(p.canal):{color:'var(--blue)'};
    let html=`<div class="section-header"><div class="section-header-left"><div class="section-title">👤 Meu Perfil</div><div class="section-sub">Informações, pontuação e critérios individuais.</div></div><select class="week-select" onchange="const [t,i]=this.value.split('|');state.selectedProfileType=t;state.selectedProfileId=i;renderTab('Perfil')">${people.map(x=>`<option value="${x.personType}|${x.id}" ${x.id===p.id&&x.personType===p.personType?'selected':''}>${esc(x.name)} · ${esc(x.roleLabel)} · ${esc(x.canal)}</option>`).join('')}</select></div>`;
    html+=`<div class="v26-profile-hero">${avatar(p,82)}<div><div class="v26-profile-name">${esc(p.name)}</div><div class="v26-profile-meta">${esc(p.roleLabel)} · ${esc(p.canal)} · ${esc(p.email||'sem email cadastrado')} · ${esc(p.cargo||'sem cargo')}</div><div style="margin-top:10px">${typeof personTagsHTML==='function'?personTagsHTML(p,false,p.personType):''}</div></div><div><div class="v26-stat-label">Score médio</div><div class="v26-stat-value" style="color:${avg==null?'var(--text-secondary)':(typeof colorByScore==='function'?colorByScore(avg):'var(--blue)')}">${avg==null?'–':avg.toFixed(1)}</div></div></div>`;
    html+=`<div class="v26-stat-grid"><div class="v26-stat"><div class="v26-stat-label">Time</div><div class="v26-stat-value" style="color:${cc.color}">${esc(p.canal)}</div></div><div class="v26-stat"><div class="v26-stat-label">Função</div><div class="v26-stat-value">${esc(p.roleLabel)}</div></div><div class="v26-stat"><div class="v26-stat-label">Email</div><div class="v26-stat-value" style="font-size:15px">${esc(p.email||'–')}</div></div><div class="v26-stat"><div class="v26-stat-label">Último acesso</div><div class="v26-stat-value" style="font-size:16px">${lastSeenFor(p.email)}</div></div></div>`;
    html+=`<div class="card"><div class="chart-card-title">Pontuação por critério</div>${crits.map(cr=>{ const v=calcCrit(p,cr.key); const pct=v?Math.max(0,Math.min(100,(v/4)*100)):0; return `<div class="v26-skill-row"><div><b>${esc(cr.short||cr.label)}</b></div><div class="v26-skill-bar"><div class="v26-skill-fill" style="width:${pct}%"></div></div><div style="font-weight:900;color:${v==null?'var(--text-secondary)':(typeof colorByScore==='function'?colorByScore(v):'var(--blue)')}">${v==null?'–':v.toFixed(1)}</div></div>`; }).join('')}</div>`;
    html+=`<div class="card"><div class="chart-card-title">Resumo do perfil</div><div style="white-space:pre-wrap;color:var(--text-secondary);line-height:1.55">${esc(p.about||'Sem observações cadastradas.')}</div></div>`;
    el.innerHTML=html;
  }
  function lastSeenFor(email){ if(!email) return '–'; const pr=JSON.parse(localStorage.getItem('prota_user_presence')||'{}')[String(email).toLowerCase()]; return pr?timeAgo(new Date(pr.lastSeen)):'Nunca entrou'; }
  function renderCompare(el){
    const editors=(state.editors||[]).filter(p=>state.currentUser?.role==='admin'||p.canal===state.currentUser?.canal);
    if(editors.length<2){ el.innerHTML='<div class="card"><div class="empty-state">Cadastre pelo menos 2 editores para comparar.</div></div>'; return; }
    const a=state.compareA||editors[0].id,b=state.compareB||editors[1].id;
    const sel=id=>editors.map(e=>`<option value="${e.id}" ${e.id===id?'selected':''}>${esc(e.name)} · ${esc(e.canal)}</option>`).join('');
    const pa=editors.find(e=>e.id===a)||editors[0], pb=editors.find(e=>e.id===b)||editors[1];
    let html=`<div class="section-header"><div class="section-header-left"><div class="section-title">⚖️ Comparar Editores</div><div class="section-sub">Compare médias, critérios, views, atraso e desempenho.</div></div></div><div class="card"><div class="v26-grid"><select class="field" onchange="state.compareA=this.value;renderTab('Comparar')">${sel(pa.id)}</select><select class="field" onchange="state.compareB=this.value;renderTab('Comparar')">${sel(pb.id)}</select></div></div>`;
    html+=`<div class="v26-compare-grid">${compareCard(pa)}${compareCard(pb)}</div>`; el.innerHTML=html;
  }
  function sumViews(p){ let n=0; Object.keys(state.notas||{}).forEach(k=>{ const parts=k.split('|'); if(parts[1]===p.id && parts[2]==='views24') n+=parseInt(String(state.notas[k]).replace(/\D/g,''))||0; }); return n; }
  function delays(p){ let n=0; Object.keys(state.notas||{}).forEach(k=>{ const parts=k.split('|'); if(parts[1]===p.id && (parts[2]==='atrasouEditor'||parts[2]==='atrasou') && state.notas[k]==='sim') n++; }); return n; }
  function compareCard(p){ const avg=avgFor({...p,personType:'editor'}); const crits=criteriaFor('editor'); return `<div class="v26-compare-person">${avatar(p,64)}<h2 style="margin:12px 0 4px">${esc(p.name)}</h2><div class="v26-card-sub">${esc(p.canal)} · Editor</div><div class="v26-stat-grid"><div class="v26-stat"><div class="v26-stat-label">Média</div><div class="v26-stat-value">${avg==null?'–':avg.toFixed(1)}</div></div><div class="v26-stat"><div class="v26-stat-label">Views médias/sem</div><div class="v26-stat-value">${sumViews(p).toLocaleString('pt-BR')}</div></div><div class="v26-stat"><div class="v26-stat-label">Atrasos</div><div class="v26-stat-value">${delays(p)}</div></div></div>${crits.map(cr=>{const v=calcCrit({...p,personType:'editor'},cr.key);return `<div class="v26-skill-row"><div>${esc(cr.short||cr.label)}</div><div class="v26-skill-bar"><div class="v26-skill-fill" style="width:${v?(v/4)*100:0}%"></div></div><b>${v==null?'–':v.toFixed(1)}</b></div>`}).join('')}</div>`; }
  function injectSettings(){
    const el=document.getElementById('main-content'); if(!el||document.getElementById('v26-settings')) return;
    const roleKeys=['supervisor','editor','decupador','viewer'];
    const html=`<div id="v26-settings"><div style="height:14px"></div><div class="section-header"><div class="section-header-left"><div class="section-title">🔐 Permissões por perfil</div><div class="section-sub">Libere abas para cada cargo. Admin sempre vê tudo.</div></div></div><div class="v26-grid">${roleKeys.map(r=>`<div class="v26-card"><div class="v26-card-title">${esc(r)}</div><div class="v26-card-sub">Permissões do cargo ${esc(r)}</div>${V26_TABS.filter(t=>!['Configurações','Logs','Mensagem Fixada'].includes(t)).map(t=>`<label class="v25-check"><input type="checkbox" ${((state.v26Permissions['role:'+r]||DEFAULT_ROLE_PERMS[r]||[]).includes(t))?'checked':''} onchange="v26ToggleRolePerm('${r}','${t}',this.checked)">${icon(t)} ${esc(t)}</label>`).join('')}</div>`).join('')}</div><div style="height:14px"></div><div class="section-header"><div class="section-header-left"><div class="section-title">🏆 Critérios do ranking · Editores</div><div class="section-sub">Ajuste o peso do ranking dos editores.</div></div></div><div class="card">${['quality','views','watchtime','delay'].map(k=>`<div class="v26-skill-row"><b>${({quality:'Qualidade',views:'Views médias/sem',watchtime:'Watchtime',delay:'Atraso invertido'}[k])}</b><input type="range" min="0" max="100" value="${state.rankingEditorWeights[k]||0}" oninput="v26SetRankWeight('${k}',this.value)"><b id="v26-w-${k}">${state.rankingEditorWeights[k]||0}%</b></div>`).join('')}</div></div>`;
    el.insertAdjacentHTML('beforeend',html);

  window.v26ToggleRolePerm=function(role,tab,on){ const key='role:'+role; let arr=(state.v26Permissions[key]||DEFAULT_ROLE_PERMS[role]||[]).slice(); if(on&&!arr.includes(tab))arr.push(tab); if(!on)arr=arr.filter(x=>x!==tab); state.v26Permissions[key]=arr; save(); if(typeof showSaved==='function')showSaved(); };
  window.v26SetRankWeight=function(k,v){ state.rankingEditorWeights[k]=parseInt(v)||0; const el=document.getElementById('v26-w-'+k); if(el)el.textContent=v+'%'; save(); };
  const oldCollect=window.collectCloudData; window.collectCloudData=function(){ const d=oldCollect?oldCollect():{}; return {...d,userAccounts:state.userAccounts||[],v26Permissions:state.v26Permissions||{},loginEvents:state.loginEvents||[],rankingEditorWeights:state.rankingEditorWeights||{}}; };
  const oldApply=window.applyCloudData; window.applyCloudData=function(data){ if(oldApply)oldApply(data); if(data){state.userAccounts=data.userAccounts||state.userAccounts||[];state.v26Permissions=data.v26Permissions||state.v26Permissions||{};state.loginEvents=data.loginEvents||state.loginEvents||[];state.rankingEditorWeights=data.rankingEditorWeights||state.rankingEditorWeights||{};save();} };
  document.addEventListener('DOMContentLoaded',()=>{ ensure(); const sess=localStorage.getItem('prota_session_user'); if(sess){ try{state.currentUser=JSON.parse(sess);document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';initApp();}catch(e){} } });
})();
</script>

</style>
<script>
(function(){
  'use strict';

  // ─── 1. CONSTANTES ─────────────────────────────────────────────────
  const ROLE_LABELS = {
    admin:     'Administrador',
    head_edicao:       'Head de Edição',
    supervisor_edicao: 'Supervisor de Edição',
    editor:            'Editor',
    roteirista:        'Roteirista',
    produtor:          'Produtor',
  };
  const ROLE_ORDER = ['admin','head_edicao','supervisor_edicao','editor','roteirista','produtor'];

  const PERMISSIONS = [
    { key:'view_dashboard',       label:'Ver dashboard geral' },
    { key:'edit_ranking',         label:'Editar ranking' },
    { key:'enter_notes',          label:'Lançar notas' },
    { key:'access_users',         label:'Acessar usuários' },
    { key:'edit_users',           label:'Editar usuários' },
    { key:'view_other_profiles',  label:'Ver perfil de outros usuários' },
    { key:'edit_settings',        label:'Editar configurações' },
    { key:'view_alerts',          label:'Ver alertas' },
    { key:'access_videos_longos', label:'Acessar Vídeos Longos' },
    { key:'access_shorts',        label:'Acessar Shorts' },
    { key:'access_regravacoes',   label:'Acessar Regravações & Reedições' },
    { key:'access_demandas',      label:'Acessar Demandas' },
    { key:'access_revisoes',      label:'Acessar Revisões' },
    { key:'access_comparar',      label:'Comparar editores' },
    { key:'access_permissoes',    label:'Gerenciar permissões' },
    { key:'access_logs',          label:'Ver Logs' },
    { key:'access_db',            label:'Acessar Banco de Dados' },
    { key:'access_system',        label:'Acessar Sistema (admin)' },
  ];

  const DEFAULT_PERMS = {
    admin:     PERMISSIONS.map(p=>p.key),
    head_edicao:       ['view_dashboard','edit_ranking','enter_notes','access_users','edit_users','view_other_profiles','edit_settings','view_alerts','access_videos_longos','access_shorts','access_regravacoes','access_demandas','access_revisoes','access_comparar'],
    supervisor_edicao: ['view_dashboard','enter_notes','access_users','view_other_profiles','view_alerts','access_videos_longos','access_shorts','access_regravacoes','access_demandas','access_revisoes','access_comparar'],
    editor:            ['view_dashboard','access_videos_longos','access_shorts','access_regravacoes'],
    roteirista:        ['view_dashboard','access_demandas','access_revisoes'],
    produtor:          ['view_dashboard','access_videos_longos','access_shorts','access_demandas','view_alerts'],
  };

  const NAV_SECTIONS = [
    { title:'Geral', items:[
      { tab:'Dashboard',          label:'Dashboard',      icon:'📊', perm:'view_dashboard' },
      { tab:'Meu Perfil',         label:'Meu Perfil',     icon:'👤', perm:null },
      { tab:'Usuários',           label:'Usuários',       icon:'👥', perm:'access_users' },
      { tab:'Ranking & MVP',      label:'Ranking',        icon:'🏆', perm:'view_dashboard' },
    ]},
    { title:'Trabalho', items:[
      { tab:'Vídeos Longos',      label:'Vídeos Longos',  icon:'🎬', perm:'access_videos_longos' },
      { tab:'Shorts',             label:'Shorts',         icon:'⚡', perm:'access_shorts' },
      { tab:'Regravações',        label:'Regravações & Reedições', icon:'🔁', perm:'access_regravacoes' },
      { tab:'Demandas',           label:'Demandas',       icon:'📋', perm:'access_demandas' },
      { tab:'Revisões',           label:'Revisões',       icon:'✅', perm:'access_revisoes' },
      { tab:'Lançar Notas',       label:'Lançar Notas',   icon:'✏️', perm:'enter_notes' },
    ]},
    { title:'Gestão', items:[
      { tab:'Comparar Editores',  label:'Comparar Editores', icon:'⚖️', perm:'access_comparar' },
      { tab:'Operação',           label:'Operação',       icon:'⚙️', perm:'view_dashboard' },
      { tab:'Alertas',            label:'Alertas',        icon:'🔔', perm:'view_alerts' },
      { tab:'Configurações',      label:'Configurações',  icon:'🛠️', perm:'edit_settings' },
      { tab:'Permissões',         label:'Permissões',     icon:'🔐', perm:'access_permissoes' },
    ]},
    { title:'Admin', items:[
      { tab:'Sistema',            label:'Sistema',        icon:'🖥️', perm:'access_system' },
      { tab:'Logs',               label:'Logs',           icon:'📜', perm:'access_logs' },
      { tab:'Banco de Dados',     label:'Banco de Dados', icon:'🗄️', perm:'access_db' },
    ]},
  ];

  // ─── 2. STATE INIT ────────────────────────────────────────────────
  function v27Init(){
    try {
      state.v27Permissions = state.v27Permissions || JSON.parse(localStorage.getItem('prota_v27_permissions')||'null') || JSON.parse(JSON.stringify(DEFAULT_PERMS));
      state.v27Weights     = state.v27Weights     || JSON.parse(localStorage.getItem('prota_v27_weights')||'null')     || { volume:40, velocidade:30, qualidade:30 };
      state.presence       = state.presence       || JSON.parse(localStorage.getItem('prota_user_presence')||'{}');
      state.userAccounts   = state.userAccounts   || JSON.parse(localStorage.getItem('prota_user_accounts')||'[]');
      state.loginEvents    = state.loginEvents    || JSON.parse(localStorage.getItem('prota_login_events')||'[]');
    } catch(e){ console.warn('[V27] init',e); }

    const ROLE_MIGRATION = { admin:'admin', supervisor:'supervisor_edicao', editor:'editor', decupador:'produtor', viewer:'roteirista' };
    (state.userAccounts||[]).forEach(u => {
      if (ROLE_MIGRATION[u.role]) u.role = ROLE_MIGRATION[u.role];
      if (!u.id) u.id = 'u_' + Math.random().toString(36).slice(2,9);
      if (!u.username && u.email) u.username = u.email;
      if (!u.cargo) u.cargo = ROLE_LABELS[u.role] || u.role;
      if (!u.status) u.status = 'ativo';
    });

    const hasAdmin = (state.userAccounts||[]).some(u => u.role==='admin');
    if (!hasAdmin) {
      state.userAccounts.push({
        id:'u_admin', name:'Administrador', apelido:'Admin',
        email:'admin', username:'admin', pass:'admin123',
        role:'admin', cargo:'Administrador', canal:'',
        status:'ativo', photo:'', about:'Conta administradora padrão.',
        createdAt: Date.now(),
      });
    }

    const examplesNeeded = ROLE_ORDER.filter(r => r!=='admin' && !(state.userAccounts||[]).some(u=>u.role===r));
    examplesNeeded.forEach(role => {
      const name = ROLE_LABELS[role];
      state.userAccounts.push({
        id:'u_seed_'+role, name:'Exemplo '+name, apelido:name.split(' ')[0],
        email:role+'@prota.local', username:role, pass:'123456',
        role, cargo:name, canal:'',
        status:'ativo', photo:'', about:'Usuário exemplo. Edite ou remova na aba Usuários.',
        createdAt: Date.now(),
      });
    });

    v27SaveAll();
  }
  function v27SaveAll(){
    try {
      localStorage.setItem('prota_user_accounts', JSON.stringify(state.userAccounts||[]));
      localStorage.setItem('prota_v27_permissions', JSON.stringify(state.v27Permissions||{}));
      localStorage.setItem('prota_v27_weights', JSON.stringify(state.v27Weights||{}));
      localStorage.setItem('prota_user_presence', JSON.stringify(state.presence||{}));
      localStorage.setItem('prota_login_events', JSON.stringify((state.loginEvents||[]).slice(0,200)));
    } catch(e){}
    if (typeof scheduleCloudSave === 'function') scheduleCloudSave();
  }

  // ─── 3. AUTH ──────────────────────────────────────────────────────
  function findAccount(loginRaw, passRaw){
    const login = String(loginRaw||'').trim().toLowerCase();
    const pass  = String(passRaw||'');
    return (state.userAccounts||[]).find(u => {
      if (u.status === 'inativo') return false;
      const matches = [u.username, u.email, u.apelido].filter(Boolean).map(x=>String(x).toLowerCase());
      return matches.includes(login) && String(u.pass||'') === pass;
    });
  }
  function doLoginV27(){
    const u = document.getElementById('login-user');
    const p = document.getElementById('login-pass');
    if (!u || !p) return;
    const acc = findAccount(u.value, p.value);
    const err = document.getElementById('login-error');
    if (!acc) {
      if (err) { err.textContent = 'Usuário ou senha inválidos.'; err.style.display='block'; }
      else alert('Usuário ou senha inválidos.');
      return;
    }
    if (err) err.style.display='none';
    state.currentUser = { ...acc };
    try { localStorage.setItem('prota_session_user', JSON.stringify(state.currentUser)); } catch(e){}
    state.loginEvents = state.loginEvents || [];
    state.loginEvents.unshift({ user:(acc.username||acc.email), at:Date.now() });
    state.loginEvents = state.loginEvents.slice(0,200);
    v27MarkPresence(acc, 'online');
    v27SaveAll();
    const ls = document.getElementById('login-screen');
    const app = document.getElementById('app');
    if (ls) ls.style.display='none';
    if (app) app.style.display='block';
    if (typeof initApp === 'function') { try { initApp(); } catch(e){} }
    v27ApplyShell();
    const firstTab = v27FirstAllowedTab();
    state.activeTab = firstTab;
    if (typeof renderTab === 'function') renderTab(firstTab);
    v27Toast('Bem-vindo, '+(acc.apelido||acc.name)+'!', 'success');
  }
  function logoutV27(){
    if (state.currentUser) v27MarkPresence(state.currentUser, 'offline');
    state.currentUser = null;
    try { localStorage.removeItem('prota_session_user'); } catch(e){}
    const ls = document.getElementById('login-screen');
    const app = document.getElementById('app');
    if (ls) ls.style.display='flex';
    if (app) app.style.display='none';
    document.body.classList.remove('v27');
  }
  function v27CurrentPerms(){
    const u = state.currentUser; if (!u) return [];
    if (u.role==='admin') return PERMISSIONS.map(p=>p.key);
    return (state.v27Permissions||{})[u.role] || DEFAULT_PERMS[u.role] || [];
  }
  function v27Can(perm){ if (!perm) return true; return v27CurrentPerms().includes(perm); }
  function v27FirstAllowedTab(){
    for (const sec of NAV_SECTIONS) for (const it of sec.items)
      if (v27Can(it.perm)) return it.tab;
    return 'Meu Perfil';
  }

  // ─── 4. SIDEBAR ───────────────────────────────────────────────────
  function v27ApplyShell(){
    document.body.classList.add('v27');
    document.body.classList.remove('v25-sidebar','v26-shell');
    v27RenderSidebar();
  }
  function v27RenderSidebar(){
    const topbar = document.querySelector('.topbar');
    const nav = document.querySelector('.nav-tabs');
    if (!topbar || !nav) return;

    let brand = topbar.querySelector('.v27-brand');
    if (!brand) {
      brand = document.createElement('div');
      brand.className = 'v27-brand';
      topbar.insertBefore(brand, topbar.firstChild);
    }
    brand.innerHTML = `
      <div class="v27-brand-logo">🎮</div>
      <div>
        <div class="v27-brand-name">Prota Games</div>
        <div class="v27-brand-tag">Sistema Interno</div>
      </div>`;
    topbar.querySelectorAll('.topbar-logo, .topbar-canal, .brand-lockup').forEach(n=>n.remove());

    let right = topbar.querySelector('.topbar-right');
    if (!right) { right = document.createElement('div'); right.className = 'topbar-right'; topbar.appendChild(right); }
    const u = state.currentUser || {};
    const initials = (u.name||u.username||'?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
    const photo = u.photo ? `<img src="${u.photo}" alt="">` : initials;
    right.innerHTML = `
      <div class="v27-user-card" onclick="window.v27GoMyProfile()">
        <div class="v27-user-avatar ${u.photo?'has-photo':''}">${photo}<span class="v27-presence-dot online"></span></div>
        <div class="v27-user-info">
          <div class="v27-user-name">${escapeHtmlV27(u.name||'—')}</div>
          <div class="v27-user-role">${escapeHtmlV27(ROLE_LABELS[u.role]||u.role||'')}</div>
        </div>
      </div>
      <button class="v27-logout" onclick="window.v27Logout()">⏻ Sair</button>`;

    nav.innerHTML = '';
    const searchWrap = document.createElement('div');
    searchWrap.className = 'v27-search-box';
    searchWrap.innerHTML = `
      <span class="v27-search-icon">🔍</span>
      <input class="v27-search-input" id="v27-search" placeholder="Buscar perfil..." oninput="v27SearchGlobal(this.value)" onfocus="v27SearchGlobal(this.value)" onblur="setTimeout(()=>{const r=document.getElementById('v27-search-results');if(r)r.style.display='none';},250)">
      <div class="v27-search-results" id="v27-search-results" style="display:none"></div>`;
    nav.appendChild(searchWrap);

    NAV_SECTIONS.forEach(section => {
      const allowedItems = section.items.filter(it => v27Can(it.perm));
      if (!allowedItems.length) return;
      const title = document.createElement('div');
      title.className = 'v27-section-title';
      title.textContent = section.title;
      nav.appendChild(title);
      allowedItems.forEach(it => {
        const btn = document.createElement('button');
        btn.className = 'nav-tab' + (state.activeTab === it.tab ? ' active' : '');
        btn.dataset.v27Tab = it.tab;
        btn.innerHTML = `<span class="v27-tab-icon">${it.icon}</span><span>${escapeHtmlV27(it.label)}</span>`;
        btn.onclick = () => {
          if (!v27Can(it.perm)) { v27Toast('Você não tem permissão para acessar.','error'); return; }
          state.activeTab = it.tab;
          v27HighlightActive();
          if (typeof renderTab === 'function') renderTab(it.tab);
        };
        nav.appendChild(btn);
      });
    });
    v27HighlightActive();
  }
  function v27HighlightActive(){
    document.querySelectorAll('.nav-tab[data-v27-tab]').forEach(b => {
      b.classList.toggle('active', b.dataset.v27Tab === state.activeTab);
    });
  }

  // ─── 5. RENDER TAB INTERCEPT ──────────────────────────────────────
  function v27WrapRenderTab(){
    const origRT = window.renderTab;
    window.renderTab = function(tab){
      const item = NAV_SECTIONS.flatMap(s=>s.items).find(i=>i.tab===tab);
      if (item && !v27Can(item.perm)) {
        const el = document.getElementById('main-content');
        if (el) el.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:#9b8cd9"><div style="font-size:42px;margin-bottom:10px">🔐</div><div style="font-weight:800;font-size:18px;color:#fff">Acesso restrito</div><div style="margin-top:6px">Você não tem permissão para esta página.</div></div>`;
        return;
      }
      if (tab === 'Meu Perfil')        return v27RenderMeuPerfil();
      if (tab === 'Perfil')            return v27RenderMeuPerfil();
      if (tab === 'Usuários')          return v27RenderUsuarios();
      if (tab === 'Permissões')        return v27RenderPermissoes();
      if (tab === 'Comparar Editores') return v27RenderComparar();
      if (tab === 'Alertas')           return v27RenderAlertas();
      if (tab === 'Vídeos Longos')     return v27RenderProducoesTab('longos');
      if (tab === 'Shorts')            return v27RenderProducoesTab('shorts');
      if (tab === 'Regravações')       return v27RenderProducoesTab('regravacoes');
      if (tab === 'Demandas')          return v27RenderProducoesTab('demandas');
      if (tab === 'Revisões')          return v27RenderProducoesTab('revisoes');

  function v27GetUserById(id){ return (state.userAccounts||[]).find(u => u.id === id || u.username === id || u.email === id); }
  function v27FindPersonRecord(user){
    if (!user) return null;
    const editors = state.editors || [];
    const decups = state.decupadores || [];
    return editors.find(e => e.name === user.name) || decups.find(d => d.name === user.name) || null;
  }
  function getCurrentWeekStart(){
    const now = new Date(); const d = new Date(now); const day = d.getDay();
    d.setDate(d.getDate() - day); d.setHours(0,0,0,0); return d.getTime();
  }
  function v27UserMetrics(user){
    const out = { entregas:0, entregasSemana:0, tempoMedio:'–', streak:0, caracteres:0, regravacoes:0, score:null, scoreCrit:{}, producoesSemana:0, viewsMediasSemana:0, shorts:0, longos:0 };
    if (!user) return out;
    const personId = v27FindPersonRecord(user)?.id;
    if (!personId) return out;
    const notas = state.notas || {};
    let total = 0, count = 0;
    Object.keys(notas).forEach(k => {
      const parts = k.split('|'); if (parts[1] !== personId) return;
      const f = parts[2], v = notas[k];
      if (f === 'producoes')        { out.entregas += parseInt(v)||0; }
      if (f === 'producoesSemana')  { out.producoesSemana += parseInt(v)||0; }
      if (f === 'shorts')           { out.shorts += parseInt(v)||0; }
      if (f === 'longos')           { out.longos += parseInt(v)||0; }
      if (f === 'caracteres')       { out.caracteres += parseInt(String(v).replace(/\D/g,''))||0; }
      if (f === 'regravacoes')      { out.regravacoes += parseInt(v)||0; }
      if (f === 'viewsSemana' || f === 'viewsMediasSemana') { const n=parseInt(String(v).replace(/\D/g,''))||0; out.viewsMediasSemana = Math.max(out.viewsMediasSemana, n); }
      const num = parseFloat(String(v).replace(',','.'));
      if (!isNaN(num) && num >= 0 && num <= 5 && ['quality','views','watchtime','delay','volume','velocidade','qualidade'].includes(f)) {
        out.scoreCrit[f] = (out.scoreCrit[f]==null) ? num : (out.scoreCrit[f]*0.5 + num*0.5);
        total += num; count++;
      }
    });
    out.score = count ? +(total/count).toFixed(2) : null;
    return out;
  }
  function v27Last7DaysActivity(user){
    const out=[]; const today=new Date(); today.setHours(0,0,0,0);
    const dayNames=['D','S','T','Q','Q','S','S'];
    const events = (state.loginEvents||[]).filter(e => e.user === (user.username||user.email));
    for (let i=6;i>=0;i--){
      const d=new Date(today); d.setDate(d.getDate()-i);
      const dEnd=new Date(d); dEnd.setDate(dEnd.getDate()+1);
      const active = events.some(e => e.at>=d.getTime() && e.at<dEnd.getTime());
      out.push({ day:dayNames[d.getDay()], label:d.toLocaleDateString('pt-BR'), active });
    }
    return out;
  }
  function v27SkillTrackerHTML(m){
    const skills = [
      { key:'volume',      label:'Volume de entregas', val:Math.min(5, m.producoesSemana/2) },
      { key:'velocidade',  label:'Velocidade',         val:m.scoreCrit.velocidade || 3 },

      { key:'consistencia',label:'Consistência',       val:Math.min(5, (m.streak||0)/2) },

    return skills.map(s => {
      const pct = Math.max(0,Math.min(100,(s.val/5)*100));
      return `<div class="v27-crit-row"><div class="v27-crit-label">${s.label}</div><div class="v27-crit-bar"><div class="v27-crit-fill" style="width:${pct}%"></div></div><div class="v27-crit-value">${s.val.toFixed(1)}</div></div>`;
    }).join('');

  function v27CompareWithTeamHTML(user, userMetrics){

    const rows = [

  // ─── 9. COMPARAR ──────────────────────────────────────────────────
  function v27RenderComparar(){
    const el = document.getElementById('main-content'); if (!el) return;
    const editorRoles = ['editor','head_edicao','supervisor_edicao'];
    const candidatos = (state.userAccounts||[]).filter(u => editorRoles.includes(u.role) && u.status!=='inativo');
    if (candidatos.length < 2) {
      el.innerHTML = `<div class="v27-page-header"><div><div class="v27-page-title">⚖️ Comparar Editores</div></div></div><div class="card"><div class="empty-state" style="padding:30px">Cadastre pelo menos 2 editores para comparar.</div></div>`;
      return;
    }
    const a = state.v27CompareA || candidatos[0].id;
    const b = state.v27CompareB || candidatos[1].id;
    const userA = candidatos.find(c=>c.id===a) || candidatos[0];
    const userB = candidatos.find(c=>c.id===b) || candidatos[1];
    const mA = v27UserMetrics(userA);
    const mB = v27UserMetrics(userB);
    const sel = (cur,exc)=>candidatos.filter(c=>c.id!==exc).map(c=>`<option value="${c.id}" ${c.id===cur?'selected':''}>${escapeHtmlV27(c.name)} · ${escapeHtmlV27(ROLE_LABELS[c.role])}</option>`).join('');

    const w = state.v27Weights;
    const score = (m)=>{
      const vol = Math.min(5, m.producoesSemana/2);
      const vel = m.scoreCrit.velocidade || 3;
      const qua = m.scoreCrit.qualidade || m.scoreCrit.quality || 3;
      const sum = w.volume + w.velocidade + w.qualidade;
      return sum ? (vol*w.volume + vel*w.velocidade + qua*w.qualidade)/sum : 0;
    };
    const scoreA = score(mA), scoreB = score(mB);

    const rows = [
      ['Total de entregas',     mA.entregas,           mB.entregas,           'maior'],
      ['Vídeos longos',         mA.longos,             mB.longos,             'maior'],

  // ─── 11. PRESENÇA ─────────────────────────────────────────────────
  function v27GetPresence(user){
    const key = (user.email || user.username || '').toLowerCase();
    const p = (state.presence||{})[key] || {};
    if (!p.lastSeen) return { status:'offline', lastSeen:0 };
    const diffMin = (Date.now() - p.lastSeen) / 60000;
    let status = 'offline';
    if (diffMin < 1)      status = 'online';
    else if (diffMin < 5) status = 'idle';
    else                  status = 'offline';
    return { status, lastSeen:p.lastSeen };
  }
  function v27MarkPresence(user, force){
    const key = (user.email || user.username || '').toLowerCase();
    state.presence = state.presence || {};
    state.presence[key] = { lastSeen: Date.now(), status: force||'online' };
    try { localStorage.setItem('prota_user_presence', JSON.stringify(state.presence)); } catch(e){}
    if (typeof scheduleCloudSave === 'function') scheduleCloudSave();
  }
  function v27StartHeartbeat(){
    if (window._v27HB) clearInterval(window._v27HB);
    window._v27HB = setInterval(()=>{ if (state.currentUser) v27MarkPresence(state.currentUser, 'online'); }, 30000);
    ['mousemove','keydown','click','scroll','touchstart'].forEach(ev =>
      window.addEventListener(ev, ()=>{ if (state.currentUser) v27MarkPresence(state.currentUser,'online'); }, {passive:true}));

  function v27FormatDate(ts){

    if(dDate.getTime()===today.getTime()) return 'Hoje '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

    if (state.v27Permissions && state.v27Permissions.administrador && !state.v27Permissions.admin) {

    }
    console.log('[V27.1] Hotfix admin aplicado. currentUser.role =', state.currentUser?.role);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(applyAdminHotfix, 900));

})();

<style>
