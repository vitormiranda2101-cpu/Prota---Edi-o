</style>
<script>
(function(){
  'use strict';

  function bootV272(){
    if (typeof state !== 'object' || !state) { setTimeout(bootV272, 200); return; }

    // ─── 1. CADASTRO NA SIDEBAR ────────────────────────────────────
    // Re-aplica sidebar adicionando "Cadastro" na seção GERAL
    if (typeof window.v27RenderSidebar === 'function') {
      const origRender = window.v27RenderSidebar;
      window.v27RenderSidebar = function(){
        origRender.apply(this, arguments);
        injectExtraTabs();
      };
    }

    function injectExtraTabs(){
      const nav = document.querySelector('.nav-tabs'); if (!nav) return;
      // Evita duplicar
      if (nav.querySelector('[data-v27-tab="Cadastro"]')) return;

      // Adiciona "Cadastro" como primeiro item da seção TRABALHO
      const trabalhoTitle = [...nav.querySelectorAll('.v27-section-title')].find(t=>t.textContent.trim()==='Trabalho');
      const addTab = (label, icon, tab, after) => {
        const btn = document.createElement('button');
        btn.className = 'nav-tab' + (state.activeTab===tab?' active':'');
        btn.dataset.v27Tab = tab;
        btn.innerHTML = `<span class="v27-tab-icon">${icon}</span><span>${label}</span>`;
        btn.onclick = () => { state.activeTab=tab; document.querySelectorAll('.nav-tab[data-v27-tab]').forEach(b=>b.classList.toggle('active',b.dataset.v27Tab===state.activeTab)); if(typeof renderTab==='function') renderTab(tab); };
        if (after && after.nextSibling) after.parentNode.insertBefore(btn, after.nextSibling);
        else if (after) after.parentNode.appendChild(btn);
        else nav.appendChild(btn);
        return btn;
      };
      if (trabalhoTitle) {
        // Insere CADASTRO logo após o título "Trabalho"
        const after = trabalhoTitle;
        addTab('Cadastro', '📝', 'Cadastro', after);

        // Adiciona também Histórico/Chat/Pautas que estavam órfãos (se existirem no render original)
        if (typeof renderHistorico === 'function') addTab('Histórico', '📅', 'Histórico', after);
        if (typeof renderChat === 'function')      addTab('Chat',      '💬', 'Chat',      after);
        if (typeof renderPautas === 'function')    addTab('Pautas 1:1','🗒️','Pautas 1:1', after);
        if (typeof renderDificuldades === 'function') addTab('Dificuldades','⚠️','Dificuldades',after);
        if (typeof renderMensagemFixada === 'function') addTab('Mensagem Fixada','📌','Mensagem Fixada',after);
      }
    }

    // Re-render sidebar agora (caso usuário já esteja logado)
    if (state.currentUser && typeof window.v27RenderSidebar === 'function') {
      window.v27RenderSidebar();
    }

    // ─── 2. LANÇAR NOTAS: PATCH NO RENDER DE EDITORES ──────────────
    // Após o render original, injeta colunas Longos / Shorts / Regravações
    if (typeof window.renderLancarNotasEditores === 'function') {
      const origLNE = window.renderLancarNotasEditores;
      window.renderLancarNotasEditores = function(el){
        origLNE.call(this, el);
        try { augmentLancarNotasEditores(el); } catch(e){ console.warn('[V27.2] augment LNE',e); }
      };
    }
    if (typeof window.renderLancarNotasDecupadores === 'function') {
      const origLND = window.renderLancarNotasDecupadores;
      window.renderLancarNotasDecupadores = function(el){
        origLND.call(this, el);
        try { augmentLancarNotasDecupadores(el); } catch(e){ console.warn('[V27.2] augment LND',e); }
      };
    }

    function getCurrentWeekKey(){
      try {
        const u = state.currentUser;
        const isAdmin = u && u.role==='admin';
        return isAdmin ? (state.adminSelectedWeek || (typeof getCurrentWeek==='function'?getCurrentWeek():'')) : (typeof getCurrentWeek==='function'?getCurrentWeek():'');
      } catch(e){ return ''; }
    }

    function saveFieldGeneric(key, value){
      state.notas = state.notas || {};
      if (value === '' || value == null) delete state.notas[key];
      else state.notas[key] = value;
      if (typeof saveNotas === 'function') saveNotas();
      if (typeof showSaved === 'function') showSaved();
    }
    window.v27SaveLN = saveFieldGeneric;

    function augmentLancarNotasEditores(el){
      const week = getCurrentWeekKey(); if (!week) return;
      const table = el.querySelector('.notas-table'); if (!table) return;
      // Header: adiciona 3 colunas antes de Views médias/sem
      const headRow = table.querySelector('thead tr'); if (!headRow) return;
      if (headRow.dataset.v272) return; headRow.dataset.v272 = '1';
      const ths = [...headRow.querySelectorAll('th')];
      const viewsTh = ths.find(th => th.textContent.trim().toLowerCase().includes('views'));
      const inserts = [
        {label:'Longos', key:'longos'},
        {label:'Shorts', key:'shorts'},
        {label:'Regravações', key:'regravacoes'},
        {label:'Produções/sem', key:'producoesSemana'},
      ];
      inserts.forEach(it => {
        const th = document.createElement('th');
        th.textContent = it.label;
        th.dataset.v272Key = it.key;
        if (viewsTh) headRow.insertBefore(th, viewsTh); else headRow.appendChild(th);
      });

      // Body: para cada linha de editor, insere inputs nas mesmas posições
      const headIndex = [...headRow.querySelectorAll('th')].findIndex(th=>th.textContent.trim().toLowerCase().includes('views'));
      const bodyRows = table.querySelectorAll('tbody tr');
      bodyRows.forEach(tr => {
        // Descobre o editor id pela primeira <td> (avatar tem editor id em saveViews calls)
        // Mais robusto: pega a 1ª <td> com onclick/onchange contendo o id
        let edId = null;
        tr.querySelectorAll('[onchange]').forEach(inp => {
          const m = String(inp.getAttribute('onchange')).match(/saveViews\s*\(\s*'[^']*'\s*,\s*'([^']+)'/);
          if (m) edId = m[1];
        });
        if (!edId) {
          tr.querySelectorAll('[onchange]').forEach(inp => {
            const m = String(inp.getAttribute('onchange')).match(/saveTextField\s*\(\s*'[^']*'\s*,\s*'([^']+)'/);
            if (m && !edId) edId = m[1];
          });
        }
        if (!edId) return;

        // Encontra a célula Views (mesmo index calculado acima)
        const viewsTd = tr.children[headIndex];
        inserts.forEach(it => {
          const td = document.createElement('td');
          const v = (state.notas||{})[`${week}|${edId}|${it.key}`] || '';
          td.innerHTML = `<input class="v27-ln-input" type="text" placeholder="0" value="${v}" onchange="v27SaveLN('${week}|${edId}|${it.key}',this.value)">`;
          if (viewsTd) tr.insertBefore(td, viewsTd); else tr.appendChild(td);
        });
      });
    }

    function augmentLancarNotasDecupadores(el){
      const week = getCurrentWeekKey(); if (!week) return;
      const table = el.querySelector('.notas-table'); if (!table) return;
      const headRow = table.querySelector('thead tr'); if (!headRow) return;
      if (headRow.dataset.v272) return; headRow.dataset.v272 = '1';
      const ths = [...headRow.querySelectorAll('th')];
      const viewsTh = ths.find(th => th.textContent.trim().toLowerCase().includes('views'));
      // Para decupadores: só Regravações é faltante
      const th = document.createElement('th');
      th.textContent = 'Regravações';
      if (viewsTh) headRow.insertBefore(th, viewsTh); else headRow.appendChild(th);

      const headIndex = [...headRow.querySelectorAll('th')].findIndex(t=>t.textContent.trim().toLowerCase().includes('views'));
      const bodyRows = table.querySelectorAll('tbody tr');
      bodyRows.forEach(tr => {
        let dcId = null;
        tr.querySelectorAll('[onchange]').forEach(inp => {
          const m = String(inp.getAttribute('onchange')).match(/saveTextField\s*\(\s*'[^']*'\s*,\s*'([^']+)'/);
          if (m && !dcId) dcId = m[1];
        });
        if (!dcId) {
          tr.querySelectorAll('[onclick]').forEach(b => {
            const m = String(b.getAttribute('onclick')).match(/toggle\w+Atraso\s*\(\s*'[^']*'\s*,\s*'([^']+)'/);
            if (m && !dcId) dcId = m[1];
          });
        }
        if (!dcId) return;
        const viewsTd = tr.children[headIndex];
        const v = (state.notas||{})[`${week}|${dcId}|regravacoes`] || '';
        const td = document.createElement('td');
        td.innerHTML = `<input class="v27-ln-input" type="text" placeholder="0" value="${v}" onchange="v27SaveLN('${week}|${dcId}|regravacoes',this.value)">`;
        if (viewsTd) tr.insertBefore(td, viewsTd); else tr.appendChild(td);
      });
    }

    // Se já estiver na aba Lançar Notas, força re-render
    if (state.activeTab === 'Lançar Notas' && typeof renderTab === 'function') {
      try { renderTab('Lançar Notas'); } catch(e){}
    }

    // ─── 3. MODAL DE NOVO USUÁRIO (substitui os prompts em sequência) ──
    window.v27NewUserPrompt = function(){ v27OpenUserModal(null); };
    window.v27EditUserPrompt = function(id){ const u=(state.userAccounts||[]).find(x=>x.id===id); if(u) v27OpenUserModal(u); };

    window.v27OpenUserModal = function(user){
      const isEdit = !!user;
      const u = user || { id:'', name:'', apelido:'', email:'', pass:'', role:'editor', cargo:'', canal:'', status:'ativo' };
      const ROLE_OPTS = ['admin','head_edicao','supervisor_edicao','editor','roteirista','produtor'];
      const ROLE_LBL = {admin:'Administrador',head_edicao:'Head de Edição',supervisor_edicao:'Supervisor de Edição',editor:'Editor',roteirista:'Roteirista',produtor:'Produtor'};
      const teams = (state.teams || []);
      const teamOpts = ['<option value="">— sem time —</option>'].concat(teams.map(t=>`<option value="${t}" ${t===u.canal?'selected':''}>${t}</option>`)).join('');

      const bg = document.createElement('div');
      bg.className = 'v27-modal-bg';
      bg.onclick = e => { if (e.target === bg) document.body.removeChild(bg); };
      bg.innerHTML = `<div class="v27-modal">
        <h2>${isEdit?'✏️ Editar usuário':'➕ Novo usuário'}</h2>
        <div class="v27-modal-field"><label>Nome completo</label><input id="v27m-name" value="${(u.name||'').replace(/"/g,'&quot;')}"></div>
        <div class="v27-modal-field"><label>Apelido</label><input id="v27m-apelido" value="${(u.apelido||'').replace(/"/g,'&quot;')}"></div>
        <div class="v27-modal-field"><label>Email / Login</label><input id="v27m-email" value="${(u.email||'').replace(/"/g,'&quot;')}" placeholder="ex: joao@prota.com"></div>
        <div class="v27-modal-field"><label>${isEdit?'Nova senha (vazio = manter)':'Senha inicial'}</label><input id="v27m-pass" type="text" value="${isEdit?'':'123456'}" placeholder="•••••••"></div>
        <div class="v27-modal-field"><label>Cargo</label><select id="v27m-role">${ROLE_OPTS.map(r=>`<option value="${r}" ${r===u.role?'selected':''}>${ROLE_LBL[r]}</option>`).join('')}</select></div>
        <div class="v27-modal-field"><label>Time</label><select id="v27m-team">${teamOpts}</select></div>
        <div class="v27-modal-field"><label>Status</label><select id="v27m-status"><option value="ativo" ${u.status==='ativo'?'selected':''}>Ativo</option><option value="inativo" ${u.status==='inativo'?'selected':''}>Inativo</option></select></div>
        <div class="v27-modal-actions">
          <button class="v27-modal-btn ghost" onclick="this.closest('.v27-modal-bg').remove()">Cancelar</button>
          <button class="v27-modal-btn primary" onclick="v27SubmitUserModal(${isEdit?`'${u.id}'`:'null'})">${isEdit?'Salvar':'Criar usuário'}</button>
        </div>
      </div>`;
      document.body.appendChild(bg);
      setTimeout(()=>document.getElementById('v27m-name')?.focus(),50);
    };

    window.v27SubmitUserModal = function(id){
      const name=document.getElementById('v27m-name').value.trim();
      const apelido=document.getElementById('v27m-apelido').value.trim();
      const email=document.getElementById('v27m-email').value.trim();
      const pass=document.getElementById('v27m-pass').value;
      const role=document.getElementById('v27m-role').value;
      const canal=document.getElementById('v27m-team').value;
      const status=document.getElementById('v27m-status').value;
      const ROLE_LBL = {admin:'Administrador',head_edicao:'Head de Edição',supervisor_edicao:'Supervisor de Edição',editor:'Editor',roteirista:'Roteirista',produtor:'Produtor'};
      if(!name||!email){ alert('Nome e email são obrigatórios.'); return; }
      if (id && id !== 'null') {
        const u = (state.userAccounts||[]).find(x=>x.id===id);
        if(u){ u.name=name; u.apelido=apelido; u.email=email; u.username=email; if(pass) u.pass=pass; u.role=role; u.cargo=ROLE_LBL[role]; u.canal=canal; u.status=status; }
      } else {
        if(!pass){ alert('Senha é obrigatória para novo usuário.'); return; }
        state.userAccounts.push({id:'u_'+Math.random().toString(36).slice(2,9),name,apelido,email,username:email,pass,role,cargo:ROLE_LBL[role],canal,status,photo:'',about:'',createdAt:Date.now()});
      }
      try { localStorage.setItem('prota_user_accounts',JSON.stringify(state.userAccounts||[])); }catch(e){}
      if (typeof scheduleCloudSave==='function') scheduleCloudSave();
      document.querySelector('.v27-modal-bg')?.remove();
      if (typeof v27RenderUsuarios==='function') v27RenderUsuarios();
      if (state.currentUser && id && id!=='null' && state.currentUser.id===id) {
        const upd = (state.userAccounts||[]).find(x=>x.id===id);
        if (upd) { state.currentUser={...upd}; if (typeof v27RenderSidebar==='function') v27RenderSidebar(); }
      }
    };

    console.log('[V27.2] Patch aplicado. Cadastro: na sidebar. Lançar Notas: +4 colunas editores, +1 decupadores. Modal de usuário ativo.');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(bootV272, 1200));
  } else {
    setTimeout(bootV272, 1200);
  }
})();
</script>

    function listTeams(){ try { return (typeof getAllTeams==='function')?getAllTeams():(state.teams||[]); } catch(e){ return state.teams||[]; } }
    function getEditores(canal){ try { return (typeof getEditoresByCanal==='function')?getEditoresByCanal(canal):((state.editors||[]).filter(e=>e.canal===canal||!canal)); } catch(e){ return []; } }
    function getDecupadores(canal){ try { return (typeof getDecupadoresByCanal==='function')?getDecupadoresByCanal(canal):((state.decupadores||[]).filter(d=>d.canal===canal||!canal)); } catch(e){ return []; } }
    function avatarHTML(person, canal, size){
      try {
        if (person._isDecup && typeof decupadorAvatarHTML==='function') return decupadorAvatarHTML(person, size||44, 16);
        if (typeof editorAvatarHTML==='function') return editorAvatarHTML(person, canal, size||44, 16);
      } catch(e){}
      const initials = (person.name||'?').split(' ').map(s=>s[0]).join('').slice(0,2).toUpperCase();
      return `<div style="width:${size||44}px;height:${size||44}px;border-radius:50%;background:linear-gradient(135deg,#7a5cff,#3a8bff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:16px;">${initials}</div>`;
    }

    function escH(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    function saveField(week, id, key, value){
      state.notas = state.notas || {};
      const k = `${week}|${id}|${key}`;
      if (value === '' || value == null) delete state.notas[k];
      else state.notas[k] = String(value);
      if (typeof saveNotas==='function') saveNotas();
      if (typeof showSaved==='function') showSaved();
    }
    window.v27LnSave = saveField;

    function setStar(week, id, critKey, value){
      // toggle: clicar na nota atual zera; senão grava
      const k = `${week}|${id}|${critKey}`;
      const cur = parseInt(state.notas?.[k]); if (cur === value) value = 0;
      saveField(week, id, critKey, value > 0 ? String(value) : '');
      // re-render só esse card
      const card = document.querySelector(`[data-v27ln-card="${id}"]`);
      if (card) {
        const stars = card.querySelectorAll(`[data-v27ln-crit="${critKey}"] .v27ln-star`);
        stars.forEach((s,i)=>s.classList.toggle('on', i < (value>0?value:0)));
        // atualiza média
        const avgEl = card.querySelector('.v27ln-avg-val');
        if (avgEl) avgEl.textContent = formatAvg(computeAvg(week,id, card.dataset.v27lnTipo));
      }
    }
    window.v27LnStar = setStar;

    function toggleLate(week, id, tipo){
      const key = tipo==='decupador' ? 'atrasou' : 'atrasouEditor';
      const cur = state.notas?.[`${week}|${id}|${key}`];
      const next = cur === 'sim' ? '' : 'sim';
      saveField(week, id, key, next);
      // sincroniza com função V19 se existir
      if (typeof setPersonAtraso === 'function') {
        try { setPersonAtraso(week, id, tipo, next === 'sim'); } catch(e){}
      }
      const btn = document.querySelector(`[data-v27ln-late="${id}"]`);
      if (btn) {
        const isLate = next === 'sim';
        btn.classList.toggle('late', isLate);
        btn.textContent = isLate ? '⚠️ Atrasou' : '✅ No prazo';
      }
    }
    window.v27LnToggleLate = toggleLate;

    function computeAvg(week, id, tipo){
      const crits = tipo==='decupador' ? (window.CRITERIOS_DECUPAGEM||[]) : (window.CRITERIOS||[]);
      const vals = crits.map(c => parseFloat((state.notas||{})[`${week}|${id}|${c.key}`])).filter(v=>!isNaN(v)&&v>0);
      if (!vals.length) return null;
      return vals.reduce((a,b)=>a+b,0)/vals.length;
    }
    function formatAvg(v){ return v==null ? '–' : v.toFixed(1); }
    function colorAvg(v){
      if (v==null) return '#9b8cd9';
      if (v>=4.5) return '#86d99a';
      if (v>=3.5) return '#7a5cff';
      if (v>=2.5) return '#ffd60a';
      return '#ff8b85';
    }

    function starsHTML(week, id, critKey){
      const cur = parseInt((state.notas||{})[`${week}|${id}|${critKey}`]) || 0;
      let h = '<div class="v27ln-stars" data-v27ln-crit="'+critKey+'">';
      for (let i=1; i<=5; i++) h += `<button class="v27ln-star ${i<=cur?'on':''}" onclick="v27LnStar('${week}','${id}','${critKey}',${i})">★</button>`;
      h += '</div>';
      return h;
    }

    function cardHTMLEditor(week, ed, canal){
      const crits = window.CRITERIOS || [];
      const avg = computeAvg(week, ed.id, 'editor');
      const isLate = (state.notas||{})[`${week}|${ed.id}|atrasouEditor`] === 'sim';
      const get = k => escH((state.notas||{})[`${week}|${ed.id}|${k}`]||'');
      return `<div class="v27ln-card" data-v27ln-card="${ed.id}" data-v27ln-tipo="editor">
        <div class="v27ln-card-head">
          <div class="v27ln-avatar-wrap">${avatarHTML(ed, ed.canal||canal, 44)}<div><div class="v27ln-name">${escH(ed.name)}</div><div class="v27ln-meta">Editor · ${escH(ed.canal||canal||'sem time')}</div></div></div>
          <div class="v27ln-avg"><div class="v27ln-avg-val" style="color:${colorAvg(avg)}">${formatAvg(avg)}</div><div class="v27ln-avg-lbl">Média</div></div>
          <button class="v27ln-late-pill ${isLate?'late':''}" data-v27ln-late="${ed.id}" onclick="v27LnToggleLate('${week}','${ed.id}','editor')">${isLate?'⚠️ Atrasou':'✅ No prazo'}</button>
        </div>
        <div class="v27ln-body">
          <div class="v27ln-section">
            <div class="v27ln-section-title">🎯 Critérios de qualidade</div>
            <div class="v27ln-crits">${crits.map(cr => `<div class="v27ln-crit"><div class="v27ln-crit-name">${cr.label}</div>${starsHTML(week, ed.id, cr.key)}</div>`).join('')}</div>
          </div>
          <div class="v27ln-section">
            <div class="v27ln-section-title">🎬 Produção da semana</div>
            <div class="v27ln-grid">
              <div class="v27ln-field"><label>Vídeos longos</label><input type="text" placeholder="0" value="${get('longos')}" onchange="v27LnSave('${week}','${ed.id}','longos',this.value)"></div>
              <div class="v27ln-field"><label>Shorts</label><input type="text" placeholder="0" value="${get('shorts')}" onchange="v27LnSave('${week}','${ed.id}','shorts',this.value)"></div>
              <div class="v27ln-field"><label>Regravações</label><input type="text" placeholder="0" value="${get('regravacoes')}" onchange="v27LnSave('${week}','${ed.id}','regravacoes',this.value)"></div>
              <div class="v27ln-field"><label>Produções/sem</label><input type="text" placeholder="0" value="${get('producoesSemana')}" onchange="v27LnSave('${week}','${ed.id}','producoesSemana',this.value)"></div>
              <div class="v27ln-field"><label>Caracteres</label><input type="text" placeholder="0" value="${get('caracteres')}" onchange="v27LnSave('${week}','${ed.id}','caracteres',this.value)"></div>
            </div>
          </div>
          <div class="v27ln-section">
            <div class="v27ln-section-title">📈 Performance</div>
            <div class="v27ln-grid">
              <div class="v27ln-field"><label>Views médias/semana</label><input type="text" placeholder="116.000" value="${get('viewsMediasSemana')||get('views24')}" onchange="v27LnSave('${week}','${ed.id}','viewsMediasSemana',this.value);v27LnSave('${week}','${ed.id}','views24',this.value)"></div>
              <div class="v27ln-field"><label>Watchtime</label><input type="text" placeholder="00:06:55" value="${get('watchtime')}" onchange="v27LnSave('${week}','${ed.id}','watchtime',this.value)"></div>
              <div class="v27ln-field"><label>Tempo médio</label><input type="text" placeholder="01:30:00" value="${get('tempoMedio')}" onchange="v27LnSave('${week}','${ed.id}','tempoMedio',this.value)"></div>
            </div>
          </div>
          ${isLate?`<div class="v27ln-section"><div class="v27ln-section-title">⚠️ Motivo do atraso</div><div class="v27ln-field"><textarea placeholder="Descreva o que aconteceu..." onchange="v27LnSave('${week}','${ed.id}','motivoAtrasoEditor',this.value)">${get('motivoAtrasoEditor')}</textarea></div></div>`:''}
          <div class="v27ln-section">
            <div class="v27ln-section-title">📝 Observação</div>
            <div class="v27ln-field"><textarea placeholder="Comentários, próximos passos, destaques..." onchange="v27LnSave('${week}','${ed.id}','obs',this.value)">${get('obs')}</textarea></div>
          </div>
        </div>
      </div>`;
    }

    function cardHTMLDecupador(week, dc, canal, editoresList){
      const crits = window.CRITERIOS_DECUPAGEM || [];
      const avg = computeAvg(week, dc.id, 'decupador');
      const isLate = (state.notas||{})[`${week}|${dc.id}|atrasou`] === 'sim';
      const get = k => escH((state.notas||{})[`${week}|${dc.id}|${k}`]||'');
      const impactado = get('editorImpactado');
      dc._isDecup = true;
      return `<div class="v27ln-card" data-v27ln-card="${dc.id}" data-v27ln-tipo="decupador">
        <div class="v27ln-card-head">
          <div class="v27ln-avatar-wrap">${avatarHTML(dc, dc.canal||canal, 44)}<div><div class="v27ln-name">${escH(dc.name)}</div><div class="v27ln-meta">Decupador · ${escH(dc.canal||canal||'sem time')}</div></div></div>
          <div class="v27ln-avg"><div class="v27ln-avg-val" style="color:${colorAvg(avg)}">${formatAvg(avg)}</div><div class="v27ln-avg-lbl">Média</div></div>
          <button class="v27ln-late-pill ${isLate?'late':''}" data-v27ln-late="${dc.id}" onclick="v27LnToggleLate('${week}','${dc.id}','decupador')">${isLate?'⚠️ Atrasou':'✅ No prazo'}</button>
        </div>
        <div class="v27ln-body">
          <div class="v27ln-section">
            <div class="v27ln-section-title">🎯 Critérios de qualidade</div>
            <div class="v27ln-crits">${crits.map(cr => `<div class="v27ln-crit"><div class="v27ln-crit-name">${cr.label}</div>${starsHTML(week, dc.id, cr.key)}</div>`).join('')}</div>
          </div>
          <div class="v27ln-section">
            <div class="v27ln-section-title">🎬 Produção da semana</div>
            <div class="v27ln-grid">
              <div class="v27ln-field"><label>Vídeos decupados</label><input type="text" placeholder="0" value="${get('videos')}" onchange="v27LnSave('${week}','${dc.id}','videos',this.value)"></div>
              <div class="v27ln-field"><label>Regravações</label><input type="text" placeholder="0" value="${get('regravacoes')}" onchange="v27LnSave('${week}','${dc.id}','regravacoes',this.value)"></div>
              <div class="v27ln-field"><label>Editor impactado</label><select onchange="v27LnSave('${week}','${dc.id}','editorImpactado',this.value)" style="background:transparent;color:#fff;border:0;width:100%;font-family:inherit;font-size:14px;font-weight:700;outline:none;cursor:pointer;"><option value="">— selecione —</option>${(editoresList||[]).map(e=>`<option value="${escH(e.name)}" ${e.name===impactado?'selected':''}>${escH(e.name)}</option>`).join('')}</select></div>
            </div>
          </div>
          <div class="v27ln-section">
            <div class="v27ln-section-title">📈 Performance</div>
            <div class="v27ln-grid">
              <div class="v27ln-field"><label>Views médias/semana</label><input type="text" placeholder="116.000" value="${get('viewsMediasSemana')||get('views24')}" onchange="v27LnSave('${week}','${dc.id}','viewsMediasSemana',this.value);v27LnSave('${week}','${dc.id}','views24',this.value)"></div>
              <div class="v27ln-field"><label>Watchtime (s)</label><input type="text" placeholder="0" value="${get('watchtimeSeconds')}" onchange="v27LnSave('${week}','${dc.id}','watchtimeSeconds',this.value)"></div>
            </div>
          </div>
          ${isLate?`<div class="v27ln-section"><div class="v27ln-section-title">⚠️ Motivo do atraso</div><div class="v27ln-field"><textarea placeholder="Descreva o que aconteceu..." onchange="v27LnSave('${week}','${dc.id}','motivoAtrasoDecup',this.value)">${get('motivoAtrasoDecup')}</textarea></div></div>`:''}
          <div class="v27ln-section">
            <div class="v27ln-section-title">📝 Observação</div>
            <div class="v27ln-field"><textarea placeholder="Comentários, destaques..." onchange="v27LnSave('${week}','${dc.id}','obsDecup',this.value)">${get('obsDecup')}</textarea></div>
          </div>
        </div>
      </div>`;
    }

    function v27RenderLancarNotas(el){
      const u = state.currentUser; if (!u) { el.innerHTML='<div class="card"><div class="empty-state">Login necessário.</div></div>'; return; }
      const isAdmin = u.role === 'admin';
      const teams = listTeams();
      const canal = isAdmin ? (state.adminSelectedCanal || teams[0] || u.canal) : u.canal;
      if (isAdmin && !state.adminSelectedCanal) state.adminSelectedCanal = canal;
      const week  = isAdmin ? (state.adminSelectedWeek || getCurrentWeekSafe()) : getCurrentWeekSafe();
      const weeks = getAllWeeksSafe();
      const tipo  = state.notasTab || 'editores';

      const editores = getEditores(canal) || [];
      const decupadores = getDecupadores(canal) || [];
      const list = tipo === 'editores' ? editores : decupadores;

      // Resumo: quantos avaliados / quantos atrasados / média do grupo
      const evaluated = list.filter(p => computeAvg(week, p.id, tipo==='editores'?'editor':'decupador') != null).length;
      const lateCount = list.filter(p => (state.notas||{})[`${week}|${p.id}|${tipo==='editores'?'atrasouEditor':'atrasou'}`]==='sim').length;
      const groupAvgs = list.map(p => computeAvg(week, p.id, tipo==='editores'?'editor':'decupador')).filter(v=>v!=null);
      const groupAvg = groupAvgs.length ? groupAvgs.reduce((a,b)=>a+b,0)/groupAvgs.length : null;

      let html = `<div class="v27-page-header">
        <div>
          <div class="v27-page-title">✏️ Lançar Notas</div>
          <div class="v27-page-sub">Avalie a semana de cada pessoa do time. Salva automaticamente.</div>
        </div>
      </div>
      <div class="v27ln-toolbar">
        <div class="v27ln-toggle">
          <button class="${tipo==='editores'?'active':''}" onclick="state.notasTab='editores';renderTab('Lançar Notas')">👤 Editores · ${editores.length}</button>
          <button class="${tipo==='decupadores'?'active':''}" onclick="state.notasTab='decupadores';renderTab('Lançar Notas')">🎞️ Decupadores · ${decupadores.length}</button>
        </div>
        ${isAdmin ? `<select class="v27ln-select" onchange="state.adminSelectedCanal=this.value;renderTab('Lançar Notas')">${teams.map(t=>`<option value="${t}" ${t===canal?'selected':''}>${t}</option>`).join('')}</select>` : ''}
        <select class="v27ln-select" onchange="state.adminSelectedWeek=this.value;renderTab('Lançar Notas')">${(weeks||[]).map(w=>`<option value="${w}" ${w===week?'selected':''}>${escH(weekLabel(w))}</option>`).join('')}</select>
        <div class="v27ln-summary">
          <div class="v27ln-summary-item"><b>${evaluated}</b>/${list.length} avaliados</div>
          <div class="v27ln-summary-item">Atrasos: <b style="color:${lateCount?'#ff8b85':'#86d99a'}">${lateCount}</b></div>
          <div class="v27ln-summary-item">Média grupo: <b style="color:${colorAvg(groupAvg)}">${formatAvg(groupAvg)}</b></div>
        </div>
      </div>`;

      if (!list.length) {
        html += `<div class="v27ln-empty"><div style="font-size:36px;margin-bottom:8px">📭</div><div style="font-weight:800;font-size:16px;color:#fff">Sem ${tipo==='editores'?'editores':'decupadores'} ${isAdmin?'em '+(canal||'nenhum time'):'no seu time'}</div><div style="margin-top:6px">Cadastre em <b>Cadastro</b> primeiro.</div></div>`;
        el.innerHTML = html; return;
      }

      if (tipo === 'editores') {
        html += list.map(ed => cardHTMLEditor(week, ed, canal)).join('');
      } else {
        html += list.map(dc => cardHTMLDecupador(week, dc, canal, editores)).join('');
      }
      el.innerHTML = html;
    }

    window.v27RenderLancarNotas = v27RenderLancarNotas;

    // Se já está em Lançar Notas, força re-render
    if (state.activeTab === 'Lançar Notas' && typeof renderTab==='function') {
      try { renderTab('Lançar Notas'); } catch(e){}
    }

    console.log('[V27.3] Lançar Notas reformulado em cards. Toggle editores/decupadores · Filtro semana · 5 estrelas · Atrasou pill · Salvamento automático.');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(bootV273, 1500));
  } else {
    setTimeout(bootV273, 1500);
  }
})();
</script>
<!-- ═══ FIM V27.3 PATCH ═══ -->

<script>
(function(){
  'use strict';
  function expose(){
    try {
      // CRITERIOS / CRITERIOS_DECUPAGEM são const top-level no V26 e não viram window.*
      // O V27.3 esperava window.CRITERIOS — então populamos manualmente.
      if (typeof CRITERIOS !== 'undefined' && !window.CRITERIOS) window.CRITERIOS = CRITERIOS;
      if (typeof CRITERIOS_DECUPAGEM !== 'undefined' && !window.CRITERIOS_DECUPAGEM) window.CRITERIOS_DECUPAGEM = CRITERIOS_DECUPAGEM;
    } catch(e){
      // Fallback hardcoded com as mesmas chaves do V26 (linha 1916/1923 do source)
      window.CRITERIOS = window.CRITERIOS || [
        { key:'ritmo',    label:'Ritmo & Retenção', short:'Ritmo' },
        { key:'sound',    label:'Sound Design',     short:'Sound' },
        { key:'vfx',      label:'VFX & Motion',     short:'VFX' },
        { key:'processo', label:'Processo',         short:'Processo' },
      ];
      window.CRITERIOS_DECUPAGEM = window.CRITERIOS_DECUPAGEM || [
        { key:'qualidade_corte', label:'Qualidade da Decupagem', short:'Qualidade' },
        { key:'organizacao',     label:'Organização dos Clipes', short:'Organização' },
        { key:'timing',          label:'Timing de Entrega',      short:'Timing' },
        { key:'clareza',         label:'Clareza p/ Editor',      short:'Clareza' },
      ];
    }
    console.log('[V27.4] CRITERIOS expostos:', window.CRITERIOS?.length, '| DECUP:', window.CRITERIOS_DECUPAGEM?.length);
    // Se já estiver em Lançar Notas, re-renderiza
    if (typeof state !== 'undefined' && state.activeTab === 'Lançar Notas' && typeof renderTab === 'function') {
      try { renderTab('Lançar Notas'); } catch(e){}
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(expose, 1700));
  } else {
    setTimeout(expose, 1700);
  }
})();
</script>

<!-- ═══ V27.5 PATCH ═══ Estrelas 0-4 com meia estrela ═══ -->
<style>
/* Override do V27.3: agora estrelas vão de 0 a 4 com suporte a meia */
.v27ln-stars{display:flex;gap:3px;}
.v27ln-star-wrap{
  position:relative;width:24px;height:24px;display:inline-block;line-height:1;
}
.v27ln-star-bg, .v27ln-star-fill{
  position:absolute;top:0;left:0;font-size:22px;line-height:24px;pointer-events:none;
  user-select:none;font-family:'Apple Color Emoji','Segoe UI Emoji',sans-serif;
}
.v27ln-star-bg{color:rgba(160,120,255,.25);width:100%;}
.v27ln-star-fill{color:#ffd60a;width:0;overflow:hidden;text-shadow:0 0 8px rgba(255,214,10,.6);transition:width .12s ease;}
.v27ln-star-fill.half{width:50%;}
.v27ln-star-fill.full{width:100%;}
.v27ln-star-half{
  position:absolute;top:0;width:50%;height:100%;background:transparent;border:0;
  cursor:pointer;padding:0;z-index:2;
}
.v27ln-star-half.left{left:0;}
.v27ln-star-half.right{right:0;}
.v27ln-star-wrap:hover .v27ln-star-fill{filter:brightness(1.15);}
.v27ln-star-wrap:hover .v27ln-star-half:hover ~ .v27ln-star-fill{transform:scale(1.06);}
</style>
<script>
(function(){
  'use strict';

  function bootV275(){
    if (typeof state !== 'object' || !state) { setTimeout(bootV275, 200); return; }

    // ─── Sobrescreve setStar para aceitar valor decimal (0.5, 1, 1.5, ..., 4) ──
    window.v27LnStar = function(week, id, critKey, value){
      const k = `${week}|${id}|${critKey}`;
      const cur = parseFloat((state.notas||{})[k]);
      // Toggle: clicar no valor atual zera
      if (!isNaN(cur) && Math.abs(cur - value) < 0.01) value = 0;
      state.notas = state.notas || {};
      if (value > 0) state.notas[k] = String(value);
      else delete state.notas[k];
      if (typeof saveNotas === 'function') saveNotas();
      if (typeof showSaved === 'function') showSaved();
      // Re-renderiza só esse card
      const card = document.querySelector(`[data-v27ln-card="${id}"]`);
      if (!card) return;
      const tipo = card.dataset.v27lnTipo || 'editor';
      // Atualiza visualmente as estrelas desse critério
      const wraps = card.querySelectorAll(`[data-v27ln-crit="${critKey}"] .v27ln-star-wrap`);
      wraps.forEach((w, i) => {
        const slot = i + 1; // estrela 1..4
        const fill = w.querySelector('.v27ln-star-fill');
        fill.classList.remove('half','full');
        if (value >= slot) fill.classList.add('full');
        else if (value >= slot - 0.5) fill.classList.add('half');
      });
      // Atualiza média
      const avgEl = card.querySelector('.v27ln-avg-val');
      if (avgEl && typeof window._v27ComputeAvg === 'function') {
        const v = window._v27ComputeAvg(week, id, tipo);
        avgEl.textContent = v==null ? '–' : v.toFixed(1);
        avgEl.style.color = v==null ? '#9b8cd9' : (v>=3.5?'#86d99a':v>=2.5?'#7a5cff':v>=1.5?'#ffd60a':'#ff8b85');
      }
    };

    // ─── Helper de média exposto para o handler de cima reusar ───────────────
    window._v27ComputeAvg = function(week, id, tipo){
      const crits = tipo==='decupador' ? (window.CRITERIOS_DECUPAGEM||[]) : (window.CRITERIOS||[]);
      const vals = crits.map(c => parseFloat((state.notas||{})[`${week}|${id}|${c.key}`])).filter(v=>!isNaN(v)&&v>0);
      if (!vals.length) return null;
      return vals.reduce((a,b)=>a+b,0)/vals.length;
    };

    // ─── Substitui starsHTML usado pelo V27.3 ────────────────────────────────
    window.v27LnStarsHTML = function(week, id, critKey){
      const cur = parseFloat((state.notas||{})[`${week}|${id}|${critKey}`]) || 0;
      let h = `<div class="v27ln-stars" data-v27ln-crit="${critKey}">`;
      for (let i=1; i<=4; i++){
        let cls = '';
        if (cur >= i) cls = 'full';
        else if (cur >= i - 0.5) cls = 'half';
        h += `<div class="v27ln-star-wrap">
          <div class="v27ln-star-bg">★</div>
          <div class="v27ln-star-fill ${cls}">★</div>
          <button class="v27ln-star-half left"  title="${i-0.5}" onclick="v27LnStar('${week}','${id}','${critKey}',${i-0.5})"></button>
          <button class="v27ln-star-half right" title="${i}"     onclick="v27LnStar('${week}','${id}','${critKey}',${i})"></button>
        </div>`;
      }
      h += '</div>';
      return h;
    };

    // ─── Re-renderiza Lançar Notas via patch direto no DOM atual ─────────────
    // Como o V27.3 já injeta as estrelas no HTML do card, vou substituí-las após o render.
    // Estratégia: depois de renderTab('Lançar Notas'), localizar todas as .v27ln-stars[data-v27ln-crit]
    // e re-renderizar com window.v27LnStarsHTML.
    function rerenderStars(){
      const cards = document.querySelectorAll('[data-v27ln-card]');
      cards.forEach(card => {
        const id = card.dataset.v27lnCard;
        const tipo = card.dataset.v27lnTipo || 'editor';
        const week = (card.querySelector('select[onchange*="adminSelectedWeek"]'))?.value || (typeof getCurrentWeek==='function'?getCurrentWeek():'');
        // Pega a week da toolbar global
        const weekSel = document.querySelectorAll('.v27ln-select');
        let wk = '';
        weekSel.forEach(s => { if (String(s.getAttribute('onchange')||'').includes('adminSelectedWeek')) wk = s.value; });
        if (!wk && typeof getCurrentWeek==='function') wk = getCurrentWeek();
        const stars = card.querySelectorAll('.v27ln-stars[data-v27ln-crit]');
        stars.forEach(s => {
          const critKey = s.dataset.v27lnCrit;
          if (!critKey) return;
          const parent = s.parentElement;
          const fresh = document.createElement('div');
          fresh.innerHTML = window.v27LnStarsHTML(wk, id, critKey);
          parent.replaceChild(fresh.firstElementChild, s);
        });
        // Recalcula média 0-4
        const avgEl = card.querySelector('.v27ln-avg-val');
        if (avgEl) {
          const v = window._v27ComputeAvg(wk, id, tipo);
          avgEl.textContent = v==null ? '–' : v.toFixed(1);
          avgEl.style.color = v==null ? '#9b8cd9' : (v>=3.5?'#86d99a':v>=2.5?'#7a5cff':v>=1.5?'#ffd60a':'#ff8b85');
        }
      });
    }

    // Engata no renderTab — toda vez que Lançar Notas re-renderizar, troca estrelas
    if (typeof window.renderTab === 'function') {
      const prev = window.renderTab;
      window.renderTab = function(tab){
        const ret = prev.apply(this, arguments);
        if (tab === 'Lançar Notas') setTimeout(rerenderStars, 30);
        return ret;
      };
    }

    // Aplica agora se já está em Lançar Notas
    if (state.activeTab === 'Lançar Notas') setTimeout(rerenderStars, 200);

    console.log('[V27.5] Estrelas atualizadas para escala 0-4 com meia estrela. Clique esquerdo = meio, direito = inteiro.');
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(bootV275, 1900));
  } else {
    setTimeout(bootV275, 1900);
  }
})();
</script>
<!-- ═══ FIM V27.5 ═══ -->
