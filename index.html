}

function buildHeatmap(q) {
  const container = document.getElementById('heatmap-container');
  if (!container) return;

  const weeks = getWeeksInQuarter(q);
  const editors = state.editors;

  if (editors.length === 0) {
    container.innerHTML = `<div class="empty-state">Cadastre editores e lance notas para visualizar o heatmap.</div>`;
    return;
  }

  let html = `<div class="heatmap" style="--cols:${weeks.length};">`;
  html += `<div class="heatmap-row" style="grid-template-columns: 160px repeat(${weeks.length}, 36px);"><div></div>`;
  weeks.forEach(w => {
    html += `<div class="heatmap-header">S${w.split('-W')[1]}</div>`;
  });
  html += `</div>`;

  ['Falco', 'Phoenix', 'Astra'].forEach(canal => {
    const eds = getEditoresByCanal(canal);
    if (eds.length === 0) return;
    const cc = canalCSS(canal);

    eds.forEach(ed => {
      html += `<div class="heatmap-row" style="grid-template-columns: 160px repeat(${weeks.length}, 36px);">
        <div class="heatmap-name" style="display:flex;align-items:center;gap:8px;">
          <div style="width:6px;height:6px;border-radius:50%;background:${cc.color};flex-shrink:0;"></div>
          ${ed.name}
        </div>`;
      weeks.forEach(w => {
        const avg = calcAvg(ed.id, w);
        const cls = heatClass(avg);
        const display = avg !== null ? avg.toFixed(1) : '';
        const title = `${ed.name} · ${weekLabel(w)} · ${avg !== null ? avg.toFixed(2) : 'sem nota'}`;
        html += `<div class="heatmap-cell ${cls}" title="${title}">${display}</div>`;
      });
      html += `</div>`;
    });
  });

  html += `</div>`;
  container.innerHTML = html;
}

// ─── DIFICULDADES ─────────────────────────────────────────────

function renderDificuldades(el) {
  const q = state.selectedQuarter;
  let filter = state.currentUser.role === 'supervisor' ? state.currentUser.canal : state.difficultyFilter;

  let html = `<div class="section-header">
    <div class="section-header-left">
      <div class="section-title">Dificuldades</div>
      <div class="section-sub">Onde o time tem mais dificuldade · ${quarterLabel(q)}</div>
    </div>
    ${renderQuarterSelector()}
  </div>

  ${renderDiffFilters(filter)}`;

  // BLOCO 1: Time inteiro (ou canal filtrado) — onde mais erra
  const critScores = CRITERIOS.map(cr => ({
    ...cr,
    avg: calcCriterioAvgInQuarter(cr.key, q, filter)
  })).filter(c => c.avg !== null);

  critScores.sort((a,b) => a.avg - b.avg); // pior primeiro

  html += `<div class="card">
    <div class="chart-card-title">${filter === 'all' ? 'Time todo' : 'Canal ' + filter} · Critérios em ordem de dificuldade</div>
    <div class="chart-card-sub">A barra carrega proporcionalmente à nota: 4.0 = barra cheia</div>`;

  if (critScores.length === 0) {
    html += `<div class="empty-state">Sem notas no trimestre para este filtro.</div>`;
  } else {
    html += `<div class="difficulty-bars">`;
    critScores.forEach(cr => {
      const pct = Math.max(0, Math.min(100, (cr.avg / 4) * 100)); // 0 -> vazio, 4 -> barra cheia
      const statusClass = cr.avg < 2.5 ? 'status-bad' : cr.avg < 3.5 ? 'status-medium' : 'status-good';
      html += `<div class="difficulty-bar">
        <div class="difficulty-label">${cr.label}</div>
        <div class="difficulty-track enhanced" title="${cr.label}: ${cr.avg.toFixed(2)} de 4.0">
          <div class="difficulty-marker" style="left:${pct}%;"></div>
          <div class="difficulty-value-pill" style="left:${Math.min(94, Math.max(8, pct))}%;">${cr.avg.toFixed(2)}</div>
        </div>
        <div class="difficulty-score ${statusClass}">${cr.avg.toFixed(1)}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // BLOCO 2: Ranking de editores que mais sofrem em cada critério
  html += `<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin:24px 0 12px;padding:0 4px;">Editores com mais dificuldade por critério</div>`;
  html += `<div class="dash-grid">`;

  CRITERIOS.forEach(cr => {
    const editores = filter === 'all' ? state.editors : state.editors.filter(e => e.canal === filter);
    const scores = editores
      .map(ed => ({ ...ed, score: calcAvgInQuarter(ed.id, q, cr.key) }))
      .filter(e => e.score !== null)
      .sort((a,b) => a.score - b.score)
      .slice(0, 5);

    html += `<div class="chart-card">
      <div class="chart-card-title">${cr.label}</div>
      <div class="chart-card-sub">Top 5 editores que mais erram nesse critério</div>`;

    if (scores.length === 0) {
      html += `<div class="empty-state" style="padding:20px;">Sem dados.</div>`;
    } else {
      html += `<div class="alert-list">`;
      scores.forEach((ed, i) => {
        const cc = canalCSS(ed.canal);
        html += `<div class="alert-row">
          <div style="font-size:11px;color:var(--text-tertiary);font-weight:700;width:18px;">${i+1}</div>
          ${editorAvatarHTML(ed, ed.canal, 28, 10)}
          <div class="alert-name">${ed.name}</div>
          <div class="alert-canal" style="background:${cc.bg};color:${cc.color};">${ed.canal}</div>
          <div class="alert-score" style="color:${colorByScore(ed.score)};">${ed.score.toFixed(1)}</div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  html += `</div>`;

  // BLOCO 3: Visão por editor — ponto fraco e forte de cada um
  html += `<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-secondary);margin:24px 0 12px;padding:0 4px;">Visão individual · pontos fracos e fortes</div>`;

  const editoresFiltered = filter === 'all' ? state.editors : state.editors.filter(e => e.canal === filter);
  const editoresWithScores = editoresFiltered
    .map(ed => {
      const critScores = CRITERIOS.map(cr => ({ ...cr, score: calcAvgInQuarter(ed.id, q, cr.key) }));
      const validScores = critScores.filter(c => c.score !== null);
      const avg = validScores.length > 0 ? validScores.reduce((a,b)=>a+b.score,0)/validScores.length : null;
      return { ...ed, critScores, avg };
    })
    .filter(ed => ed.avg !== null)
    .sort((a,b) => a.avg - b.avg); // pior primeiro

  if (editoresWithScores.length === 0) {
    html += `<div class="card"><div class="empty-state">Sem dados no trimestre.</div></div>`;
  } else {
    html += `<div class="editor-difficulty-grid">`;
    editoresWithScores.forEach(ed => {
      const cc = canalCSS(ed.canal);
      html += `<div class="editor-diff-card">
        <div class="editor-diff-header">
          ${editorAvatarHTML(ed, ed.canal, 38, 14)}
          <div class="editor-diff-info">
            <div class="editor-diff-name">${ed.name}</div>
            <div class="editor-diff-meta">
              <span style="color:${cc.color};font-weight:600;">${ed.canal}</span>
            </div>
          </div>
          <div class="editor-diff-avg" style="color:${colorByScore(ed.avg)};">${ed.avg.toFixed(1)}</div>
        </div>
        <div class="editor-diff-criterios">`;

      ed.critScores.forEach(cs => {
        const score = cs.score;
        const pct = score !== null ? Math.max(0, Math.min(100, (score / 4) * 100)) : 0;
        const fillColor = score === null ? 'var(--text-tertiary)' :
          score < 2.5 ? 'var(--red)' :
          score < 3 ? 'var(--orange)' :
          score < 3.5 ? 'var(--green)' : 'var(--blue)';
        html += `<div class="crit-row">
          <div class="crit-label">${cs.short}</div>
          <div class="crit-track"><div class="crit-fill" style="width:${Math.max(pct, 4)}%;background:${fillColor};"></div></div>
          <div class="crit-value" style="color:${fillColor};">${score !== null ? score.toFixed(1) : '–'}</div>
        </div>`;
      });

      html += `</div></div>`;
    });
    html += `</div>`;
  }

  el.innerHTML = html;
}


function renderDiffFilters(filter) {
  if (state.currentUser.role === 'supervisor') {
    const cc = canalCSS(state.currentUser.canal);
    return `<div class="filter-tabs"><button class="filter-tab active" style="background:${cc.color};border-color:${cc.color};">Canal ${state.currentUser.canal}</button></div>`;
  }
  let html = `<div class="filter-tabs"><button class="filter-tab ${filter === 'all' ? 'active' : ''}" onclick="setDiffFilter('all')">Todos os canais</button>`;
  ['Falco','Phoenix','Astra'].forEach(canal => {
    const cc = canalCSS(canal);
    html += `<button class="filter-tab ${filter === canal ? 'active' : ''}" onclick="setDiffFilter('${canal}')" style="${filter===canal?`background:${cc.color};border-color:${cc.color};`:''}">${canal}</button>`;
  });
  html += `</div>`;
  return html;
}

function setDiffFilter(filter) {
  if (state.currentUser.role === 'supervisor') filter = state.currentUser.canal;
  state.difficultyFilter = filter;
  renderTab(state.activeTab);
}

function renderPautas(el) {
  let html = `<div class="section-header"><div class="section-header-left">
    <div class="section-title">Pautas para 1:1</div>
    <div class="section-sub">Separe conversas de editores e decupadores para não misturar gargalos</div>
  </div></div>`;
  html += renderSubTabs(state.pautaTab || 'editores', [
    { key: 'editores', label: 'Editores' },
    { key: 'decupadores', label: 'Decupadores' }
  ], 'setPautaTab');
  html += `<div id="pautas-inner"></div>`;
  el.innerHTML = html;
  const inner = document.getElementById('pautas-inner');
  if ((state.pautaTab || 'editores') === 'editores') renderPautasEditores(inner);
  else renderPautasDecupadores(inner);
}

function setPautaTab(tab) {
  state.pautaTab = tab;
  renderTab(state.activeTab);
}

function renderPautasEditores(el) {
  const week = getCurrentWeek();
  const todos = state.currentUser.role === 'supervisor'
    ? state.editors.filter(e => e.canal === state.currentUser.canal)
    : state.editors;
  const editoresComNota = todos.filter(ed =>
    CRITERIOS.some(cr => state.notas[`${week}|${ed.id}|${cr.key}`]) || state.notas[`${week}|${ed.id}|atrasouEditor`] === 'sim'
  );

  let html = `<div class="card subtle-card"><div style="font-weight:700;margin-bottom:4px;">Pautas de Editores</div><div class="chart-card-sub">Clique no editor para abrir a pauta completa · ${weekLabelLong(week)}</div></div>`;

  if (editoresComNota.length === 0) {
    html += `<div class="card"><div class="empty-state">Nenhum editor com notas lançadas esta semana.<br>As pautas aparecem quando as notas forem lançadas.</div></div>`;
    el.innerHTML = html;
    return;
  }

  if (!state.selectedPautaEditorId || !editoresComNota.some(e => e.id === state.selectedPautaEditorId)) {
    state.selectedPautaEditorId = editoresComNota
      .slice()
      .sort((a,b) => (calcAvg(a.id, week) || 99) - (calcAvg(b.id, week) || 99))[0].id;
  }

  const canais = state.currentUser.role === 'supervisor' ? [state.currentUser.canal] : ['Falco','Phoenix','Astra'];

  canais.forEach(canal => {
    const eds = editoresComNota.filter(e => e.canal === canal)
      .sort((a,b) => (calcAvg(a.id, week) || 0) - (calcAvg(b.id, week) || 0));
    if (!eds.length) return;
    const cc = canalCSS(canal);
    html += `<div class="canal-section-header">
      <div class="canal-dot" style="background:${cc.color};"></div>
      <div class="canal-section-title" style="color:${cc.color};">Canal ${canal}</div>
      <div class="canal-section-count">${eds.length} pauta${eds.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="pauta-directory">`;

    eds.forEach(ed => {
      const avg = calcAvg(ed.id, week);
      const atrasou = state.notas[`${week}|${ed.id}|atrasouEditor`] === 'sim';
      const status = atrasou || avg < 2.5 ? 'bad' : avg >= 3.5 ? 'good' : 'mid';
      const statusText = atrasou ? '⚠️ Atrasou' : avg >= 3.5 ? '⭐ Forte' : avg < 2.5 ? '☠️ Alerta' : 'Atenção';
      html += `<div class="pauta-name-card ${state.selectedPautaEditorId === ed.id ? 'active' : ''}" onclick="selectPautaEditor('${ed.id}')">

        </div>

    });

  });

  const selected = state.editors.find(e => e.id === state.selectedPautaEditorId);
  if (selected) html += renderPautaDetail(selected, week);
  el.innerHTML = html;
}

function renderPautasDecupadores(el) {
  const week = getCurrentWeek();
  const todos = state.currentUser.role === 'supervisor'
    ? (state.decupadores || []).filter(d => d.canal === state.currentUser.canal)
    : (state.decupadores || []);
  const decupsComNota = todos.filter(dc =>
    CRITERIOS_DECUPAGEM.some(cr => state.notas[`${week}|${dc.id}|${cr.key}`]) || state.notas[`${week}|${dc.id}|atrasou`] === 'sim'
  );

  let html = `<div class="card subtle-card"><div style="font-weight:700;margin-bottom:4px;">Pautas de Decupadores</div><div class="chart-card-sub">Clique no decupador para abrir a pauta completa · ${weekLabelLong(week)}</div></div>`;

  if (decupsComNota.length === 0) {
    html += `<div class="card"><div class="empty-state">Nenhum decupador com notas lançadas esta semana.<br>As pautas aparecem em Lançar Notas > Notas Decupadores.</div></div>`;
    el.innerHTML = html;
    return;
  }

  if (!state.selectedPautaDecupadorId || !decupsComNota.some(d => d.id === state.selectedPautaDecupadorId)) {
    state.selectedPautaDecupadorId = decupsComNota.slice().sort((a,b) => (calcDecupAvg(a.id, week) || 99) - (calcDecupAvg(b.id, week) || 99))[0].id;
  }

  const canais = state.currentUser.role === 'supervisor' ? [state.currentUser.canal] : ['Falco','Phoenix','Astra'];
  canais.forEach(canal => {
    const dcs = decupsComNota.filter(d => d.canal === canal).sort((a,b) => (calcDecupAvg(a.id, week) || 0) - (calcDecupAvg(b.id, week) || 0));
    if (!dcs.length) return;
    const cc = canalCSS(canal);
    html += `<div class="canal-section-header"><div class="canal-dot" style="background:${cc.color};"></div><div class="canal-section-title" style="color:${cc.color};">Canal ${canal}</div><div class="canal-section-count">${dcs.length} pauta${dcs.length !== 1 ? 's' : ''}</div></div><div class="pauta-directory">`;
    dcs.forEach(dc => {
      const avg = calcDecupAvg(dc.id, week);
      const atrasou = state.notas[`${week}|${dc.id}|atrasou`] === 'sim';
      const status = atrasou || avg < 2.5 ? 'bad' : avg >= 3.5 ? 'good' : 'mid';
      const statusText = atrasou ? '⚠️ Atrasou' : avg >= 3.5 ? '⭐ Forte' : avg < 2.5 ? '☠️ Alerta' : 'Atenção';
      html += `<div class="pauta-name-card ${state.selectedPautaDecupadorId === dc.id ? 'active' : ''}" onclick="selectPautaDecupador('${dc.id}')">
        ${decupadorAvatarHTML(dc, 36, 13)}
        <div class="pauta-name-main"><div class="pauta-name-title">${escapeHTML(dc.name)}</div><div class="pauta-name-sub">${dc.canal} · média ${avg !== null ? avg.toFixed(1) : '–'}</div></div>
        <div class="pauta-status-badge ${status}">${statusText}</div>
      </div>`;
    });
    html += `</div>`;
  });

  const selected = (state.decupadores || []).find(d => d.id === state.selectedPautaDecupadorId);
  if (selected) html += renderPautaDecupadorDetail(selected, week);
  el.innerHTML = html;
}

      ${pauta.map((p,i) => `<div class="pauta-block ${i===0 && atrasou ? 'danger' : i===0 ? 'warn' : ''}"><div class="pauta-block-title">Ponto ${String(i+1).padStart(2,'0')}</div><div class="pauta-block-text">${p}</div></div>`).join('')}
      <div class="pauta-block good"><div class="pauta-block-title">Fechamento</div><div class="pauta-block-text">Definir um combinado objetivo para a próxima entrega: prazo, checklist de clipes e comunicação antecipada de risco.</div></div>
    </div>
  </div>`;
}

function gerarPautaDecupador(dc, notas, avg, obs, views, wt, videos, atrasou, impactado) {
  const pauta = [];
  if (views || wt || videos) pauta.push(`<strong>Performance:</strong> ${videos ? `Vídeos: <strong>${videos}</strong>. ` : ''}${views ? `Views médias/sem: <strong>${views}</strong>. ` : ''}${wt ? `Watchtime (s): <strong>${wt}</strong>. ` : ''}`);
  if (atrasou) pauta.push(`<strong>Atraso:</strong> houve atraso marcado nesta semana. Entender causa raiz, impacto no editor (${escapeHTML(impactado)}) e definir prevenção.`);
  CRITERIOS_DECUPAGEM.forEach(cr => {
    const n = notas[cr.key];
    if (n && n <= 2) pauta.push(`<strong>${cr.label} — nota ${n.toFixed(1)}:</strong> escolher 1 exemplo real da semana e mostrar exatamente o que faltou para a edição fluir melhor.`);
  });
  const fortes = CRITERIOS_DECUPAGEM.filter(cr => notas[cr.key] && notas[cr.key] >= 3.5).map(cr => cr.label);
  if (fortes.length) pauta.push(`<strong>Pontos fortes:</strong> ${fortes.join(', ')}. Reforçar o que deve continuar virando padrão.`);
  if (obs) pauta.push(`<strong>Observação do supervisor:</strong> "${escapeHTML(obs)}"`);
  if (!pauta.length) pauta.push(`Semana dentro do padrão. Fazer check-in rápido sobre volume, gargalos e clareza do briefing.`);
  pauta.push(`<strong>Pergunta aberta:</strong> O que mais atrasou ou dificultou sua decupagem nesta semana? O que precisa ficar mais claro antes de começar?`);
  return pauta;
}

function renderPautaDetail(ed, week) {
  const avg = calcAvg(ed.id, week);
  const notas = {};
  CRITERIOS.forEach(cr => {
    const v = state.notas[`${week}|${ed.id}|${cr.key}`];
    if (v) notas[cr.key] = parseFloat(v);
  });
  const obs = state.notas[`${week}|${ed.id}|obs`] || '';
  const views = state.notas[`${week}|${ed.id}|views24`] || '';
  const wt = state.notas[`${week}|${ed.id}|watchtime`] || '';
  const cc = canalCSS(ed.canal);
  const avgColor = colorByScore(avg);
  const pct = avg !== null ? Math.max(0, Math.min(100, (avg / 4) * 100)) + '%' : '0%';
  const crits = CRITERIOS.map(cr => ({...cr, score:notas[cr.key]})).filter(x => x.score !== undefined && x.score !== null);
  const sortedLow = crits.slice().sort((a,b)=>a.score-b.score);
  const sortedHigh = crits.slice().sort((a,b)=>b.score-a.score);
  const minScore = sortedLow[0]?.score ?? null;
  const maxScore = sortedHigh[0]?.score ?? null;
  const allEqual = crits.length > 0 && minScore === maxScore;
  let lowest = null;
  let strongest = null;

  // Evita mostrar o mesmo critério como dificuldade e ponto forte.
  // Alto desempenho geral: não marca dificuldade; se tudo estiver igual, o forte é geral.
  // Baixo desempenho geral: não força ponto forte; se tudo estiver igual, a dificuldade é geral.
  if (crits.length) {
    if (allEqual) {
      if (avg !== null && avg >= 3.5) strongest = { short: 'Geral', score: avg };
      else if (avg !== null && avg < 2.5) lowest = { short: 'Geral', score: avg };
    } else {
      if (minScore <= 2.9 && !(avg !== null && avg >= 3.5)) lowest = sortedLow[0];
      if (maxScore >= 3.5 && !(avg !== null && avg < 2.5)) strongest = sortedHigh[0];
      if (lowest && strongest && lowest.key === strongest.key) {
        if (avg !== null && avg >= 3.0) lowest = null;
        else strongest = null;
      }
    }
  }
  const pauta = gerarPauta(ed, notas, avg, obs, views, wt);

  let notaRows = CRITERIOS.map(cr => {
    const score = notas[cr.key];
    const width = score ? Math.max(6, (score / 4) * 100) : 0;
    const color = score ? colorByScore(score) : 'var(--text-tertiary)';
    return `<div class="crit-row" style="grid-template-columns:105px 1fr 34px;">
      <div class="crit-label">${cr.short}</div>
      <div class="crit-track"><div class="crit-fill" style="width:${width}%;background:${color};"></div></div>
      <div class="crit-value" style="color:${color};">${score ? score.toFixed(1) : '–'}</div>
    </div>`;
  }).join('');

  return `<div class="pauta-detail-shell" id="pauta-${ed.id}">
    <div class="pauta-profile-card">
      <div class="pauta-profile-head">
        ${editorAvatarHTML(ed, ed.canal, 48, 16)}
        <div>
          <div class="pauta-profile-name">${ed.name}</div>
          <div class="pauta-profile-meta"><span style="color:${cc.color};font-weight:800;">${ed.canal}</span> · ${Object.keys(notas).length}/4 avaliações</div>
        </div>
      </div>
      <div class="pauta-score-ring" style="--pct:${pct}; color:${avgColor};"><span>${avg !== null ? avg.toFixed(1) : '–'}</span></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:8px;">${editorMedalsHTML(ed.id)} ${tierHTML(ed.id)}</div>
      ${adminMedalControlsHTML(ed.id)}
      <div class="pauta-compact-grid">
        <div class="pauta-mini-stat"><div class="pauta-mini-label">Views médias/sem</div><div class="pauta-mini-value">${views || '–'}</div></div>
        <div class="pauta-mini-stat"><div class="pauta-mini-label">Watchtime</div><div class="pauta-mini-value">${wt || '–'}</div></div>
        <div class="pauta-mini-stat"><div class="pauta-mini-label">Dificuldade</div><div class="pauta-mini-value" style="color:${lowest ? colorByScore(lowest.score) : 'var(--text-tertiary)'};">${lowest ? lowest.short : '–'}</div></div>
        <div class="pauta-mini-stat"><div class="pauta-mini-label">Ponto forte</div><div class="pauta-mini-value" style="color:${strongest ? colorByScore(strongest.score) : 'var(--text-tertiary)'};">${strongest ? strongest.short : '–'}</div></div>
      </div>
      <div class="pauta-section-label">Notas por critério</div>
      <div class="editor-diff-criterios">${notaRows}</div>
    </div>
    <div class="pauta-action-card">
      <div class="pauta-action-title">Plano de conversa</div>
      <div class="pauta-action-sub">Pauta resumida para não ficar poluída. Use como guia na call.</div>
      <div class="pauta-block ${avg !== null && avg < 2.5 ? 'danger' : avg >= 3.5 ? 'good' : 'warn'}">
        <div class="pauta-block-title">Abertura sugerida</div>
        <div class="pauta-block-text">Comece reconhecendo o contexto da semana e mostre a média geral. Depois foque em 1 ponto principal, não em tudo ao mesmo tempo.</div>
      </div>
      ${pauta.map((p,i) => `<div class="pauta-block ${i===0 ? 'warn' : ''}"><div class="pauta-block-title">Ponto ${String(i+1).padStart(2,'0')}</div><div class="pauta-block-text">${p}</div></div>`).join('')}
      <div class="pauta-block good">
        <div class="pauta-block-title">Fechamento</div>
        <div class="pauta-block-text">Definir uma ação clara para a próxima entrega e combinar como isso será checado no próximo feedback.</div>
      </div>
    </div>
  </div>`;
}

function clearPautaFocus() { state.focusPautaEditorId = null; state.selectedPautaEditorId = null; renderTab(state.activeTab); }
function setPautaFilter(filter) { state.pautaFilter = filter; renderTab(state.activeTab); }

function gerarPauta(ed, notas, avg, obs, views, wt) {
  const pauta = [];

  if (views || wt) {
    let perf = `<strong>Performance:</strong> `;
    if (views) perf += `Views médias/sem: <strong>${views}</strong>. `;
    if (wt) perf += `Watchtime: <strong>${wt}</strong>. `;
    pauta.push(perf);
  }

  const baixos = CRITERIOS.filter(cr => notas[cr.key] && notas[cr.key] <= 2);
  const altos = CRITERIOS.filter(cr => notas[cr.key] && notas[cr.key] >= 3.5);

  baixos.forEach(cr => {
    const n = notas[cr.key];
    let msg = `<strong>${cr.label} — nota ${n.toFixed(1)}:</strong> `;
    if (cr.key === 'ritmo') msg += `Pacing abaixo do esperado. Identificar onde o vídeo perde energia e calibrar cortes. Assistir junto a um vídeo de referência da casa.`;
    if (cr.key === 'sound') msg += `Sound design fraco. Revisar se SFX reforçam beats e se a música sustenta a energia nas transições.`;
    if (cr.key === 'vfx') msg += `VFX & Motion abaixo do padrão. Verificar poluição visual, timing de efeito e leitura pra Gen Alpha.`;
    if (cr.key === 'processo') msg += `Processo com falha — prazo, versionamento ou rodadas em excesso. Identificar o gargalo.`;
    pauta.push(msg);
  });

  if (altos.length > 0) {
    const nomes = altos.map(cr => cr.label).join(', ');
    pauta.push(`<strong>Pontos fortes:</strong> ${nomes}. Reconhecer e verificar se vira referência de treinamento pro time.`);
  }

  if (obs) {
    pauta.push(`<strong>Observação do supervisor:</strong> "${obs}"`);
  }

  if (pauta.length === 0) {
    pauta.push(`Semana dentro do padrão. Check-in rápido (10min) pra alinhar próximas entregas e ver se há bloqueio.`);
  }

  pauta.push(`<strong>Pergunta aberta:</strong> O que você precisaria pra melhorar a entrega na próxima semana? Tem algum bloqueio que eu posso destravar?`);

  return pauta;
}

    cr.label = label;
    cr.short = short;

  logChange('Nomes das avaliações alterados', 'Critérios atualizados pelo admin');

}
function renderLogs(el) {

    el.innerHTML = `<div class="card"><div class="empty-state">Apenas admin pode ver logs.</div></div>`;
    return;
  }
  let html = `<div class="section-header"><div class="section-header-left">

    <div class="section-sub">Últimas alterações feitas no sistema</div>
  </div><button class="btn-cancel" style="max-width:160px;" onclick="clearLogs()">Limpar logs</button></div>`;

// ─── CHAT E MENSAGEM FIXADA ──────────────────────────────────
function updatePinnedBar() {
  const bar = document.getElementById('pinned-message-bar');
  if (!bar) return;
  const msg = (state.pinnedMessage || '').trim();
  if (!msg || !state.currentUser) { bar.classList.remove('show'); bar.innerHTML = ''; return; }
  bar.classList.add('show');
  bar.innerHTML = `<div class="pinned-icon">📌</div><div class="pinned-content"><div class="pinned-title">Mensagem fixada da gestão</div><div class="pinned-text">${escapeHTML(msg)}</div></div>`;
}

function renderChat(el) {
  const msgs = state.chatMessages || [];
  let html = `<div class="section-header"><div class="section-header-left">
    <div class="section-title">Chat</div>
    <div class="section-sub">Mensagens internas do time</div>
  </div></div>
  <div class="chat-layout">
    <div class="chat-panel">
      <div class="chat-list" id="chat-list">`;

  if (!msgs.length) {
    html += `<div class="empty-state">Nenhuma mensagem ainda. Envie a primeira atualização para o time.</div>`;
  } else {
    html += msgs.map(m => {
      const date = new Date(m.at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      const isAdmin = m.role === 'admin';
      return `<div class="chat-message ${isAdmin ? 'admin' : ''}">
        <div class="chat-message-head">
          <div class="chat-author">${isAdmin ? '👑 ' : ''}${escapeHTML(m.user)}</div>
          <div class="alert-canal" style="background:${isAdmin ? 'var(--admin)20' : (canalCSS(m.canal)?.bg || 'var(--bg-grouped2)')};color:${isAdmin ? 'var(--admin)' : (canalCSS(m.canal)?.color || 'var(--text-secondary)')};">${escapeHTML(m.canal || 'Admin')}</div>
          <div class="chat-time">${date}</div>
          ${state.currentUser.role === 'admin' ? `<button class="btn-delete" onclick="deleteChatMessage('${m.id}')" title="Apagar">✕</button>` : ''}
        </div>
        <div class="chat-text">${escapeHTML(m.text)}</div>
      </div>`;
    }).join('');
  }

  html += `</div>
      <div class="chat-composer">
        <textarea class="chat-input" id="chat-input" placeholder="Escreva uma mensagem para o time..." onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendChatMessage();}"></textarea>
        <button class="btn-add" onclick="sendChatMessage()">Enviar</button>
      </div>
    </div>
    <div class="chat-side-card">
      <div class="chart-card-title">Mensagem fixada</div>
      <div class="chart-card-sub">Aparece no topo do sistema</div>
      <div class="chat-tip">${state.pinnedMessage ? escapeHTML(state.pinnedMessage) : 'Nenhuma mensagem fixada no momento.'}</div>
      ${state.currentUser.role === 'admin' ? `<button class="btn-add" style="margin-top:12px;width:100%;" onclick="openPinnedFromChat()">Editar mensagem fixada</button>` : ''}
      <div class="chat-tip">Dica: use o chat para avisos rápidos, alinhamentos de revisão, atrasos de decupagem e prioridades da semana.</div>
    </div>
  </div>`;
  el.innerHTML = html;
  setTimeout(() => { const list = document.getElementById('chat-list'); if (list) list.scrollTop = list.scrollHeight; }, 30);
}

function sendChatMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  const u = state.currentUser;
  state.chatMessages.push({ id: Date.now().toString(), at: new Date().toISOString(), user: u.name, role: u.role, canal: u.canal, text });
  saveChat();
  logChange('Mensagem enviada no chat', `${u.name}: ${text.slice(0, 80)}`);
  input.value = '';
  renderChat(document.getElementById('main-content'));
  showSaved();
}

function deleteChatMessage(id) {
  if (state.currentUser.role !== 'admin') return;
  state.chatMessages = state.chatMessages.filter(m => m.id !== id);
  saveChat();
  logChange('Mensagem apagada do chat', `ID ${id}`);
  renderTab(state.activeTab);
  showSaved();
}

function renderMensagemFixada(el) {
  if (state.currentUser.role !== 'admin') {
    el.innerHTML = `<div class="card"><div class="empty-state">Apenas admin pode editar a mensagem fixada.</div></div>`;
    return;
  }
  el.innerHTML = `<div class="section-header"><div class="section-header-left">
    <div class="section-title">Mensagem Fixada</div>
    <div class="section-sub">Mensagem que aparece no topo do sistema para todos os usuários</div>

function savePinnedMessage() {
  const input = document.getElementById('pinned-input');
  state.pinnedMessage = input ? input.value.trim() : '';

  logChange('Mensagem fixada alterada', state.pinnedMessage ? state.pinnedMessage.slice(0, 120) : 'Mensagem removida');

}

function clearPinnedMessage() {
  state.pinnedMessage = '';

  updatePinnedBar();
  logChange('Mensagem fixada removida', 'Admin limpou o aviso fixado');

function openPinnedFromChat() {
  state.activeTab = 'Mensagem Fixada';
  document.querySelectorAll('.nav-tab').forEach(x => x.classList.toggle('active', x.textContent === 'Mensagem Fixada'));
  renderTab('Mensagem Fixada');
}

        <th>Editor</th>
        ${CRITERIOS.map(cr => `<th>${cr.label}</th>`).join('')}

        <th>Views médias/sem</th>
        <th>Watchtime</th>
        <th>Observação</th>

          <div style="font-weight:500;">${ed.name}</div>
        </div></td>`;

      CRITERIOS.forEach(cr => {
        const v = state.notas[`${state.selectedWeek}|${ed.id}|${cr.key}`];

      html += `
        <td style="font-variant-numeric:tabular-nums;">${views}</td>

const DEFAULT_TEAMS_V19 = ['Falco','Phoenix','Astra'];
const DEFAULT_TEAM_COLORS_V19 = { Falco:'#ff9500', Phoenix:'#af52de', Astra:'#32ade6' };
const DEFAULT_TAGS_V19 = ['Longos','Shorts','Roblox','Minecraft','Treinamento','Teste'];

function ensureV19State() {
  if (!Array.isArray(state.teams)) {
    try { state.teams = JSON.parse(localStorage.getItem('prota_teams') || 'null') || DEFAULT_TEAMS_V19.slice(); }
    catch(e) { state.teams = DEFAULT_TEAMS_V19.slice(); }
  }
  DEFAULT_TEAMS_V19.forEach(t => { if (!state.teams.includes(t)) state.teams.push(t); });
  if (!Array.isArray(state.availableTags)) {
    try { state.availableTags = JSON.parse(localStorage.getItem('prota_available_tags') || 'null') || DEFAULT_TAGS_V19.slice(); }
    catch(e) { state.availableTags = DEFAULT_TAGS_V19.slice(); }
  }
}
ensureV19State();
function saveTeamsV19(){ ensureV19State(); localStorage.setItem('prota_teams', JSON.stringify(state.teams)); scheduleCloudSave(); }
function saveTagsV19(){ localStorage.setItem('prota_available_tags', JSON.stringify(state.availableTags || [])); scheduleCloudSave(); }
function getAllTeams(){ ensureV19State(); return state.teams.slice(); }
function getVisibleCanais(){ ensureV19State(); return state.currentUser && state.currentUser.role === 'admin' ? getAllTeams() : [state.currentUser.canal]; }
function canalCSS(canal) {
  ensureV19State();
  const color = state?.teamColors?.[canal] || DEFAULT_TEAM_COLORS_V19[canal] || '#0a84ff';

function personTagsHTML(person, editable=false, type='editor') {
  const tags = Array.isArray(person.tags) ? person.tags : [];

  return `<div class="tag-row">${tags.map(tag => `<span class="person-tag primary">${escapeHTML(tag)}${editable ? ` <button onclick="removePersonTag('${type}','${person.id}','${escapeAttr(tag)}')">×</button>` : ''}</span>`).join('')}</div>`;

function addPersonTag(type, id) {
  const input = document.getElementById(`tag-input-${type}-${id}`);

  person.tags = Array.from(new Set([...(person.tags || []), tag]));

function renderTeamColorSystem() {
  if (state.currentUser.role !== 'admin') return '';
  ensureV19State();
  let html = `<div class="card"><div class="chart-card-title">Times e cores</div><div class="chart-card-sub">Adicione novos times e configure as cores que aparecem no sistema.</div><div class="team-manage-grid">`;
  getAllTeams().forEach(canal=>{ const value=state.teamColors[canal] || DEFAULT_TEAM_COLORS_V19[canal] || '#0a84ff'; const isDefault=DEFAULT_TEAMS_V19.includes(canal);
    html += `<div class="team-manage-card"><div class="team-manage-head"><div class="team-dot-large" style="background:${value};"></div><div style="font-weight:900;flex:1;">${escapeHTML(canal)}</div><input class="team-color-input" type="color" value="${value}" onchange="setTeamColor('${escapeAttr(canal)}', this.value)"></div>${!isDefault ? `<button class="btn-card-action danger" onclick="removeTeamV19('${escapeAttr(canal)}')">Remover time</button>` : `<div class="chart-card-sub">Time padrão do sistema</div>`}</div>`;

function addTeamV19(){ const name=(document.getElementById('new-team-name')?.value||'').trim(); const color=document.getElementById('new-team-color')?.value || '#0a84ff'; if(!name) return; ensureV19State(); if(state.teams.includes(name)){ alert('Esse time já existe.'); return; } state.teams.push(name); state.teamColors[name]=color; saveTeamsV19(); saveTeamColors(); logChange('Time adicionado', `${name} · ${color}`); renderTab(state.activeTab); showSaved(); }
function removeTeamV19(canal){ ensureV19State(); if(DEFAULT_TEAMS_V19.includes(canal)) return; const used=(state.editors||[]).some(e=>e.canal===canal)||(state.decupadores||[]).some(d=>d.canal===canal); if(used){ alert('Esse time ainda tem editores/decupadores cadastrados. Remova ou mova as pessoas antes.'); return; } if(!confirm(`Remover time ${canal}?`)) return; state.teams=state.teams.filter(t=>t!==canal); delete state.teamColors[canal]; saveTeamsV19(); saveTeamColors(); logChange('Time removido', canal); renderTab(state.activeTab); showSaved(); }

  if (state.currentUser.role !== 'admin') { el.innerHTML = `<div class="card"><div class="empty-state">Apenas admin pode acessar configurações.</div></div>`; return; }
  let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">Configurações</div><div class="section-sub">Times, tags, critérios e banco de dados</div></div></div>`;

  html += renderDatabaseSystem();

}
function addAvailableTagV19(){ const v=(document.getElementById('new-global-tag')?.value||'').trim(); if(!v) return; ensureV19State(); if(!state.availableTags.includes(v)) state.availableTags.push(v); saveTagsV19(); logChange('Tag padrão adicionada', v); renderTab(state.activeTab); showSaved(); }
function removeAvailableTagV19(tag){ state.availableTags=(state.availableTags||[]).filter(t=>t!==tag); saveTagsV19(); logChange('Tag padrão removida', tag); renderTab(state.activeTab); showSaved(); }

function collectCloudData() {
  return { editors: state.editors || [], decupadores: state.decupadores || [], notas: state.notas || {}, teamColors: state.teamColors || {}, teams: state.teams || DEFAULT_TEAMS_V19.slice(), availableTags: state.availableTags || DEFAULT_TAGS_V19.slice(), evalLabels: state.evalLabels || {}, logs: (state.logs || []).slice(0,200), chatMessages: (state.chatMessages || []).slice(-300), pinnedMessage: state.pinnedMessage || '', editorMedals: state.editorMedals || {} };
}
function applyCloudData(data) {
  if (!data || typeof data !== 'object') return;
  state.editors = data.editors || state.editors || [];
  state.decupadores = data.decupadores || state.decupadores || [];
  state.notas = data.notas || state.notas || {};
  state.teamColors = data.teamColors || state.teamColors || {};
  state.teams = data.teams || state.teams || DEFAULT_TEAMS_V19.slice();
  state.availableTags = data.availableTags || state.availableTags || DEFAULT_TAGS_V19.slice();
  state.evalLabels = data.evalLabels || state.evalLabels || {};
  state.logs = data.logs || state.logs || [];
  state.chatMessages = data.chatMessages || state.chatMessages || [];
  state.pinnedMessage = data.pinnedMessage || '';
  state.editorMedals = data.editorMedals || state.editorMedals || {};
  localStorage.setItem('prota_editors', JSON.stringify(state.editors));
  localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores || []));
  localStorage.setItem('prota_notas', JSON.stringify(state.notas));
  localStorage.setItem('prota_team_colors', JSON.stringify(state.teamColors));
  localStorage.setItem('prota_teams', JSON.stringify(state.teams));
  localStorage.setItem('prota_available_tags', JSON.stringify(state.availableTags));
  localStorage.setItem('prota_eval_labels', JSON.stringify(state.evalLabels));
  localStorage.setItem('prota_logs', JSON.stringify(state.logs.slice(0, 200)));
  localStorage.setItem('prota_chat_messages', JSON.stringify(state.chatMessages.slice(-300)));
  localStorage.setItem('prota_pinned_message', state.pinnedMessage || '');
  localStorage.setItem('prota_editor_medals', JSON.stringify(state.editorMedals || {}));
  applyCriterionLabels(); ensureV19State();
}

</script>

.v21-panel { background:var(--bg-elevated); border:1px solid var(--separator-soft); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:var(--shadow-sm); }

.v21-bar-row { display:grid; grid-template-columns: 110px 1fr 46px; gap:12px; align-items:center; }
.v21-bar-label { font-size:13px; font-weight:800; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.v21-bar-track { height:30px; border-radius:999px; background:var(--bg-grouped2); overflow:hidden; position:relative; }
.v21-bar-fill { height:100%; min-width:6px; border-radius:999px; transition:.25s ease; box-shadow: inset 0 -10px 20px rgba(0,0,0,.12); }
.v21-bar-value { font-weight:900; font-size:14px; text-align:right; font-variant-numeric:tabular-nums; }
.v21-list { display:flex; flex-direction:column; gap:9px; }
.v21-row { display:flex; align-items:center; gap:10px; background:var(--bg-grouped2); border:1px solid var(--separator-soft); border-radius:14px; padding:10px; }
.v21-avatar { width:34px; height:34px; border-radius:999px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:12px; flex:0 0 auto; overflow:hidden; background:var(--blue); }
.v21-avatar img { width:100%; height:100%; object-fit:cover; }
.v21-name { flex:1; min-width:0; font-weight:800; font-size:14px; }
.v21-meta { color:var(--text-secondary); font-size:11px; margin-top:2px; font-weight:600; }
.v21-badge { padding:4px 9px; border-radius:999px; font-size:11px; font-weight:900; white-space:nowrap; }
.v21-empty { color:var(--text-secondary); background:var(--bg-grouped2); border:1px dashed var(--separator); border-radius:14px; padding:18px; text-align:center; font-size:13px; }
.v21-ops-grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
.v21-person { background:var(--bg-elevated); border:1px solid var(--separator-soft); border-left:5px solid var(--team-color,var(--blue)); border-radius:18px; padding:14px; box-shadow:var(--shadow-sm); }
.v21-person.late { box-shadow:0 0 0 1px rgba(255,69,58,.22), 0 10px 24px rgba(255,69,58,.10); }
.v21-person-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.v21-toggle { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
.v21-toggle button { border:0; border-radius:12px; padding:10px; cursor:pointer; background:var(--bg-grouped2); color:var(--text-secondary); font-family:inherit; font-weight:900; }
.v21-toggle .ok { background:rgba(48,209,88,.18); color:var(--green); }
.v21-toggle .late { background:rgba(255,69,58,.18); color:var(--red); }
.v21-reason { width:100%; background:var(--bg-grouped2); border:1px solid var(--separator-soft); border-radius:12px; padding:11px 12px; color:var(--text); font-family:inherit; outline:none; }
.v21-tagline { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
.v21-tag { background:var(--separator-soft); color:var(--text-secondary); border-radius:999px; padding:3px 8px; font-size:10px; font-weight:800; }
</style>
<script>
// V21: robust Dashboard/Operação render, replacing the broken/blank views.
(function(){
  function esc(v){ return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
  function teams(){
    const set = new Set();
    if (Array.isArray(state?.teams)) state.teams.forEach(t=>set.add(t));
    ['Falco','Phoenix','Astra'].forEach(t=>set.add(t));
    (state?.editors||[]).forEach(p=>p.canal&&set.add(p.canal));
    (state?.decupadores||[]).forEach(p=>p.canal&&set.add(p.canal));
    return [...set];
  }
  function visibleTeams(){ return state?.currentUser?.role === 'admin' ? teams() : [state?.currentUser?.canal].filter(Boolean); }
  function color(team){
    try { if (typeof canalCSS === 'function') return canalCSS(team).color; } catch(e){}
    return state?.teamColors?.[team] || {Falco:'#ff9500',Phoenix:'#af52de',Astra:'#32ade6'}[team] || '#0a84ff';
  }
  function bgColor(team){
    const c = color(team);
    if (String(c).startsWith('#') && typeof hexToRgba === 'function') return hexToRgba(c,.16);
    return String(c)+'22';
  }
  function initials(name){ return String(name||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase() || '?'; }
  function avatar(p){
    const c = color(p.canal);
    const img = p.photo ? `<img src="${esc(p.photo)}" alt="">` : initials(p.name);
    return `<div class="v21-avatar" style="background:${c};">${img}</div>`;
  }
  function week(){ try { return getCurrentWeek(); } catch(e){ return 'atual'; } }
  function qtr(){ try { return state.selectedQuarter || getCurrentQuarter(); } catch(e){ return {year:new Date().getFullYear(), quarter:Math.floor(new Date().getMonth()/3)+1}; } }
  function qLabel(q){ try { return quarterLabel(q); } catch(e){ return `Q${q.quarter} ${q.year}`; } }
  function wLabel(w){ try { return weekLabelLong(w); } catch(e){ return 'semana atual'; } }
  function avgEditor(id,q){ try { return calcAvgInQuarter(id,q); } catch(e){ return null; } }
  function avgDecup(id,q){ try { return calcAvgDecupInQuarter(id,q); } catch(e){ return null; } }
  function avgColor(v){ try { return colorByScore(v); } catch(e){ return v===null?'var(--text-secondary)': v<2.5?'var(--red)':v<3.5?'var(--orange)':'var(--green)'; } }
  function notaKeysFor(person, type){
    const criteria = type==='decupador' ? (window.CRITERIOS_DECUPAGEM || CRITERIOS_DECUPAGEM || []) : (window.CRITERIOS || CRITERIOS || []);
    const weeks = (()=>{ try { return getWeeksInQuarter(qtr()); } catch(e){ return [week()]; } })();
    let sum=0,count=0;
    weeks.forEach(w=>criteria.forEach(cr=>{ const v=state.notas?.[`${w}|${person.id}|${cr.key}`]; if(v){ sum += parseFloat(v); count++; } }));
    return count ? sum/count : null;
  }
  function getAvg(p,type){ const q=qtr(); const v = type==='decupador' ? avgDecup(p.id,q) : avgEditor(p.id,q); return v ?? notaKeysFor(p,type); }
  function viewsFor(p){
    try { if (typeof calcViewsInQuarter === 'function') return calcViewsInQuarter(p.id,qtr()) || 0; } catch(e){}
    let total=0; Object.entries(state.notas||{}).forEach(([k,v])=>{ if(k.includes(`|${p.id}|views24`)) total += parseInt(String(v).replace(/\D/g,''))||0; }); return total;
  }
  function isLate(p,type){ const w=week(); const key=type==='decupador'?'atrasou':'atrasouEditor'; return state.notas?.[`${w}|${p.id}|${key}`] === 'sim'; }
  function setLate(p,type,val){
    const w=week(); const key=type==='decupador'?'atrasou':'atrasouEditor';
    state.notas = state.notas || {}; state.notas[`${w}|${p.id}|${key}`] = val ? 'sim' : 'nao';
    try { saveNotas(); } catch(e){ localStorage.setItem('prota_notas', JSON.stringify(state.notas)); }
    try { logChange(val?'Atraso marcado':'Atraso removido', `${p.name} · ${type}`); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  function saveReason(p,type,value){
    const w=week(); const key=type==='decupador'?'motivoAtrasoDecup':'motivoAtrasoEditor';
    state.notas = state.notas || {}; if(value.trim()) state.notas[`${w}|${p.id}|${key}`]=value.trim(); else delete state.notas[`${w}|${p.id}|${key}`];
    try { saveNotas(); } catch(e){ localStorage.setItem('prota_notas', JSON.stringify(state.notas)); }
    try { showSaved(); } catch(e){}
  }
  window.__v21SetLate = setLate;
  window.__v21SaveReason = saveReason;

  window.renderDashboard = function(el){
    try {
      const q=qtr(), allTeams=visibleTeams();
      const editors=(state.editors||[]).filter(p=>allTeams.includes(p.canal));
      const decups=(state.decupadores||[]).filter(p=>allTeams.includes(p.canal));
      const people=[...editors.map(p=>({...p,type:'editor'})), ...decups.map(p=>({...p,type:'decupador'}))];
      const evaluated=people.filter(p=>getAvg(p,p.type)!==null).length;
      const alertas=people.filter(p=>{ const a=getAvg(p,p.type); return a!==null && a<2.5; }).length;
      const destaques=people.filter(p=>{ const a=getAvg(p,p.type); return a!==null && a>=3.5; }).length;
      const lateEditors=editors.filter(p=>isLate(p,'editor')).length;
      const lateDecups=decups.filter(p=>isLate(p,'decupador')).length;
      const teamAvgRows=allTeams.map(t=>{
        const ps=people.filter(p=>p.canal===t); const avgs=ps.map(p=>getAvg(p,p.type)).filter(v=>v!==null); const avg=avgs.length?avgs.reduce((a,b)=>a+b,0)/avgs.length:null; return {team:t, avg, count:ps.length};
      });
      const topViews=[...editors].map(p=>({...p,totalViews:viewsFor(p)})).filter(p=>p.totalViews>0).sort((a,b)=>b.totalViews-a.totalViews).slice(0,5);
      const worst=people.map(p=>({...p,avg:getAvg(p,p.type)})).filter(p=>p.avg!==null).sort((a,b)=>a.avg-b.avg).slice(0,6);
      const best=people.map(p=>({...p,avg:getAvg(p,p.type)})).filter(p=>p.avg!==null).sort((a,b)=>b.avg-a.avg).slice(0,6);
      let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">Dashboard</div><div class="section-sub">${esc(qLabel(q))}</div></div>${typeof renderQuarterSelector==='function'?renderQuarterSelector():''}</div>`;
      html += `<div class="v21-grid"><div class="v21-card"><div class="v21-kicker">Editores</div><div class="v21-number">${editors.length}</div><div class="v21-sub">pessoas cadastradas nos times visíveis</div></div><div class="v21-card"><div class="v21-kicker">Decupadores</div><div class="v21-number">${decups.length}</div><div class="v21-sub">cadastro separado da edição</div></div><div class="v21-card"><div class="v21-kicker">Avaliados</div><div class="v21-number">${evaluated}</div><div class="v21-sub">com nota no trimestre atual</div></div><div class="v21-card"><div class="v21-kicker">Atrasos</div><div class="v21-number" style="color:${lateEditors+lateDecups?'var(--red)':'var(--green)'}">${lateEditors+lateDecups}</div><div class="v21-sub">${lateEditors} editor(es) · ${lateDecups} decupador(es)</div></div><div class="v21-card"><div class="v21-kicker">Em alerta</div><div class="v21-number" style="color:var(--red)">${alertas}</div><div class="v21-sub">média abaixo de 2.5</div></div><div class="v21-card"><div class="v21-kicker">Destaques</div><div class="v21-number" style="color:var(--green)">${destaques}</div><div class="v21-sub">média 3.5 ou maior</div></div></div>`;
      html += `<div class="v21-panel"><div class="chart-card-title">Média por Time</div><div class="chart-card-sub">As barras usam as cores configuradas em Configurações → Times e cores.</div><div class="v21-bars">`;
      if(!teamAvgRows.some(r=>r.count)) html += `<div class="v21-empty">Nenhum editor ou decupador cadastrado ainda.</div>`;
      teamAvgRows.forEach(r=>{ const pct = r.avg===null?0:Math.max(4,Math.min(100,(r.avg/4)*100)); html += `<div class="v21-bar-row"><div class="v21-bar-label">${esc(r.team)}</div><div class="v21-bar-track"><div class="v21-bar-fill" style="width:${pct}%;background:${color(r.team)}"></div></div><div class="v21-bar-value" style="color:${r.avg===null?'var(--text-secondary)':color(r.team)}">${r.avg===null?'–':r.avg.toFixed(1)}</div></div>`; });
      html += `</div></div>`;
      function list(title, arr, empty){ let out=`<div class="v21-panel"><div class="chart-card-title">${title}</div><div class="v21-list">`; if(!arr.length) out+=`<div class="v21-empty">${empty}</div>`; arr.forEach((p,i)=>{ out+=`<div class="v21-row"><div style="font-weight:900;color:var(--text-tertiary);width:28px;">#${i+1}</div>${avatar(p)}<div class="v21-name">${esc(p.name)}<div class="v21-meta">${esc(p.canal)} · ${p.type==='decupador'?'Decupador':'Editor'}</div></div><div class="v21-badge" style="background:${bgColor(p.canal)};color:${color(p.canal)}">${p.avg!==undefined?p.avg.toFixed(1):(p.totalViews||0).toLocaleString('pt-BR')}</div></div>`; }); return out+`</div></div>`; }
      html += `<div class="dash-grid">${list('Top desempenho', best, 'Sem avaliações no trimestre.')}${list('Precisa de atenção', worst, 'Nenhum alerta por nota.')}</div>`;
      html += `<div class="dash-grid">${list('Top editores por views', topViews.map(p=>({...p,type:'editor'})), 'Sem dados de views 24h.')}`;
      html += `<div class="v21-panel"><div class="chart-card-title">Resumo operacional</div><div class="v21-list"><div class="v21-row"><div class="v21-name">Editores com atraso<div class="v21-meta">Semana atual · ${esc(wLabel(week()))}</div></div><div class="v21-badge" style="background:rgba(255,69,58,.16);color:var(--red)">${lateEditors}</div></div><div class="v21-row"><div class="v21-name">Decupadores com atraso<div class="v21-meta">Semana atual · ${esc(wLabel(week()))}</div></div><div class="v21-badge" style="background:rgba(255,69,58,.16);color:var(--red)">${lateDecups}</div></div></div></div></div>`;
      el.innerHTML = html;
    } catch(err) {
      console.error('Dashboard v21 error', err);
      el.innerHTML = `<div class="section-header"><div class="section-header-left"><div class="section-title">Dashboard</div><div class="section-sub">Erro ao carregar</div></div></div><div class="v21-panel"><div class="v21-empty">O Dashboard encontrou um erro de dados, mas o sistema continua funcionando. Detalhe: ${esc(err.message)}</div></div>`;
    }
  };

  window.renderOperacao = function(el){
    try {
      const w=week(), allTeams=visibleTeams();
      const editors=(state.editors||[]).filter(p=>allTeams.includes(p.canal));
      const decups=(state.decupadores||[]).filter(p=>allTeams.includes(p.canal));
      const lateEditors=editors.filter(p=>isLate(p,'editor')).length;
      const lateDecups=decups.filter(p=>isLate(p,'decupador')).length;
      let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">Operação</div><div class="section-sub">Marque manualmente quem atrasou ou ficou no prazo · ${esc(wLabel(w))}</div></div></div>`;
      html += `<div class="v21-grid"><div class="v21-card"><div class="v21-kicker">Atrasos editores</div><div class="v21-number" style="color:${lateEditors?'var(--red)':'var(--green)'}">${lateEditors}</div><div class="v21-sub">semana atual</div></div><div class="v21-card"><div class="v21-kicker">Atrasos decupadores</div><div class="v21-number" style="color:${lateDecups?'var(--red)':'var(--green)'}">${lateDecups}</div><div class="v21-sub">semana atual</div></div><div class="v21-card"><div class="v21-kicker">Pessoas monitoradas</div><div class="v21-number">${editors.length+decups.length}</div><div class="v21-sub">editores + decupadores</div></div></div>`;
      function section(title, arr, type){
        let out=`<div class="v21-section"><div class="v21-section-title">${title}</div><div class="canal-section-count">${arr.length}</div></div>`;
        if(!arr.length) return out+`<div class="v21-empty">Nenhum ${title.toLowerCase()} cadastrado para os times visíveis.</div>`;
        out += `<div class="v21-ops-grid">`;
        arr.forEach(p=>{ const late=isLate(p,type); const reasonKey=type==='decupador'?'motivoAtrasoDecup':'motivoAtrasoEditor'; const reason=state.notas?.[`${w}|${p.id}|${reasonKey}`]||''; const tags=Array.isArray(p.tags)?p.tags:[]; out += `<div class="v21-person ${late?'late':''}" style="--team-color:${color(p.canal)}"><div class="v21-person-head">${avatar(p)}<div class="v21-name">${esc(p.name)}<div class="v21-meta">${esc(p.canal)} · ${type==='decupador'?'Decupador':'Editor'}</div>${tags.length?`<div class="v21-tagline">${tags.map(t=>`<span class="v21-tag">${esc(t)}</span>`).join('')}</div>`:''}</div><div class="v21-badge" style="background:${late?'rgba(255,69,58,.16)':'rgba(48,209,88,.16)'};color:${late?'var(--red)':'var(--green)'}">${late?'Atrasou':'No prazo'}</div></div><div class="v21-toggle"><button class="${!late?'ok':''}" onclick="__v21SetLate(${JSON.stringify(p).replace(/"/g,'&quot;')},'${type}',false)">No prazo</button><button class="${late?'late':''}" onclick="__v21SetLate(${JSON.stringify(p).replace(/"/g,'&quot;')},'${type}',true)">Atrasou ⚠️</button></div><input class="v21-reason" placeholder="Motivo do atraso / bloqueio" value="${esc(reason)}" onchange="__v21SaveReason(${JSON.stringify(p).replace(/"/g,'&quot;')},'${type}',this.value)"></div>`; });
        return out+`</div>`;
      }
      html += section('Editores', editors, 'editor');
      html += section('Decupadores', decups, 'decupador');
      el.innerHTML = html;
    } catch(err) {
      console.error('Operação v21 error', err);
      el.innerHTML = `<div class="section-header"><div class="section-header-left"><div class="section-title">Operação</div><div class="section-sub">Erro ao carregar</div></div></div><div class="v21-panel"><div class="v21-empty">A aba Operação encontrou um erro. Detalhe: ${esc(err.message)}</div></div>`;
    }
  };
})();
</script>


<script>
/* V22 PATCH — corrige Cadastro > Decupadores e Histórico vazios/pretos */
(function(){
  function esc(v){ return String(v ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
  function attr(v){ return esc(v).replace(/'/g,'&#39;'); }
  function getTeamsSafe(){
    try { if (typeof getTeamNames === 'function') return getTeamNames(); } catch(e){}
    const set = new Set(['Falco','Phoenix','Astra']);
    try { (state.editors||[]).forEach(p=>p.canal&&set.add(p.canal)); (state.decupadores||[]).forEach(p=>p.canal&&set.add(p.canal)); } catch(e){}
    return [...set];
  }
  function visibleTeamsSafe(){
    try { if (state.currentUser?.role === 'admin') return getTeamsSafe(); return [state.currentUser?.canal].filter(Boolean); } catch(e){ return getTeamsSafe(); }
  }
  function colorSafe(team){
    try { if (typeof getTeamColor === 'function') return getTeamColor(team); } catch(e){}
    try { const c = canalCSS(team); if(c?.color) return c.color; } catch(e){}
    return 'var(--blue)';
  }
  function bgSafe(team){
    try { if (typeof getTeamBg === 'function') return getTeamBg(team); } catch(e){}
    return colorSafe(team) + '20';
  }
  function avatarSafe(p){
    const src = p?.photo || p?.foto || p?.image || '';
    if(src) return `<div class="editor-avatar" style="background:${colorSafe(p.canal)};background-image:url('${attr(src)}');background-size:cover;background-position:center;"></div>`;
    let initials='?';
    try { initials = typeof avatarFor==='function' ? avatarFor(p.name||'') : String(p.name||'?').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); } catch(e){}
    return `<div class="editor-avatar" style="background:${colorSafe(p.canal)};">${esc(initials)}</div>`;
  }
  function weekSafe(){ try { return getCurrentWeek(); } catch(e){ return new Date().getFullYear()+'-W01'; } }
  function weekLabelSafe(w){ try { return weekLabelLong(w); } catch(e){ return w; } }
  function qtrSafe(){ try { return state.selectedQuarter || getCurrentQuarter(); } catch(e){ return {year:new Date().getFullYear(), quarter:Math.floor(new Date().getMonth()/3)+1}; } }
  function weeksSafe(q){ try { return getWeeksInQuarter(q).reverse(); } catch(e){ return [weekSafe()]; } }
  function criterioDecup(){ return (window.CRITERIOS_DECUPAGEM || (typeof CRITERIOS_DECUPAGEM!=='undefined'?CRITERIOS_DECUPAGEM:null) || [
    {key:'qualidade',label:'Qualidade de corte',short:'Qualidade'},
    {key:'organizacao',label:'Organização',short:'Organização'},
    {key:'timing',label:'Timing',short:'Timing'},
    {key:'clareza',label:'Clareza',short:'Clareza'}
  ]); }
  function criterioEditor(){ return (typeof CRITERIOS !== 'undefined' ? CRITERIOS : [
    {key:'ritmo',label:'Ritmo & Retenção',short:'Ritmo'},
    {key:'sound',label:'Sound Design',short:'Sound'},
    {key:'vfx',label:'VFX & Motion',short:'VFX'},
    {key:'processo',label:'Processo',short:'Processo'}
  ]); }
  function avgPessoa(id, week, type){
    const criteria = type==='decupador' ? criterioDecup() : criterioEditor();
    let sum=0,count=0;
    criteria.forEach(cr=>{ const v=state.notas?.[`${week}|${id}|${type==='decupador'?'decup_':''}${cr.key}`] ?? state.notas?.[`${week}|${id}|${cr.key}`]; if(v){ sum += parseFloat(v)||0; count++; } });
    return count ? sum/count : null;
  }
  function badgeNota(v){
    if(v===null) return `<span style="color:var(--text-tertiary);">–</span>`;
    const cls = typeof heatClass==='function' ? heatClass(v) : '';
    const color = typeof colorByScore==='function' ? colorByScore(v) : 'var(--blue)';
    return `<span class="nota-badge ${cls}" style="background:${cls?'':color};">${Number(v).toFixed(1)}</span>`;
  }
  function saveDecupNameV22(id){
    const input = document.getElementById('v22-decup-name-'+id); if(!input) return;
    const p=(state.decupadores||[]).find(x=>x.id===id); if(!p) return;
    const old=p.name; p.name=input.value.trim() || p.name;
    try { saveDecupadores(); } catch(e){ localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores||[])); }
    try { logChange('Nome do decupador editado', `${old} → ${p.name}`); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  function saveDecupPhotoV22(id){
    const input = document.getElementById('v22-decup-photo-'+id); if(!input) return;
    const p=(state.decupadores||[]).find(x=>x.id===id); if(!p) return;
    p.photo = input.value.trim();
    try { saveDecupadores(); } catch(e){ localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores||[])); }
    try { logChange('Foto do decupador editada', p.name); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  function saveDecupTagsV22(id){
    const input = document.getElementById('v22-decup-tags-'+id); if(!input) return;
    const p=(state.decupadores||[]).find(x=>x.id===id); if(!p) return;
    p.tags = input.value.split(',').map(x=>x.trim()).filter(Boolean);
    try { saveDecupadores(); } catch(e){ localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores||[])); }
    try { logChange('Tags do decupador editadas', p.name); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  function addDecupV22(team){
    const input=document.getElementById('v22-new-decup-'+team); if(!input) return;
    const name=input.value.trim(); if(!name) return;
    state.decupadores = state.decupadores || [];
    state.decupadores.push({id:'d'+Date.now(), name, canal:team, tags:[], photo:''});
    try { saveDecupadores(); } catch(e){ localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores)); }
    try { logChange('Decupador adicionado', `${name} · ${team}`); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  function deleteDecupV22(id){
    const p=(state.decupadores||[]).find(x=>x.id===id); if(!p) return;
    if(!confirm(`Remover decupador "${p.name}"?`)) return;
    state.decupadores = (state.decupadores||[]).filter(x=>x.id!==id);
    try { saveDecupadores(); } catch(e){ localStorage.setItem('prota_decupadores', JSON.stringify(state.decupadores)); }
    try { logChange('Decupador removido', p.name); } catch(e){}
    try { showSaved(); } catch(e){}
    renderTab(state.activeTab);
  }
  window.v22AddDecup = addDecupV22;
  window.v22SaveDecupName = saveDecupNameV22;
  window.v22SaveDecupPhoto = saveDecupPhotoV22;
  window.v22SaveDecupTags = saveDecupTagsV22;
  window.v22DeleteDecup = deleteDecupV22;

  window.renderDecupadores = function(el, embedded=false){
    try {
      const u=state.currentUser || {}; const teams=visibleTeamsSafe();
      let html = embedded ? '' : `<div class="section-header"><div class="section-header-left"><div class="section-title">Decupadores</div><div class="section-sub">Cadastro separado dos editores</div></div></div>`;
      teams.forEach(team=>{
        const people=(state.decupadores||[]).filter(p=>p.canal===team);
        const canManage = u.role==='admin' || u.canal===team;
        html += `<div class="canal-section-header"><div class="canal-dot" style="background:${colorSafe(team)};"></div><div class="canal-section-title" style="color:${colorSafe(team)};">Time ${esc(team)}</div><div class="canal-section-count">${people.length} decupador${people.length!==1?'es':''}</div></div>`;
        html += `<div class="v21-panel">`;
        if(canManage){
          html += `<div class="add-editor-row"><input class="field" id="v22-new-decup-${attr(team)}" placeholder="Nome do novo decupador" onkeydown="if(event.key==='Enter') v22AddDecup('${attr(team)}')"><button class="btn-add" onclick="v22AddDecup('${attr(team)}')">+ Adicionar</button></div>`;
        }
        if(!people.length){ html += `<div class="v21-empty">Nenhum decupador cadastrado neste time.</div>`; }
        else {
          html += `<div class="editor-grid" style="grid-template-columns:repeat(auto-fill,minmax(320px,1fr));">`;
          people.forEach(p=>{
            const tags=Array.isArray(p.tags)?p.tags:[];
            html += `<div class="editor-card" style="align-items:flex-start;border:1px solid var(--separator-soft);background:var(--bg-grouped2);"><div style="margin-top:2px;">${avatarSafe(p)}</div><div class="editor-info"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;"><div class="editor-name">${esc(p.name)}</div><span class="alert-canal" style="background:${bgSafe(team)};color:${colorSafe(team)};">${esc(team)}</span></div>${canManage?`<div style="display:grid;gap:8px;"><input class="field" id="v22-decup-name-${attr(p.id)}" value="${attr(p.name)}" placeholder="Nome"><input class="field" id="v22-decup-photo-${attr(p.id)}" value="${attr(p.photo||'')}" placeholder="URL da foto"><input class="field" id="v22-decup-tags-${attr(p.id)}" value="${attr(tags.join(', '))}" placeholder="Tags: Longos, Shorts, Roblox"><div style="display:flex;gap:8px;flex-wrap:wrap;"><button class="btn-add" onclick="v22SaveDecupName('${attr(p.id)}');v22SaveDecupPhoto('${attr(p.id)}');v22SaveDecupTags('${attr(p.id)}')">Salvar</button><button class="btn-cancel" style="padding:10px 14px;" onclick="v22DeleteDecup('${attr(p.id)}')">Remover</button></div></div>`:`<div class="editor-meta">${tags.length?tags.join(' · '):'Sem tags'}</div>`}</div></div>`;
          });
          html += `</div>`;
        }
        html += `</div>`;
      });
      el.innerHTML = html;
    } catch(err){
      console.error('Decupadores v22 error', err);
      el.innerHTML = `<div class="section-header"><div class="section-header-left"><div class="section-title">Decupadores</div><div class="section-sub">Erro ao carregar</div></div></div><div class="v21-panel"><div class="v21-empty">Erro ao carregar cadastro de decupadores: ${esc(err.message)}</div></div>`;
    }
  };

  window.renderHistorico = function(el){
    try {
      const q=qtrSafe(); const weeks=weeksSafe(q); if(!state.selectedWeek || !weeks.includes(state.selectedWeek)) state.selectedWeek=weeks[0] || weekSafe();
      const w=state.selectedWeek; const teams=visibleTeamsSafe();
      let html = `<div class="section-header"><div class="section-header-left"><div class="section-title">Histórico</div><div class="section-sub">Avaliações salvas por semana</div></div>${typeof renderQuarterSelector==='function'?renderQuarterSelector():''}</div>`;
      html += `<div class="week-select-row"><select class="week-select" onchange="state.selectedWeek=this.value;renderTab(state.activeTab)">${weeks.map(x=>`<option value="${attr(x)}" ${x===w?'selected':''}>${esc(weekLabelSafe(x))}</option>`).join('')}</select></div>`;
      const block=(title,type,criteria,people)=>{
        let out=`<div class="v21-section"><div class="v21-section-title">${esc(title)}</div><div class="canal-section-count">${people.length}</div></div>`;
        if(!people.length) return out+`<div class="v21-panel"><div class="v21-empty">Nenhum ${esc(title.toLowerCase())} cadastrado para os times visíveis.</div></div>`;
        out += `<div class="v21-panel"><div class="table-wrap"><table class="notas-table"><thead><tr><th>Nome</th>${criteria.map(c=>`<th>${esc(c.label)}</th>`).join('')}<th>Média</th><th>Views médias/sem</th><th>Watchtime</th><th>Atrasou</th><th>Motivo</th></tr></thead><tbody>`;
        people.forEach(p=>{
          const avg=avgPessoa(p.id,w,type); const prefix=type==='decupador'?'decup_':''; const atrasoKey=type==='decupador'?'atrasou':'atrasouEditor'; const motivoKey=type==='decupador'?'motivoAtrasoDecup':'motivoAtrasoEditor';
          out += `<tr><td><div style="display:flex;align-items:center;gap:10px;">${avatarSafe(p)}<div><div style="font-weight:700;">${esc(p.name)}</div><div style="font-size:12px;color:${colorSafe(p.canal)};font-weight:700;">${esc(p.canal)} · ${type==='decupador'?'Decupador':'Editor'}</div></div></div></td>`;
          criteria.forEach(c=>{ const v=state.notas?.[`${w}|${p.id}|${prefix}${c.key}`] ?? state.notas?.[`${w}|${p.id}|${c.key}`]; out += `<td>${v?badgeNota(parseFloat(v)):badgeNota(null)}</td>`; });
          out += `<td style="font-weight:800;color:${avg===null?'var(--text-tertiary)':(avg<2.5?'var(--red)':avg<3.5?'var(--orange)':'var(--green)')};">${avg===null?'–':avg.toFixed(2)}</td>`;
          out += `<td>${esc(state.notas?.[`${w}|${p.id}|views24`]||'–')}</td><td>${esc(state.notas?.[`${w}|${p.id}|watchtime`]||state.notas?.[`${w}|${p.id}|watchtimeSeconds`]||'–')}</td><td>${state.notas?.[`${w}|${p.id}|${atrasoKey}`]==='sim'?'<span style="color:var(--red);font-weight:800;">Sim</span>':'<span style="color:var(--green);font-weight:800;">Não</span>'}</td><td style="color:var(--text-secondary);font-size:13px;">${esc(state.notas?.[`${w}|${p.id}|${motivoKey}`]||'–')}</td></tr>`;
        });
        return out+`</tbody></table></div></div>`;
      };
      const editors=(state.editors||[]).filter(p=>teams.includes(p.canal));
      const decups=(state.decupadores||[]).filter(p=>teams.includes(p.canal));
      html += block('Editores','editor',criterioEditor(),editors);
      html += block('Decupadores','decupador',criterioDecup(),decups);
      el.innerHTML=html;
    } catch(err){
      console.error('Historico v22 error', err);
      el.innerHTML = `<div class="section-header"><div class="section-header-left"><div class="section-title">Histórico</div><div class="section-sub">Erro ao carregar</div></div></div><div class="v21-panel"><div class="v21-empty">Erro ao carregar histórico: ${esc(err.message)}</div></div>`;
    }
  };
})();
</script>



<!-- V24 PATCH — Cadastro de decupadores com UX igual a editores + Ranking separado por função -->
<style>
  .v24-rank-tabs{display:flex;gap:8px;background:var(--bg-elevated);border:1px solid var(--separator-soft);border-radius:999px;padding:4px;box-shadow:var(--shadow-sm);}

  @media(max-width:900px){.v24-rank-hero-grid{grid-template-columns:1fr}.v24-rank-tabs{width:100%;}.v24-rank-tab{flex:1}.rank-controls{width:100%;justify-content:space-between}}
</style>
<script>
(function(){
  function esc(s){ try{return escapeHTML(String(s??''));}catch(e){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));} }
  function attr(s){ try{return escapeAttr(String(s??''));}catch(e){return esc(s);} }
  function teams(){ try{return getAllTeams();}catch(e){return (state.teams||['Falco','Phoenix','Astra']).slice();} }
  function visibleTeams(){ const all=teams(); return state.currentUser?.role==='admin' ? all : all.filter(t=>t===state.currentUser?.canal); }
  function cssTeam(t){ try{return canalCSS(t)||{color:'var(--blue)',bg:'var(--blue)20'};}catch(e){return {color:'var(--blue)',bg:'var(--blue)20'};} }
  function initials(name){ try{return avatarFor(name);}catch(e){return String(name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();} }
  function personAvatar(p,size=44,fs=15){ const c=cssTeam(p.canal); const img=p.photo?`<img src="${attr(p.photo)}" alt="${attr(p.name)}">`:initials(p.name); return `<div class="editor-avatar" style="width:${size}px;height:${size}px;font-size:${fs}px;background:${c.color};">${img}</div>`; }
  function tagsHTML(p){ const c=cssTeam(p.canal); const tags=Array.isArray(p.tags)?p.tags:[]; if(!tags.length) return `<div class="editor-meta">Sem tags</div>`; return `<div class="v24-person-tags">${tags.slice(0,4).map(t=>`<span class="v24-tag-pill" style="--team-color:${c.color};--team-bg:${c.bg};">${esc(t)}</span>`).join('')}</div>`; }
  function q(){ return state.selectedQuarter || (typeof getCurrentQuarter==='function'?getCurrentQuarter():null); }
  function decupAvg(id){ try{return calcDecupadorAvgInQuarter(id,q());}catch(e){return null;} }
  function editorAvg(id){ try{return calcAvgInQuarter(id,q());}catch(e){return null;} }
  function decupCount(id){ const weeks = (typeof getWeeksInQuarter==='function' && q()) ? getWeeksInQuarter(q()) : []; let count=0; weeks.forEach(w=>{ if(Object.keys(state.notas||{}).some(k=>k.startsWith(`${w}|${id}|`))) count++; }); return count; }
  function canManageTeam(canal){ return state.currentUser?.role==='admin' || state.currentUser?.canal===canal; }

  window.renderDecupadores = function(el, embedded=false){
    const canaisVisiveis=visibleTeams();
    let html = embedded ? '' : `<div class="section-header"><div class="section-header-left"><div class="section-title">Decupadores</div><div class="section-sub">Cadastro separado dos editores · cada supervisor vê apenas o próprio time</div></div></div>`;
    canaisVisiveis.forEach(canal=>{
      const c=cssTeam(canal); const decs=(state.decupadores||[]).filter(d=>d.canal===canal); const can=canManageTeam(canal);
      html += `<div class="canal-section-header"><div class="canal-dot" style="background:${c.color};"></div><div class="canal-section-title" style="color:${c.color};">Time ${esc(canal)}</div><div class="canal-section-count">${decs.length} decupador${decs.length!==1?'es':''}</div></div><div class="card">`;
      if(can){ html += `<div class="add-editor-row"><input class="field" type="text" id="new-decupador-name-${attr(canal)}" placeholder="Nome do novo decupador" onkeydown="if(event.key==='Enter') addDecupador('${attr(canal)}')"><button class="btn-add" onclick="addDecupador('${attr(canal)}')">+ Adicionar</button></div>`; }
      if(!decs.length){ html += `<div class="v24-empty-hint">Nenhum decupador cadastrado neste time ainda. Cadastre o nome e depois use <b>Gerenciar</b> para editar foto, nome e tags.</div>`; }
      else{
        html += `<div class="editor-grid editor-grid-clean">`;
        decs.forEach(dc=>{
          const avg=decupAvg(dc.id); const n=decupCount(dc.id); const team=cssTeam(dc.canal);
          html += `<div class="editor-card editor-card-clean" style="--team-color:${team.color};--team-bg:${team.bg};">
            <div class="editor-clean-head">
              ${personAvatar(dc,44,15)}
              <div class="editor-info">
                <div class="v24-card-name-tools"><div><div class="editor-name">${esc(dc.name)}</div><div class="editor-meta">Decupador · ${esc(dc.canal)}</div>${tagsHTML(dc)}</div></div>
              </div>
            </div>
            <div class="editor-mini-metrics">
              <div class="editor-mini-metric"><div class="editor-mini-label">Média tri.</div><div class="editor-mini-value" style="color:${typeof colorByScore==='function'?colorByScore(avg):'var(--blue)'};">${avg!==null&&avg!==undefined?Number(avg).toFixed(1):'–'}</div></div>
              <div class="editor-mini-metric"><div class="editor-mini-label">Avaliações</div><div class="editor-mini-value">${n}</div></div>
            </div>
            <div class="editor-card-actions three">
              <button class="btn-card-action primary" onclick="openDecupadorManage('${attr(dc.id)}')">Gerenciar</button>
              ${can?`<label class="btn-card-action">Foto<input type="file" accept="image/*" style="display:none" onchange="setDecupadorPhoto('${attr(dc.id)}', this.files[0])"></label>`:`<button class="btn-card-action" disabled>Foto</button>`}
              ${can?`<button class="btn-card-action btn-card-icon danger" onclick="deleteDecupador('${attr(dc.id)}')" title="Remover decupador">✕</button>`:''}
            </div>
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
    el.innerHTML=html;
  };

  function weeksForPeriod(period){
    if(period==='all'){ const set=new Set(); Object.keys(state.notas||{}).forEach(k=>set.add(k.split('|')[0])); if(typeof getCurrentWeek==='function') set.add(getCurrentWeek()); return [...set]; }
    if(period==='quarter' && typeof getWeeksInQuarter==='function') return getWeeksInQuarter(q());
    if(typeof getLastNWeeks==='function') return getLastNWeeks(5);
    return typeof getCurrentWeek==='function' ? [getCurrentWeek()] : [];
  }
  function parseNum(v){ if(!v) return 0; const n=parseInt(String(v).replace(/[^\d]/g,'')); return isNaN(n)?0:n; }
  function wtSecs(v){ if(!v) return 0; if(typeof watchtimeToSeconds==='function') return watchtimeToSeconds(v); const n=parseInt(v); return isNaN(n)?0:n; }
  function criteriaFor(type){ return type==='decupador' ? (window.CRITERIOS_DECUPAGEM || (typeof CRITERIOS_DECUPAGEM!=='undefined'?CRITERIOS_DECUPAGEM:[])) : (typeof CRITERIOS!=='undefined'?CRITERIOS:[]); }
  function avgForWeeks(p,type,weeks){ const crs=criteriaFor(type); let sum=0,count=0; weeks.forEach(w=>crs.forEach(cr=>{ const v=state.notas?.[`${w}|${p.id}|${cr.key}`]; if(v){sum+=parseFloat(v); count++;} })); return count?sum/count:null; }
  function rowsFor(type,period){ const weeks=weeksForPeriod(period), vteams=visibleTeams(); const people=(type==='editor'?state.editors||[]:state.decupadores||[]).filter(p=>vteams.includes(p.canal));
    const raw=people.map(p=>{ let views=0, wt=0, wtS=0, videos=0, atrasos=0, evalWeeks=0; weeks.forEach(w=>{ const pref=`${w}|${p.id}|`; const keys=Object.keys(state.notas||{}).filter(k=>k.startsWith(pref)); if(keys.length) evalWeeks++; views+=parseNum(state.notas?.[pref+'views24']); videos+=parseNum(state.notas?.[pref+'videos']); wt+=wtSecs(state.notas?.[pref+'watchtime']); wtS+=parseNum(state.notas?.[pref+'watchtimeSeconds']); if(state.notas?.[pref+'atrasou']==='sim') atrasos++; }); const avg=avgForWeeks(p,type,weeks); const quality=avg==null?0:Math.max(0,Math.min(100,((avg-1)/3)*100)); return {...p,type,views,watchtime:wt,watchtimeSeconds:wtS,videos,evalWeeks,atrasos,avg,quality}; });
    const maxViews=Math.max(1,...raw.map(r=>r.views)); const maxProd=Math.max(1,...raw.map(r=>Math.max(r.videos,r.evalWeeks)));
    return raw.map(r=>{ const speed=Math.max(0,100-r.atrasos*20); let volume=0, score=0; if(type==='editor'){ volume=Math.round((r.views/maxViews)*100); score=Math.round(volume*.45 + speed*.20 + r.quality*.35); } else { volume=Math.round((Math.max(r.videos,r.evalWeeks)/maxProd)*100); score=Math.round(volume*.35 + speed*.35 + r.quality*.30); } return {...r,volume,speed,score,productions:Math.max(r.videos,r.evalWeeks)}; }).sort((a,b)=>b.score-a.score || b.views-a.views || b.quality-a.quality); }
  function rankAvatar(p,size=34){ return `<div class="rank-avatar" style="width:${size}px;height:${size}px;background:${cssTeam(p.canal).color};">${p.photo?`<img src="${attr(p.photo)}" alt="">`:initials(p.name)}</div>`; }
  function heroCards(rows,type){ const mvp=rows[0]; const volume=[...rows].sort((a,b)=> type==='editor' ? b.views-a.views : b.productions-a.productions)[0]; const quality=[...rows].sort((a,b)=>b.quality-a.quality)[0]; return `<div class="v24-rank-hero-grid"><div class="rank-card mvp"><div class="rank-kicker">👑 MVP ${type==='editor'?'Editor':'Decupador'}</div><div class="rank-name">${mvp?esc(mvp.name):'—'}</div><div class="rank-metric gold">${mvp?mvp.score:0} pts</div></div><div class="rank-card"><div class="rank-kicker">${type==='editor'?'👁️ Mais views':'🚀 Mais produtivo'}</div><div class="rank-name">${volume?esc(volume.name):'—'}</div><div class="rank-metric">${type==='editor'?(volume?.views||0).toLocaleString('pt-BR'):(volume?.productions||0)+' produções'}</div></div><div class="rank-card"><div class="rank-kicker">✨ Maior qualidade</div><div class="rank-name">${quality?esc(quality.name):'—'}</div><div class="rank-metric" style="color:var(--green)">${quality?Math.round(quality.quality):0}%</div></div></div>`; }
  function podium(rows){ const card=(p,pos)=> !p?`<div class="podium-card"><div class="empty-state">Sem dados</div></div>`:`<div class="podium-card ${pos===1?'first':pos===3?'third':''}">${pos===1?'<div class="podium-crown">👑</div>':''}${rankAvatar(p,pos===1?72:56)}<div class="podium-pos">${pos}</div><div class="podium-person">${esc(p.name)}</div><div class="podium-role">${esc(p.canal)}</div><div class="podium-score">${p.score}</div></div>`; return `<div class="podium">${card(rows[1],2)}${card(rows[0],1)}${card(rows[2],3)}</div>`; }
  function personCell(r){ return `<div class="v24-inline-person">${rankAvatar(r,34)}<div><div style="font-weight:850">${esc(r.name)}</div><div class="v24-inline-meta">${esc(r.canal)} · ${esc((r.tags||[]).join(', ')||'Sem tag')}</div></div></div>`; }

  function decupTable(rows){ if(!rows.length) return `<div class="card"><div class="empty-state">Sem dados de decupadores para esse período.</div></div>`; let html=`<div class="card"><div class="chart-card-title">Classificação · Decupadores</div><div class="v24-rank-subtitle">Ranking separado para decupagem: produções, velocidade, qualidade e atraso.</div><div class="table-wrap"><table class="v24-rank-table"><thead><tr><th>#</th><th>Decupador</th><th>Score</th><th>Média</th><th>Produções</th><th>Velocidade</th><th>Qualidade</th><th>Watchtime (s)</th><th>Views médias/sem</th><th>Atrasos</th></tr></thead><tbody>`; rows.forEach((r,i)=>{ html+=`<tr><td><span class="rank-place">#${i+1}</span></td><td>${personCell(r)}</td><td><b style="color:var(--blue)">${r.score}</b><div class="v24-scorebar"><div class="v24-scorebar-fill" style="width:${Math.max(4,r.score)}%"></div></div></td><td>${r.avg==null?'–':Number(r.avg).toFixed(1)}</td><td>${r.productions}</td><td>${r.speed}</td><td>${Math.round(r.quality)}</td><td>${r.watchtimeSeconds||0}</td><td>${(r.views||0).toLocaleString('pt-BR')}</td><td style="color:${r.atrasos?'var(--red)':'var(--green)'};font-weight:850">${r.atrasos}</td></tr>`; }); return html+`</tbody></table></div></div>`; }

  window.setRankFunctionV24=function(v){ state.rankFunctionV24=v; renderTab('Ranking & MVP'); };
